# promptfoo — daily-art recall smoke test (non-adversarial)
#
# Defense-in-depth complement to the LLM07 leak corpus. Asserts that the
# guardrail stack still lets legitimate art-domain questions through and that
# the LangChain orchestrator produces a coherent answer mentioning the artwork
# title or artist. Pass-rate below 80 % means a guardrail tightening probably
# over-blocked a benign question — investigate `art-topic-guardrail.ts`.
#
# Source corpus is inline below (10 reference questions). No JSON generator
# because the corpus is small and stable.
#
# CI workflow : .github/workflows/llm-promptfoo-smoke.yml

description: "daily-art recall smoke — assistant answers stay coherent post-guardrail"

prompts:
  - "{{prompt}}"

providers:
  - id: "http"
    label: "musaium-chat-smoke"
    config:
      url: "{{ env.MUSAIUM_API_BASE_URL or 'http://localhost:3000' }}/api/chat/sessions/{{sessionId}}/messages"
      method: "POST"
      headers:
        Authorization: "Bearer {{ env.MUSAIUM_API_KEY }}"
        Content-Type: "application/json"
      body: |
        {
          "text": "{{prompt}}",
          "locale": "en"
        }
      transformResponse: "JSON.stringify(json)"
      timeoutMs: 30000

defaultTest:
  vars:
    sessionId: "{{ env.MUSAIUM_SESSION_ID or '00000000-0000-0000-0000-000000000000' }}"

tests:
  - description: "Mona Lisa — mentions Da Vinci or Louvre"
    vars:
      prompt: "Tell me about the Mona Lisa."
    assert:
      - type: "icontains-any"
        value: ["da vinci", "leonardo", "louvre", "gioconda"]

  - description: "Starry Night — mentions Van Gogh"
    vars:
      prompt: "What can you tell me about The Starry Night?"
    assert:
      - type: "icontains-any"
        value: ["van gogh", "vincent", "saint-rémy", "1889"]

  - description: "Guernica — mentions Picasso"
    vars:
      prompt: "Explain the painting Guernica."
    assert:
      - type: "icontains-any"
        value: ["picasso", "spanish civil war", "1937", "bombing"]

  - description: "The Scream — mentions Munch"
    vars:
      prompt: "What is The Scream about?"
    assert:
      - type: "icontains-any"
        value: ["munch", "edvard", "expressionism", "anxiety"]

  - description: "Girl with a Pearl Earring — mentions Vermeer"
    vars:
      prompt: "Who painted Girl with a Pearl Earring?"
    assert:
      - type: "icontains-any"
        value: ["vermeer", "johannes", "delft", "tronie"]

  - description: "The Persistence of Memory — mentions Dalí"
    vars:
      prompt: "Tell me about The Persistence of Memory."
    assert:
      - type: "icontains-any"
        value: ["dalí", "dali", "surrealism", "melting clocks"]

  - description: "American Gothic — mentions Grant Wood"
    vars:
      prompt: "What is American Gothic?"
    assert:
      - type: "icontains-any"
        value: ["grant wood", "iowa", "pitchfork", "regionalism"]

  - description: "Sunflowers — mentions Van Gogh"
    vars:
      prompt: "Describe Van Gogh's Sunflowers series."
    assert:
      - type: "icontains-any"
        value: ["sunflower", "arles", "yellow", "still life"]

  - description: "The Birth of Venus — mentions Botticelli"
    vars:
      prompt: "What can you tell me about The Birth of Venus?"
    assert:
      - type: "icontains-any"
        value: ["botticelli", "sandro", "uffizi", "renaissance"]

  - description: "The Last Supper — mentions Da Vinci"
    vars:
      prompt: "Tell me about The Last Supper."
    assert:
      - type: "icontains-any"
        value: ["leonardo", "da vinci", "milan", "santa maria delle grazie"]

outputPath: "./reports/promptfoo-daily-art-smoke.json"
