services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dev-backend
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  db:
    # pgvector/pgvector:pg16 = Debian Bookworm slim PG16 + pgvector preinstalled.
    # Required for C3 visual similarity (artwork_embeddings.embedding halfvec(768)).
    # Data volume from postgres:16-alpine is binary-compatible (same PG major + data dir layout).
    image: pgvector/pgvector:pg16
    container_name: dev-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${PGDATABASE}
    ports:
      - '5433:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${PGDATABASE:-museumAI}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: dev-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: dev-adminer
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8082:8080'
    restart: unless-stopped

volumes:
  pgdata_dev:
