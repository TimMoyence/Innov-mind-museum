services:
  backend:
    # Build context widened to the repo root so the Dockerfile can COPY the
    # `file:../packages/musaium-shared` workspace dependency declared in
    # museum-backend/package.json (CLAUDE.md "Pièges connus" — the workspace
    # was reverted to a `file:` dep in commit 641968ea4, so `pnpm install`
    # MUST see /app/packages/musaium-shared alongside /app/museum-backend).
    # Root-level `.dockerignore` excludes museum-frontend / museum-web /
    # ios/Pods to keep context transfer reasonable (~5 MB instead of ~1 GB).
    build:
      context: ..
      dockerfile: museum-backend/Dockerfile.dev
    container_name: dev-backend
    working_dir: /app/museum-backend
    ports:
      - '3000:3000'
    env_file:
      - .env
    # Inject REDIS_* in `environment:` so the values come from this compose file
    # (and override anything stale in .env). This mirrors the prod compose
    # contract (deploy/docker-compose.prod.yml § redis) — TD-44 fix.
    # If .env later overrides REDIS_PASSWORD, the var substitution below uses
    # that value; otherwise the dev fallback `dev-redis-password` is used and
    # matches the `redis` service's `--requirepass` below (single source of
    # truth for dev/CI smoke).
    environment:
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dev-redis-password}
      REDIS_URL: redis://:${REDIS_PASSWORD:-dev-redis-password}@redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount the backend source AT /app/museum-backend so the file: symlink
      # to ../packages/musaium-shared keeps resolving inside the container.
      - .:/app/museum-backend
      # Anonymous volumes that preserve image-baked node_modules / dist of
      # the shared package across host source-code edits.
      - /app/museum-backend/node_modules
      - /app/packages/musaium-shared/node_modules
    restart: unless-stopped

  db:
    # pgvector/pgvector:pg16 = Debian Bookworm slim PG16 + pgvector preinstalled.
    # Required for C3 visual similarity (artwork_embeddings.embedding halfvec(768)).
    # Data volume from postgres:16-alpine is binary-compatible (same PG major + data dir layout).
    image: pgvector/pgvector:pg16
    container_name: dev-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${PGDATABASE}
    ports:
      - '5433:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${PGDATABASE:-museumAI}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: dev-redis
    # Force `--requirepass` so the dev container matches the prod compose
    # contract (deploy/docker-compose.prod.yml:331-334). Without it, ioredis
    # in the backend sends AUTH and Redis 7 emits
    # `[WARN] This Redis server's default user does not require a password,
    # but a password was supplied` on every connection — 200+ lines/24h of
    # log noise that masks real errors. TD-44 fix 2026-05-18.
    command:
      - 'redis-server'
      - '--requirepass'
      - '${REDIS_PASSWORD:-dev-redis-password}'
    ports:
      - '6379:6379'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'redis-cli -a "${REDIS_PASSWORD:-dev-redis-password}" PING | grep -q PONG',
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: dev-adminer
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8082:8080'
    restart: unless-stopped

volumes:
  pgdata_dev:
