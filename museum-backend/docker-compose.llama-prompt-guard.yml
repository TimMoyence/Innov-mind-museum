# Opt-in docker-compose overlay for the ADR-050 Llama Prompt Guard 2 86M
# sidecar (Phase 1 shadow-mode candidate — NOT activated by default).
#
# Coverage: OWASP LLM01 (Prompt Injection) + LLM07 (System Prompt Leakage)
# via Meta's `meta-llama/Llama-Prompt-Guard-2-86M` model (mDeBERTa backbone,
# 86M params, binary BENIGN/MALICIOUS classifier).
# Benchmark: AUC 0.998 / recall 97.5% @ 1% FPR (multilingual incl. French)
# vs the LLM-Guard incumbent's 0.22 recall on the comparable arXiv 2502.15427
# benchmark.
#
# Form factor: custom FastAPI sidecar wrapping `transformers.pipeline(
# "text-classification")` — mirrors the existing `ops/llm-guard-sidecar/`
# pattern. CPU-viable at ~150-400 ms typical (no GPU required for the VPS).
#
# Activation status: adapter exists at
#   src/modules/chat/adapters/secondary/guardrails/llama-prompt-guard.adapter.ts
# but is NOT wired in chat-module.ts composition root pre-launch. See
# ADR-050 for the Phase 1 promotion criteria.
#
# A Dockerfile must be authored at `ops/llama-prompt-guard-sidecar/Dockerfile`
# before this overlay can `docker compose up` cleanly — left to Phase 1.
#
# Activation when promotion criteria pass:
#   1. Author the FastAPI sidecar exposing POST /classify {text} → {label, score}
#   2. Wire the adapter in chat-module.ts (constructor-injection swap)
#   3. Set in `.env`:
#        LLAMA_PROMPT_GUARD_BASE_URL=http://llama-prompt-guard:8082
#        LLAMA_PROMPT_GUARD_TIMEOUT_MS=500
#        LLAMA_PROMPT_GUARD_SCORE_THRESHOLD=0.8
#   4. Start with the overlay:
#        docker compose -f docker-compose.dev.yml \
#                       -f docker-compose.llama-prompt-guard.yml up -d

services:
  llama-prompt-guard:
    build:
      context: ./ops/llama-prompt-guard-sidecar
      dockerfile: Dockerfile
    container_name: dev-llama-prompt-guard
    ports:
      - '8082:8082'
    environment:
      - LOG_LEVEL=INFO
      - HF_MODEL=meta-llama/Llama-Prompt-Guard-2-86M
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8082/health']
      interval: 10s
      timeout: 3s
      retries: 2
      # First boot on a cold HF cache downloads ~340 MB of weights — expect
      # 2-3 min. Subsequent boots land in ~10-20 s once the volume is warm.
      start_period: 240s
