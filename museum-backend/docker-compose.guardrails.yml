# Opt-in docker-compose overlay for the AI Guardrails V2 POC (plan NL-4 / P11).
#
# Config below reflects the v3 benchmark result (see docs/plans/reports/P11-decision.md):
#   - BanTopics removed (was flagging art as adult/violence/politics — 44% FP)
#   - Anonymize restricted to pure PII entities (PERSON flagged artist names as PII)
#   - Timeout raised from 300ms to 500ms (v3 P95 measured at 375ms on MPS local)
#
# Activation:
#   1. A Dockerfile must exist at `ops/llm-guard-sidecar/Dockerfile` (NOT YET BUILT —
#      the current POC ran via local Python venv; see ops/llm-guard-sidecar/README.md).
#   2. Set these env vars in `.env` (defaults kept Phase A safe):
#        GUARDRAILS_V2_CANDIDATE=llm-guard
#        GUARDRAILS_V2_LLM_GUARD_URL=http://llm-guard:8081
#        GUARDRAILS_V2_OBSERVE_ONLY=true
#   3. Start with the overlay:
#        docker compose -f docker-compose.dev.yml -f docker-compose.guardrails.yml up -d
#
# When the overlay is not used, `env.guardrails.candidate` defaults to `off`
# and the backend installs the noop adapter — no runtime cost, no dependency.

services:
  llm-guard:
    # NOTE: no official OCI image is published by Protectai. The POC uses our own
    # FastAPI wrapper (ops/llm-guard-sidecar/app.py) that exposes /scan/prompt,
    # /scan/output, /health. A Dockerfile still needs to be authored — see the
    # "Phase A ops work" section in docs/plans/reports/P11-decision.md.
    build:
      context: ./ops/llm-guard-sidecar
      dockerfile: Dockerfile
    container_name: dev-llm-guard
    ports:
      - '8081:8081'
    environment:
      - LOG_LEVEL=INFO
      # v3 validated config — see docs/plans/reports/P11-decision.md
      - INPUT_SCANNERS=PromptInjection,Anonymize,Toxicity
      # V12 W5 §3.3 — Sensitive uses Presidio internally on output (no separate
      # Anonymize output scanner exists in protectai/llm-guard). Sensitive now
      # accepts the same entity_types as input Anonymize for symmetric PII
      # coverage; see ops/llm-guard-sidecar/app.py:_build_output_scanners.
      - OUTPUT_SCANNERS=NoRefusal,Bias,Sensitive,Relevance
      # Restricted to pure PII — excludes PERSON/LOCATION/ORG/NRP/DATE_TIME which
      # otherwise flag every artist/museum/painting name as PII. Applied to BOTH
      # input Anonymize and output Sensitive so coverage is symmetric.
      - ANONYMIZE_ENTITIES=EMAIL_ADDRESS,PHONE_NUMBER,CREDIT_CARD,IBAN_CODE,IP_ADDRESS,US_SSN,US_PASSPORT,US_DRIVER_LICENSE,CRYPTO,URL,MEDICAL_LICENSE
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8081/health']
      interval: 10s
      timeout: 3s
      retries: 5
      # First boot on a cold HF cache can take 3–4 min (model downloads).
      # Subsequent boots land in ~20–30s once volume is warm.
      start_period: 240s

  backend:
    environment:
      - GUARDRAILS_V2_CANDIDATE=${GUARDRAILS_V2_CANDIDATE:-llm-guard}
      - GUARDRAILS_V2_LLM_GUARD_URL=${GUARDRAILS_V2_LLM_GUARD_URL:-http://llm-guard:8081}
      # Raised from 300ms to 500ms — v3 bench P95 was 375ms on local MPS; add
      # 125ms margin for network RTT in the compose network + prod CPU-only infer.
      - GUARDRAILS_V2_TIMEOUT_MS=${GUARDRAILS_V2_TIMEOUT_MS:-500}
      - GUARDRAILS_V2_OBSERVE_ONLY=${GUARDRAILS_V2_OBSERVE_ONLY:-true}
    depends_on:
      llm-guard:
        condition: service_healthy
