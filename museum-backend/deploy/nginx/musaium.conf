# ==========================================================
# Musaium Nginx Configuration
# Domains: musaium.com, musaium.fr (+ www variants)
# Backend: museum-backend:3000 (Docker internal)
# ==========================================================
#
# Prerequisites:
#   certbot certonly --webroot -w /var/www/certbot \
#     -d musaium.com -d www.musaium.com \
#     -d musaium.fr -d www.musaium.fr
#
# Integration:
#   Include this file in the main site.conf or copy the
#   server blocks into the existing configuration.
#   Add musaium domains to the HTTP→HTTPS redirect block.
# ==========================================================

# ----------------------------
# Rate limiting zones (http-level)
# ----------------------------
# Global: 30 req/s per IP — handles normal browsing, blocks scanners
limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;
# Auth: 5 req/min per IP — protects login/register from brute-force
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# ----------------------------
# HTTPS musaium.com / musaium.fr
# ----------------------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  server_name musaium.com musaium.fr;

  ssl_certificate     /etc/letsencrypt/live/musaium.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/musaium.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  resolver 127.0.0.11 valid=30s ipv6=off;
  client_max_body_size 20m;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    try_files $uri =404;
  }

  # --- SSE streaming endpoint (MUST be BEFORE the catch-all location /) ---
  # Long-lived connections: disable buffering, compression, and extend timeouts.
  location ~ ^/api/chat/sessions/.*/messages/stream$ {
    set $museum_upstream http://museum-backend:3000;
    proxy_pass $museum_upstream;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE-specific directives
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    gzip off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    add_header X-Accel-Buffering no;
  }

  # --- Auth endpoints (stricter rate limit) ---
  location /api/auth/ {
    limit_req zone=auth burst=10 nodelay;

    set $museum_upstream http://museum-backend:3000;
    proxy_pass $museum_upstream;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # --- All other API requests ---
  location / {
    limit_req zone=global burst=60 nodelay;

    set $museum_upstream http://museum-backend:3000;
    proxy_pass $museum_upstream;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }
}

# ----------------------------
# HTTPS www -> non-www redirect
# ----------------------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  server_name www.musaium.com www.musaium.fr;

  ssl_certificate     /etc/letsencrypt/live/musaium.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/musaium.com/privkey.pem;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    try_files $uri =404;
  }

  return 301 https://musaium.com$request_uri;
}

# ----------------------------
# Legacy domain redirect
# ----------------------------
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  server_name museum.asilidesign.fr;

  ssl_certificate     /etc/letsencrypt/live/asilidesign.fr/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/asilidesign.fr/privkey.pem;

  return 301 https://musaium.com$request_uri;
}
