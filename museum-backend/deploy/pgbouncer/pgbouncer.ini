[databases]
; Connect to the PostgreSQL container on the private network.
; DB name, user, and password are injected via environment variables in userlist.txt.
* = host=db port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; --- Pool sizing ---
; transaction mode: connection returned after each transaction (not session).
; This is the key to multiplexing — 8 backend instances × 50 pool each = 400 app connections
; get funneled into max_db_connections toward Postgres.
pool_mode = transaction
default_pool_size = 40
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
max_client_conn = 500
max_db_connections = 100

; --- Timeouts ---
server_idle_timeout = 300
server_lifetime = 3600
client_idle_timeout = 0
query_timeout = 30
query_wait_timeout = 60

; --- Logging ---
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; --- Admin ---
admin_users = pgbouncer_admin
