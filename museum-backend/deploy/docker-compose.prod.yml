# Production docker-compose with PgBouncer connection pooler.
#
# Architecture: backend → pgbouncer:6432 → db:5432
#
# Deploy: copy this file to the server and run:
#   docker compose -f docker-compose.prod.yml up -d
#
# .env must include: DB_USER, DB_PASSWORD, PGDATABASE
# Set DB_HOST=pgbouncer and DB_PORT=6432 in .env so the backend connects via pgbouncer.

networks:
  web:
    external: true
  private:
    driver: bridge
    internal: true

volumes:
  pgdata:
  redis_data:
  uploads:

services:
  backend:
    image: ghcr.io/timmoyence/museum-backend:latest
    hostname: backend
    env_file:
      - .env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      llm-guard:
        condition: service_healthy
    volumes:
      - uploads:/app/tmp/uploads
    networks:
      private: {}
      web:
        aliases:
          - museum-backend
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  # AI Guardrails V2 sidecar (NL-4 / P11). Optional — when
  # GUARDRAILS_V2_CANDIDATE=off the backend uses the noop adapter and this
  # service's work is ignored (but it still needs to be healthy because of
  # depends_on above; set condition: service_started if you want to run
  # backend without the sidecar in an emergency).
  #
  # Exposed only on the private network — the sidecar never receives traffic
  # from the internet, only from the backend.
  llm-guard:
    image: ghcr.io/timmoyence/museum-llm-guard:latest
    hostname: llm-guard
    environment:
      - LOG_LEVEL=INFO
      # v3 validated config — see docs/plans/reports/P11-decision.md
      - INPUT_SCANNERS=PromptInjection,Anonymize,Toxicity
      - OUTPUT_SCANNERS=NoRefusal,Bias,Sensitive,Relevance
      - ANONYMIZE_ENTITIES=EMAIL_ADDRESS,PHONE_NUMBER,CREDIT_CARD,IBAN_CODE,IP_ADDRESS,US_SSN,US_PASSPORT,US_DRIVER_LICENSE,CRYPTO,URL,MEDICAL_LICENSE
    networks:
      - private
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    hostname: pgbouncer
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["sh", "/entrypoint.sh"]
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  museum-web:
    image: ghcr.io/timmoyence/museum-web:latest
    hostname: museum-web
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    networks:
      private: {}
      web:
        aliases:
          - museum-web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${PGDATABASE}
      POSTGRES_INITDB_ARGS: "--auth=scram-sha-256"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env for production}"
      - "--appendonly"
      - "yes"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" PING | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
