# Musaium production docker-compose — single source of truth for what runs on the VPS.
#
# FILE LAYOUT (on the VPS, after you copy this file over):
#   /srv/museum/docker-compose.yml        ← this file (renamed from docker-compose.prod.yml)
#   /srv/museum/deploy/pgbouncer/...      ← pgbouncer.ini + entrypoint.sh (copied from repo)
#   /srv/museum/.env                      ← secrets (see .env.production.example)
#
# The relative paths below (./deploy/pgbouncer/...) resolve to /srv/museum/deploy/pgbouncer/
# on the VPS. They DO NOT resolve from the repo's museum-backend/deploy/ folder —
# this compose is designed to be copied to the VPS, not run from the repo.
#
# Architecture:
#   internet → nginx (web network) → backend (museum-backend alias on web net)
#                                  → museum-web (museum-web alias on web net)
#   backend → pgbouncer:6432 → db:5432  (private net, no internet exposure)
#   backend → redis:6379              (private net)
#   backend → llm-guard:8081          (private net — AI Guardrails V2 sidecar, P11)
#
# Required env vars in /srv/museum/.env:
#   DB_USER, DB_PASSWORD, PGDATABASE, REDIS_PASSWORD,
#   JWT_*, LLM_PROVIDER + matching API key,
#   GUARDRAILS_V2_CANDIDATE, GUARDRAILS_V2_LLM_GUARD_URL,
#   GUARDRAILS_V2_TIMEOUT_MS, GUARDRAILS_V2_OBSERVE_ONLY
#   (full list in museum-backend/.env.production.example)
#
# Deploy sequence on VPS:
#   cd /srv/museum
#   docker login ghcr.io -u <user> -p <PAT>
#   docker compose pull <service>              # pulls from GHCR
#   docker compose up -d <service>             # zero-downtime restart (30s grace)

networks:
  web:
    external: true
  private:
    driver: bridge
    internal: true

volumes:
  pgdata:
  redis_data:
  uploads:

services:
  backend:
    image: ghcr.io/timmoyence/museum-backend:latest
    hostname: backend
    env_file:
      - .env
    environment:
      # Point backend at pgbouncer (not raw postgres) regardless of what .env says.
      # Avoids accidentally connecting to db:5432 which bypasses pooling.
      DB_HOST: pgbouncer
      DB_PORT: 6432
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      pgbouncer:
        condition: service_healthy
      # llm-guard intentionally NOT in depends_on.
      # Rationale: the V2 guardrail is optional (observe-only Phase A) and the
      # LLMGuardAdapter is fail-CLOSED → if the sidecar is down, the backend
      # logs a warning and degrades to V1-only (keyword guardrail). Blocking
      # the backend on llm-guard health would create a cold-start deadlock on
      # first rollout (backend deploy races the sidecar image build in CI).
      # Operators must bring up llm-guard BEFORE the first request if they
      # want Phase A telemetry — but backend itself will still boot alone.
    volumes:
      - uploads:/app/tmp/uploads
    networks:
      private: {}
      web:
        aliases:
          - museum-backend
    ports:
      - '127.0.0.1:3000:3000'
    restart: unless-stopped

  # ── AI Guardrails V2 sidecar (P11 — docs/plans/reports/P11-decision.md) ──
  # Runs the LLM Guard scanners (PromptInjection, Anonymize, Toxicity) behind
  # an HTTP API the backend consumes via LLMGuardAdapter. Private network only —
  # never receives traffic from the internet, only from the backend container.
  # To disable: set GUARDRAILS_V2_CANDIDATE=off in .env and restart backend
  # (backend will use noopAdvancedGuardrail; this service still runs but is idle).
  llm-guard:
    image: ghcr.io/timmoyence/museum-llm-guard:latest
    hostname: llm-guard
    environment:
      - LOG_LEVEL=INFO
      # v3 validated config (benchmark 2026-04-18): injection 96.7%, FP 5%, P95 375 ms.
      - INPUT_SCANNERS=PromptInjection,Anonymize,Toxicity
      - OUTPUT_SCANNERS=NoRefusal,Bias,Sensitive,Relevance
      # Anonymize excludes PERSON/LOCATION/ORG/NRP/DATE_TIME — those flag every
      # artist/museum/painting name as PII in the art-museum context.
      - ANONYMIZE_ENTITIES=EMAIL_ADDRESS,PHONE_NUMBER,CREDIT_CARD,IBAN_CODE,IP_ADDRESS,US_SSN,US_PASSPORT,US_DRIVER_LICENSE,CRYPTO,URL,MEDICAL_LICENSE
    networks:
      - private
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8081/health']
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    hostname: pgbouncer
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./deploy/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./deploy/pgbouncer/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ['sh', '/entrypoint.sh']
    networks:
      - private
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -p 6432 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  museum-web:
    image: ghcr.io/timmoyence/museum-web:latest
    hostname: museum-web
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    networks:
      private: {}
      web:
        aliases:
          - museum-web
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3001/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${PGDATABASE}
      POSTGRES_INITDB_ARGS: '--auth=scram-sha-256'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - private
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      - 'redis-server'
      - '--requirepass'
      - '${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env for production}'
      - '--appendonly'
      - 'yes'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - private
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" PING | grep -q PONG']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
