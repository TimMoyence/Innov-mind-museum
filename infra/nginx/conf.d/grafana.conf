# Reverse proxy `/grafana/*` from the museum-web admin domain to the
# Grafana container, with single-auth UX backed by an nginx
# `auth_request` directive that hits the Musaium backend
# `/api/auth/super-admin-check` endpoint. The session cookie set by
# museum-web at login is the ONLY credential the user provides — Grafana
# itself runs as anonymous Viewer behind this gate.
#
# To install on the VPS:
#   1. `sudo install -m 0644 grafana.conf /etc/nginx/snippets/musaium-grafana.conf`
#   2. Edit `/etc/nginx/sites-enabled/musaium.conf` and add inside the
#      relevant `server { }` block (the one terminating TLS for
#      musaium.fr / api.musaium.fr — the same origin that serves
#      museum-web admin):
#        include /etc/nginx/snippets/musaium-grafana.conf;
#   3. `sudo nginx -t && sudo systemctl reload nginx`
#
# Operational invariants:
#   - The session cookie set by museum-web MUST be valid for the
#     same origin that serves /grafana/. The auth_request subrequest
#     forwards `Cookie` verbatim to the backend.
#   - Grafana is configured with `GF_AUTH_ANONYMOUS_ENABLED=true` +
#     `Viewer` org role. This means a network-level bypass of nginx
#     would expose a read-only dashboard. Mitigation: Grafana only
#     listens on the `obs` Docker network ; there is no `ports:` map
#     in compose, so it is not reachable from the public internet
#     except through this nginx location.
#   - The `auth_request` runs on every /grafana/* fetch (HTML, assets,
#     XHR). Backend must keep `/api/auth/super-admin-check` cheap
#     (target ≤ 5ms) — it does a JWT verify only, no DB hit.

# ── Internal-only auth_request target ────────────────────────────────
# This location is `internal` so curl /grafana-auth-check returns 404
# from the outside. nginx itself dispatches the subrequest here.
location = /grafana-auth-check {
  internal;

  # Forward the original cookie so the backend can verify the session.
  proxy_pass         http://museum-backend:3000/api/auth/super-admin-check;
  proxy_http_version 1.1;
  proxy_pass_request_body off;
  proxy_set_header   Content-Length    "";
  proxy_set_header   Host              $http_host;
  proxy_set_header   X-Original-URI    $request_uri;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   Cookie            $http_cookie;

  proxy_read_timeout 5s;
  proxy_send_timeout 5s;
  proxy_connect_timeout 2s;
}

# ── Grafana same-origin reverse proxy ────────────────────────────────
location /grafana/ {
  # Hard gate — the subrequest above must return 204 (super_admin) for
  # the proxy_pass below to fire. 401 from the subrequest → nginx 401
  # to the client, no Grafana hop.
  auth_request /grafana-auth-check;

  proxy_pass         http://grafana:3000/;
  proxy_http_version 1.1;
  proxy_set_header   Host              $http_host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   Upgrade           $http_upgrade;
  proxy_set_header   Connection        "upgrade";

  # Grafana sets X-Frame-Options:deny upstream when EMBEDDING is off.
  # GF_SECURITY_ALLOW_EMBEDDING=true clears it ; this hide is a belt-
  # and-suspenders guard against an upstream config drift.
  proxy_hide_header  X-Frame-Options;

  # Sane timeouts ; SSE / Live updates handled by the dedicated
  # location below.
  proxy_read_timeout 60s;
  proxy_send_timeout 60s;
}

# Live tail / SSE for Grafana Live (kept simple — same proxy_pass +
# auth_request).
location /grafana/api/live/ {
  auth_request /grafana-auth-check;

  proxy_pass         http://grafana:3000/api/live/;
  proxy_http_version 1.1;
  proxy_set_header   Upgrade    $http_upgrade;
  proxy_set_header   Connection $http_connection;
  proxy_set_header   Host       $http_host;

  proxy_read_timeout 24h;
  proxy_send_timeout 24h;
}
