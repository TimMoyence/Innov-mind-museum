# Reverse proxy `/grafana/*` from the museum-web admin domain to the
# internal Grafana container. Same-origin removes CSP `frame-ancestors`
# friction and lets the Grafana session cookie share the admin domain.
#
# Operational invariants:
#   - Iframe access is gated by museum-web at `/admin/ops/grafana` (super-
#     admin role only). This nginx location does NOT add auth — it relies
#     on Grafana's own basic auth (`GF_AUTH_BASIC_ENABLED=true`) so the
#     URL is not anonymously browsable.
#   - `proxy_set_header Authorization` is intentionally NOT propagated
#     from the museum-web cookie — the user must authenticate to Grafana
#     once per session. SSO swap lands in W3.x post-launch.
#   - X-Frame-Options is dropped via `proxy_hide_header` so the iframe
#     embed works ; the browser CSP `frame-ancestors 'self'` (set by
#     museum-web) is the actual gate.

location /grafana/ {
  proxy_pass         http://grafana:3000/;
  proxy_http_version 1.1;
  proxy_set_header   Host              $http_host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   Upgrade           $http_upgrade;
  proxy_set_header   Connection        "upgrade";

  # Grafana sets X-Frame-Options:deny upstream when EMBEDDING is off.
  # GF_SECURITY_ALLOW_EMBEDDING=true clears it ; this hide is a belt-and-
  # suspenders guard against an upstream config drift.
  proxy_hide_header  X-Frame-Options;

  proxy_read_timeout 60s;
  proxy_send_timeout 60s;
}

# Live tail / SSE for Grafana Live (kept simple — same proxy_pass).
location /grafana/api/live/ {
  proxy_pass         http://grafana:3000/api/live/;
  proxy_http_version 1.1;
  proxy_set_header   Upgrade    $http_upgrade;
  proxy_set_header   Connection $http_connection;
  proxy_set_header   Host       $http_host;
}
