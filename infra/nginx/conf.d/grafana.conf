# ─────────────────────────────────────────────────────────────────────
# Grafana iframe single-auth gate — locations to paste into your
# nginx Docker container's site.conf.
#
# Context: nginx runs as a Docker container with a user-maintained
# site.conf bind-mounted at conf.d/site.conf. CI does NOT auto-deploy
# this file (the path /etc/nginx/snippets/ is inside the container,
# not on the host filesystem ; CI cannot reach it via SSH). This file
# is a REFERENCE — copy/paste the 3 locations below into the
# `server { server_name musaium.com musaium.fr; ... }` block of your
# site.conf, between `location /api/` and `location /` (so the more
# specific `/grafana/` matches before the catch-all `location /`).
#
# After pasting, also flip the CSP `frame-ancestors` directive in the
# same server block from `'none'` to `'self'` — the iframe at
# /admin/ops/grafana embeds /grafana/ same-origin, which the browser
# rejects when frame-ancestors is `'none'` (the iframe child page
# inherits the server-level CSP via add_header).
#
# Reload procedure (nginx Docker):
#   1. docker exec <nginx-container> nginx -t       # validate
#   2. docker exec <nginx-container> nginx -s reload
#   OR
#   docker compose restart nginx                     # if you prefer
#
# ─────────────────────────────────────────────────────────────────────
#
# Paste BLOCK 1 — internal-only auth_request target. Place anywhere
# inside the musaium server { } (it is `internal;` so position does
# not matter for routing).

location = /grafana-auth-check {
  internal;

  proxy_pass         http://museum-backend:3000/api/auth/super-admin-check;
  proxy_http_version 1.1;
  proxy_pass_request_body off;
  proxy_set_header   Content-Length    "";
  proxy_set_header   Host              $http_host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   Cookie            $http_cookie;

  proxy_read_timeout 5s;
  proxy_send_timeout 5s;
  proxy_connect_timeout 2s;
}

# ─────────────────────────────────────────────────────────────────────
# Paste BLOCK 2 — Grafana same-origin reverse proxy. Place BEFORE the
# catch-all `location / { proxy_pass http://museum-web:3001; }` so
# `/grafana/` matches first.

location /grafana/ {
  auth_request /grafana-auth-check;

  proxy_pass         http://grafana:3000/;
  proxy_http_version 1.1;
  proxy_set_header   Host              $http_host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   Upgrade           $http_upgrade;
  proxy_set_header   Connection        "upgrade";

  # Grafana sets X-Frame-Options:deny upstream when EMBEDDING is off.
  # GF_SECURITY_ALLOW_EMBEDDING=true clears it ; this hide is a belt-
  # and-suspenders guard against an upstream config drift.
  proxy_hide_header  X-Frame-Options;

  proxy_read_timeout 60s;
  proxy_send_timeout 60s;
}

# ─────────────────────────────────────────────────────────────────────
# Paste BLOCK 3 — Grafana Live SSE / WebSocket. Place near BLOCK 2.

location /grafana/api/live/ {
  auth_request /grafana-auth-check;

  proxy_pass         http://grafana:3000/api/live/;
  proxy_http_version 1.1;
  proxy_set_header   Upgrade    $http_upgrade;
  proxy_set_header   Connection $http_connection;
  proxy_set_header   Host       $http_host;

  proxy_read_timeout 24h;
  proxy_send_timeout 24h;
}

# ─────────────────────────────────────────────────────────────────────
# CSP TWEAK — in the same server block, find this line:
#
#   add_header Content-Security-Policy "default-src 'self'; ... ;
#     frame-ancestors 'none'; ..." always;
#
# AND flip `frame-ancestors 'none'` → `frame-ancestors 'self'`. The
# museum-web admin page at /admin/ops/grafana embeds /grafana/ via
# same-origin iframe ; the iframe child page inherits the server-level
# CSP, so `'none'` rejects the embed. `'self'` allows musaium.fr to
# embed musaium.fr (which is what the iframe path requires).
#
# This single-character change is the only invasive edit ; everything
# else is a clean append.
