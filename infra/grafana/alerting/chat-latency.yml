# Prometheus alerting rules — chat pipeline latency.
# Loaded by Prometheus via `rule_files` glob in museum-backend/prometheus.yml.
# AlertManager splits firing alerts by their `severity` label (alertmanager.yml,
# D11 — user choice 2026-05-08): `critical` alerts route to the
# `telegram-ops-critical` receiver (fast group_wait, 1h repeat_interval),
# `warning` alerts route to `telegram-ops-warning` (4h repeat_interval). Both
# receivers hit the same Telegram bridge.

groups:
  - name: chat-latency
    interval: 30s
    rules:
      - alert: chat_e2e_p99_high
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(chat_request_duration_seconds_bucket[5m])) by (le)
          ) > 6
        for: 5m
        labels:
          severity: warning
          service: musaium-backend
          surface: chat
          owner: tim
        annotations:
          summary: "Chat p99 latency above 6s (5m window)"
          description: |
            Chat end-to-end p99 latency over the last 5 minutes is
            {{ $value | printf "%.2f" }}s, which exceeds the 6s budget
            documented in spec NFR (`team-state/2026-05-08-c1-chat-fast/spec.md` §5).

            First action: open the Grafana dashboard `chat-latency` and
            inspect "Per-phase latency (p95 stacked)" + "Phase share at p95"
            to identify the dominant phase.

            If the upstream LLM provider is degraded, flip
            `LLM_CACHE_ENABLED=false` is NOT a fix (cache is post-LLM
            response). Engage circuit breaker behavior or fall back to a
            secondary provider per CHAOS_RUNBOOKS.
          dashboard: "{{ .ExternalURL }}/d/chat-latency"
          runbook: "https://github.com/Tim-Kraken/InnovMind/blob/main/docs/CHAOS_RUNBOOKS.md#chat-latency"

      # C4 T7.4 — KnowledgeRouter WebSearch fallback error-rate guardrail.
      # Source : `chat_websearch_fallback_total{outcome}` (declared in
      # `museum-backend/src/shared/observability/prometheus-metrics.ts`).
      # Warn at >10% sustained error-rate, critical at >30% — see spec NFR
      # `team-state/2026-05-11-c4-anti-hallucination/spec.md#R12`.
      # The denominator uses clamp_min to avoid 0/0 NaN on cold start.
      - alert: chat_websearch_error_rate_high
        expr: |
          sum(rate(chat_websearch_fallback_total{outcome="error"}[10m]))
          /
          clamp_min(sum(rate(chat_websearch_fallback_total[10m])), 1e-9)
          > 0.1
        for: 10m
        labels:
          severity: warning
          service: musaium-backend
          surface: chat
          owner: tim
        annotations:
          summary: "Chat WebSearch fallback error rate above 10% (10m window)"
          description: |
            KnowledgeRouter WebSearch leg is erroring on
            {{ $value | humanizePercentage }} of fallback calls over the
            last 10 minutes. Critical threshold: 30%.

            First action: check Brave Search / Tavily / SearXNG upstream
            status (rate-limit, 429, DNS). Open the Grafana panel
            "C4 — WebSearch fallback rate per minute (by outcome)" on
            `chat-latency` dashboard to confirm which outcomes are dominating.

            Doctrine pré-launch V1 — there is no kill-switch (no `*_ENABLED`
            flag). Mitigation = `git revert <merge-sha>` OR upstream provider
            recovery. Cascade still fails open (`source: 'none'`) so users
            keep getting answers, just without grounding.
          dashboard: "{{ .ExternalURL }}/d/chat-latency"
          runbook: "https://github.com/Tim-Kraken/InnovMind/blob/main/docs/CHAOS_RUNBOOKS.md#chat-websearch-fallback"

      - alert: chat_websearch_error_rate_critical
        expr: |
          sum(rate(chat_websearch_fallback_total{outcome="error"}[10m]))
          /
          clamp_min(sum(rate(chat_websearch_fallback_total[10m])), 1e-9)
          > 0.3
        for: 10m
        labels:
          severity: critical
          service: musaium-backend
          surface: chat
          owner: tim
        annotations:
          summary: "Chat WebSearch fallback error rate above 30% (10m window)"
          description: |
            KnowledgeRouter WebSearch leg error rate is
            {{ $value | humanizePercentage }} over the last 10 minutes,
            above the 30% critical threshold. Most WS-grounded answers are
            falling back to `source: 'none'` (no facts) — citation density
            will drop sharply.
          dashboard: "{{ .ExternalURL }}/d/chat-latency"
          runbook: "https://github.com/Tim-Kraken/InnovMind/blob/main/docs/CHAOS_RUNBOOKS.md#chat-websearch-fallback"
