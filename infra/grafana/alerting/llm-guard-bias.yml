# Prometheus Alertmanager rules — LLM Guard resilience + per-locale bias monitoring (AI Act Art.10)
#
# Loaded by the Prometheus instance defined in infra/grafana/prometheus.yml via the
#   rule_files: - /etc/prometheus/alerting/*.yml
# glob. The directory is mounted ./alerting:/etc/prometheus/alerting:ro both locally
# (infra/grafana/docker-compose.yml) and in prod (museum-backend/deploy/docker-compose.prod.yml),
# so any *.yml dropped here is loaded automatically — no compose edit required.
#
# Routing (via infra/grafana/alertmanager.yml, which routes on `severity` only):
#   - severity: critical  → telegram-ops-critical receiver
#   - severity: warning   → telegram-ops-warning receiver (default leg)
#
# Moved 2026-05-26 (WAVE 4) from docs/observability/alerts-llm-guard.yml — this is
# Prometheus alert CONFIG, not docs, and while it lived under docs/ it was never
# globbed/mounted, so every rule below was silently inert (false AI Act Art.10 coverage).
#
# Audit corrections applied in the same move (WAVE 4):
#   - REMOVED LLMGuardScanErrorsHigh: it referenced two scan error/attempt counters
#     that prometheus-metrics.ts never emits. Error/timeout coverage is already
#     provided by LLMGuardLatencyHigh/Critical + LLMGuardBreakerOpen below.
#   - REMOVED the guardrail-cost group (GuardrailCostNear/Breached): its Phase 1B
#     cost counter was never shipped. LLM cost is alerted elsewhere
#     (llm_cost_breaker_open in llm-cost.yml). A loaded file holds only LIVE rules.
#   - FIXED the guardrail-decisions label-value: the only call-site
#     (bias-metrics.helper.ts:48) emits "blocked"/"allowed", so every selector now
#     uses decision="blocked" (the prior value matched no series, leaving the AI
#     Act Art.10 core rules silently dead even once loaded).
#
# Last reviewed: 2026-05-26
# Related ADRs: ADR-015, ADR-047, ADR-048
#
# Threshold rationale:
#   - p95 600 ms warning / 800 ms critical: aligned with design.md §9.5 + Companion OPS_INCIDENT_LLM_GUARD §1.
#   - Block-rate 2× warning / 3× critical: per compliance-research-bias-monitoring.md §4 (Meta-Arabic precedent).
#   - Baseline = avg(per-locale), NOT global rate (research methodological trap, §4 same doc).
#   - decision label value is "blocked" (bias-metrics.helper.ts:48), NOT "block".

groups:
  # ──────────────────────────────────────────────────────────────────────
  # 1. LLM Guard sidecar resilience
  # ──────────────────────────────────────────────────────────────────────
  - name: llm-guard-resilience
    interval: 30s
    rules:
      - alert: LLMGuardLatencyHigh
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(musaium_llm_guard_scan_duration_seconds_bucket[5m]))
          ) > 0.6
        for: 2m
        labels:
          severity: warning
          team: musaium-backend
          subsystem: guardrail
        annotations:
          summary: "LLM Guard sidecar p95 latency above 600 ms"
          description: "p95 scan latency is {{ $value | humanizeDuration }} over the last 5 min. Breaker trip is approaching."
          runbook: "https://github.com/innov-mind/musaium/blob/main/docs/RUNBOOKS/guardrail-incidents.md#s2--sidecar-partial-degradation-slow-but-alive"

      - alert: LLMGuardLatencyCritical
        expr: |
          histogram_quantile(0.95,
            sum by (le) (rate(musaium_llm_guard_scan_duration_seconds_bucket[5m]))
          ) > 0.8
        for: 2m
        labels:
          severity: critical
          team: musaium-backend
          subsystem: guardrail
        annotations:
          summary: "LLM Guard sidecar p95 latency above 800 ms — breaker imminent"
          description: "p95 = {{ $value | humanizeDuration }}. Default LLM_GUARD_TIMEOUT_MS = 1500 ms; we are within margin of timeout."
          runbook: "https://github.com/innov-mind/musaium/blob/main/docs/RUNBOOKS/guardrail-incidents.md#s2--sidecar-partial-degradation-slow-but-alive"

      - alert: LLMGuardBreakerOpen
        expr: musaium_llm_guard_circuit_breaker_state{state="open"} == 1
        for: 30s
        labels:
          severity: critical
          team: musaium-backend
          subsystem: guardrail
          page: "true"
        annotations:
          summary: "LLM Guard circuit breaker is OPEN — chat returning service_unavailable"
          description: "Fail-CLOSED is active on 100 % of chat requests. Either sidecar is down (S1) or breaker view is stale (S3)."
          runbook: "https://github.com/innov-mind/musaium/blob/main/docs/RUNBOOKS/guardrail-incidents.md#s1--sidecar-down-complete"

      - alert: LLMGuardSkipsRateHigh
        expr: rate(musaium_llm_guard_circuit_breaker_skips_total[5m]) > 1
        for: 5m
        labels:
          severity: warning
          team: musaium-backend
          subsystem: guardrail
        annotations:
          summary: "LLM Guard skips (breaker OPEN passes) > 1/s sustained"
          description: "Either breaker has been OPEN for > 5 min OR oscillating CLOSED↔OPEN (death-spiral pattern S2 §3.5)."
          runbook: "https://github.com/innov-mind/musaium/blob/main/docs/OPS_INCIDENT_LLM_GUARD.md#35-surge--death-spiral-pattern"

      # Removed 2026-05-26 (WAVE 4): LLMGuardScanErrorsHigh referenced two LLM-Guard
      # scan error/attempt counters that prometheus-metrics.ts never emits. Error and
      # timeout coverage is provided by LLMGuardLatencyHigh/Critical + LLMGuardBreakerOpen above.

      - alert: GuardrailBlockRateSpike
        expr: |
          (sum(rate(musaium_guardrail_decisions_total{decision="blocked"}[5m]))
           / sum(rate(musaium_guardrail_decisions_total[5m]))) > 0.05
        for: 5m
        labels:
          severity: warning
          team: musaium-backend
          subsystem: guardrail
        annotations:
          summary: "Global guardrail block rate > 5 %"
          description: "May be a deploy regression, an attack wave, or a corpus event. Drill into per-locale breakdown."
          runbook: "https://github.com/innov-mind/musaium/blob/main/docs/RUNBOOKS/guardrail-incidents.md#s4--false-positive-surge"

  # ──────────────────────────────────────────────────────────────────────
  # 2. Per-locale bias monitoring (RC4 — design.md §13)
  #
  # NOTE: baseline = avg(per-locale) NOT global block rate.
  # Per compliance-research-bias-monitoring.md §4 methodological trap:
  #   if AR traffic is 5 % of volume but 30 % of blocks, the global
  #   average is INFLATED by the AR anomaly itself, masking the alert.
  # ──────────────────────────────────────────────────────────────────────
  - name: bias-monitoring
    interval: 5m
    rules:
      # Recording rule: per-locale block rate (1h rolling).
      - record: musaium:guardrail_block_rate_per_locale:1h
        expr: |
          sum by (locale) (rate(musaium_guardrail_decisions_total{decision="blocked"}[1h]))
          / sum by (locale) (rate(musaium_guardrail_decisions_total[1h]))

      # Recording rule: equal-weighted average across locales (the correct baseline).
      - record: musaium:guardrail_block_rate_avg_locales:1h
        expr: avg(musaium:guardrail_block_rate_per_locale:1h)

      - alert: BiasLocalBlockRateDrift
        expr: |
          (musaium:guardrail_block_rate_per_locale:1h > 0.10)
          and on(locale)
          (
            musaium:guardrail_block_rate_per_locale:1h
            / on() group_left() musaium:guardrail_block_rate_avg_locales:1h
            > 2.0
          )
        for: 24h
        labels:
          severity: warning
          team: musaium-backend
          subsystem: bias
        annotations:
          summary: "Locale {{ $labels.locale }} block rate is 2× the per-locale average — 24 h sustained"
          description: "Block rate for {{ $labels.locale }} = {{ $value | humanizePercentage }}. Investigate per S4 — distinguish FP inflation vs legitimate concentration."
          runbook: "https://github.com/innov-mind/musaium/blob/main/docs/RUNBOOKS/guardrail-incidents.md#s4--false-positive-surge"

      - alert: BiasLocalBlockRateDriftCritical
        expr: |
          (musaium:guardrail_block_rate_per_locale:1h > 0.15)
          and on(locale)
          (
            musaium:guardrail_block_rate_per_locale:1h
            / on() group_left() musaium:guardrail_block_rate_avg_locales:1h
            > 3.0
          )
        for: 24h
        labels:
          severity: critical
          team: musaium-backend
          subsystem: bias
        annotations:
          summary: "Locale {{ $labels.locale }} block rate is 3× the per-locale average — same-day triage required"
          description: "Persistent 3× deviation. AI Act Art. 10 §2(f) bias-examination evidence required. Postmortem mandatory."
          runbook: "https://github.com/innov-mind/musaium/blob/main/docs/compliance/FAIRNESS_METRICS_PLAN.md"

      - alert: BiasLocaleDominance
        expr: |
          (
            sum by (locale) (rate(musaium_guardrail_decisions_total{decision="blocked"}[1h]))
            / on() group_left() sum(rate(musaium_guardrail_decisions_total{decision="blocked"}[1h]))
          ) > 0.5
        for: 1h
        labels:
          severity: warning
          team: musaium-backend
          subsystem: bias
        annotations:
          summary: "Locale {{ $labels.locale }} accounts for > 50 % of all guardrail blocks"
          description: "Locale dominance anomaly — suggests a systematic filter misconfiguration targeting this locale."
          runbook: "https://github.com/innov-mind/musaium/blob/main/docs/RUNBOOKS/guardrail-incidents.md#s4--false-positive-surge"

  # Removed 2026-05-26 (WAVE 4): the guardrail-cost group (GuardrailCostNear,
  # GuardrailCostBreached) referenced a Phase 1B guardrail cost counter that was
  # never shipped (0 matches in museum-backend/src/). LLM cost is already alerted
  # via llm_cost_breaker_open in llm-cost.yml; this file holds only live rules
  # (no dormant no-data alerts that simulate non-existent coverage).
