# /team reviewer 5-axis quality regression — T1.5 ROADMAP_TEAM (KR3)
# Runs the reviewer agent against a 20-feature corpus and asserts axis scores
# are within ±5pts of the baseline.
#
# Local run:
#   cd .claude/skills/team/team-promptfoo
#   npx promptfoo eval --output output.json
#   ../lib/quality-regression.sh output.json baseline-scores.json
#
# CI: .github/workflows/team-quality-regression.yml (cron weekly).
#
# Offline (no OpenAI key): the eval shim returns deterministic mock scores —
# regression detection still runs against the same mock to catch harness drift.
# Set OPENAI_API_KEY (already used by Musaium backend) to switch to real
# reviewer scoring. Default model = gpt-4o, override via REVIEWER_EVAL_MODEL.
# Provider was Anthropic until 2026-05-14 ; swapped because repo has no
# ANTHROPIC_API_KEY secret (T1.5b ROADMAP_TEAM unblock).

description: '/team reviewer 5-axis quality regression vs 20-feature corpus'

providers:
  - id: 'exec:bash ../lib/reviewer-eval-shim.sh'
    config:
      timeoutMs: 120000

prompts:
  - 'feature_id={{feature_id}}|category={{category}}|description={{description}}|diff={{diff_excerpt}}|spec={{spec_excerpt}}'

tests: file://corpus.json

# The shim emits reviewer JSON as a single stdout line. Each `javascript` assert
# receives `output` as that RAW STRING — so we parse it in-assert rather than via
# provider `transformResponse: 'JSON.parse(output)'`, which recent promptfoo no
# longer applies to the `output` seen by javascript asserts (the bare-expression
# form silently no-ops, leaving `output` a string → `output.scoresOnFiveAxes`
# undefined → every assert failed, 0/20 for a month). The `typeof …=== "string"`
# guard keeps this correct if a future promptfoo pre-parses `output` to an object.
defaultTest:
  assert:
    - type: javascript
      value: |
        const o = typeof output === "string" ? JSON.parse(output) : output;
        return o.scoresOnFiveAxes && typeof o.scoresOnFiveAxes.weightedMean === "number";
    - type: javascript
      value: |
        const o = typeof output === "string" ? JSON.parse(output) : output;
        return o.scoresOnFiveAxes.weightedMean >= 0 && o.scoresOnFiveAxes.weightedMean <= 100;
    - type: javascript
      value: |
        const o = typeof output === "string" ? JSON.parse(output) : output;
        return ["correctness","security","maintainability","testCoverage","docQuality"].every(k => typeof o.scoresOnFiveAxes[k]?.score === "number");
