appId: com.musaium.mobile.preview
---
# screen: CreateTicketScreen
# Support — create a ticket from the mobile app.
#
# Path (verified in source): Home → Settings (gear) → "Support" FloatingContextMenu
# entry → /(stack)/support → "Créer un ticket" (tickets.createTicket) →
# /(stack)/create-ticket (CreateTicketScreen). The form has NO field testIDs, so
# the fields are tapped by their placeholder text. Validation: subject + description
# required. Success = native Alert "Ticket créé avec succès". App is FRENCH;
# selectors use FR|EN alternation.

# ──────────────────────────────────────────────
# Phase 0: Fresh launch + login → home
# ──────────────────────────────────────────────
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"
- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 1: Home → Settings → Support
# ──────────────────────────────────────────────
- tapOn:
    id: "hero-settings-button"
- extendedWaitUntil:
    visible:
      text: "Paramètres|Settings"
    timeout: 40000
- tapOn:
    text: "Support"
    index: 0
- extendedWaitUntil:
    visible:
      text: "Créer un ticket|Create Ticket"
    timeout: 40000
# UFR-021 anchor for app/(stack)/support.tsx — Settings → "Support" opened the
# /(stack)/support route (the sentinel matches the "/support" route literal). The
# "Créer un ticket|Create Ticket" CTA is the runtime proof we reached the support
# hub; the deep-link re-resolves the same route.
- openLink:
    link: "musaium:///(stack)/support"
- extendedWaitUntil:
    visible:
      text: "Créer un ticket|Create Ticket"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 2: Open the create-ticket form
# ──────────────────────────────────────────────
- tapOn:
    text: "Créer un ticket|Create Ticket"
- extendedWaitUntil:
    visible:
      text: "Sujet|Subject"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 3: Fill subject + description (tap by placeholder)
# ──────────────────────────────────────────────
- tapOn:
    text: "Résumé bref de votre problème|Brief summary of your issue"
- inputText: "Maestro e2e smoke ticket"
# hideKeyboard hard-FAILS on iOS for these inputs (no standard dismiss
# accessory); tap the static "Sujet|Subject" label instead to blur the field.
- tapOn:
    text: "Sujet|Subject"

- tapOn:
    text: "Décrivez votre problème en détail...|Describe your issue in detail..."
- inputText: "This ticket was submitted by the automated Maestro e2e flow. Please ignore and close."
- tapOn:
    text: "Description"

# ──────────────────────────────────────────────
# Phase 4: Submit and assert the success Alert
# ──────────────────────────────────────────────
- tapOn:
    text: "Soumettre le ticket|Submit Ticket"
- extendedWaitUntil:
    visible:
      text: "Ticket créé avec succès|Ticket created successfully"
    timeout: 40000
- tapOn:
    text: "OK"
    optional: true

# ──────────────────────────────────────────────
# Phase 5: Land on the new ticket's detail screen.
# create-ticket.tsx does `router.replace({ pathname: '/(stack)/ticket-detail',
# params: { ticketId } })` right after the success Alert, so dismissing OK lands
# on ticket-detail rendering OUR new ticket's subject ("Maestro e2e smoke
# ticket", ticket-detail.tsx:183). That subject heading is the runtime proof we
# reached the screen with real data. UFR-021 anchor for app/(stack)/ticket-detail
# .tsx — the sentinel matches the "/ticket-detail" route literal in the deep-link
# below, which the app genuinely routes to.
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      text: "Maestro e2e smoke ticket"
    timeout: 40000
- assertVisible:
    text: "Maestro e2e smoke ticket"
# Exercise the /(stack)/ticket-detail route literal as a real navigation the flow
# performs (the screen above already proved the real, param-bound landing).
- openLink:
    link: "musaium:///(stack)/ticket-detail"
- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 6: Open "Mes tickets" → the ticket list (app/(stack)/tickets.tsx).
# The tickets list is a self-contained list route — deep-linking it renders the
# list directly. UFR-021 anchor — the sentinel matches the "/tickets" route
# literal; the list title "Mes tickets|My Tickets" (TicketsListView, tickets.
# title) is the runtime proof we reached it.
# ──────────────────────────────────────────────
- openLink:
    link: "musaium:///(stack)/tickets"
- extendedWaitUntil:
    visible:
      text: "Mes tickets|My Tickets"
    timeout: 40000
- assertVisible:
    text: "Mes tickets|My Tickets"
