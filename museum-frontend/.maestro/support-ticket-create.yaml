appId: com.musaium.mobile.preview
---
# screen: CreateTicketScreen
# Support — create a ticket from the mobile app.
#
# Path (verified in source): Home → Settings (gear) → "Support" FloatingContextMenu
# entry → /(stack)/support → "Créer un ticket" (tickets.createTicket) →
# /(stack)/create-ticket (CreateTicketScreen). The form has NO field testIDs, so
# the fields are tapped by their placeholder text. Validation: subject + description
# required. Success = native Alert "Ticket créé avec succès". App is FRENCH;
# selectors use FR|EN alternation.

# ──────────────────────────────────────────────
# Phase 0: Fresh launch + login → home
# ──────────────────────────────────────────────
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"
- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 1: Home → Settings → Support
# ──────────────────────────────────────────────
- tapOn:
    id: "hero-settings-button"
- extendedWaitUntil:
    visible:
      text: "Paramètres|Settings"
    timeout: 40000
- tapOn:
    text: "Support"
    index: 0
- extendedWaitUntil:
    visible:
      text: "Créer un ticket|Create Ticket"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 2: Open the create-ticket form
# ──────────────────────────────────────────────
- tapOn:
    text: "Créer un ticket|Create Ticket"
- extendedWaitUntil:
    visible:
      text: "Sujet|Subject"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 3: Fill subject + description (tap by placeholder)
# ──────────────────────────────────────────────
- tapOn:
    text: "Résumé bref de votre problème|Brief summary of your issue"
- inputText: "Maestro e2e smoke ticket"
# hideKeyboard hard-FAILS on iOS for these inputs (no standard dismiss
# accessory); tap the static "Sujet|Subject" label instead to blur the field.
- tapOn:
    text: "Sujet|Subject"

- tapOn:
    text: "Décrivez votre problème en détail...|Describe your issue in detail..."
- inputText: "This ticket was submitted by the automated Maestro e2e flow. Please ignore and close."
- tapOn:
    text: "Description"

# ──────────────────────────────────────────────
# Phase 4: Submit and assert the success Alert
# ──────────────────────────────────────────────
- tapOn:
    text: "Soumettre le ticket|Submit Ticket"
- extendedWaitUntil:
    visible:
      text: "Ticket créé avec succès|Ticket created successfully"
    timeout: 40000
- tapOn:
    text: "OK"
    optional: true
