appId: com.musaium.mobile.preview
---
# KNOWN-BLOCKED (local sim Release): requires a backend-seeded one-time
# reset-password token. No local mechanism seeds such tokens for the Release
# binary, so submit is rejected and the success state is never reached. The
# success assert + CTA tap are made optional so the flow still exercises the
# reset-password screen (deep-link mount + form fill + submit wiring).
# screen: ResetPasswordScreen
#
# Universal/App Link in-app routing (TD-RNAV-01 cycle 2) — reset-password happy
# path (UFR-021 coverage for /(stack)/reset-password).
#
# The OS-level HTTPS Universal-Link hand-off is a post-deploy operator gate
# (not automatable in CI). This flow exercises the in-app SCREEN behaviour via
# the custom `musaium:` scheme + a fixture token: this is the INTERACTIVE
# variant — fill the new-password + confirm fields, submit, reach success, tap
# the post-success login CTA.
#
# A backend test account + a valid one-time reset-password token must be seeded
# before a live run (otherwise the API rejects the token and the success state
# never renders). The new password is a strong NON-breached value so the
# backend strength/HIBP check does not reject it.

- launchApp:
    clearState: false

- waitForAnimationToEnd

# Analytics consent banner can appear on a fresh launch — dismiss if present.
# clearState:false => the banner is NOT guaranteed (prior consent persists), so
# this stays optional rather than a hard banner wait.
- tapOn:
    id: "analytics-consent-decline"
    optional: true

# ──────────────────────────────────────────────
# Reach the reset-password route via deep-link with a fixture token
# ──────────────────────────────────────────────
- openLink:
    link: "musaium:///(stack)/reset-password?token=e2e-reset-token"
- waitForAnimationToEnd:
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "reset-password-new"
    timeout: 40000

# ──────────────────────────────────────────────
# Fill the new password + confirmation, then submit
# ──────────────────────────────────────────────
- tapOn:
    id: "reset-password-new"
- inputText: "Mx7$kq2Lp9vRt4Wz"
- hideKeyboard

- tapOn:
    id: "reset-password-confirm"
- inputText: "Mx7$kq2Lp9vRt4Wz"
- hideKeyboard

- tapOn:
    id: "reset-password-submit"
- waitForAnimationToEnd:
    timeout: 10000

# ──────────────────────────────────────────────
# Success state -> post-success login CTA. OPTIONAL (KNOWN-BLOCKED — no valid
# local token, so the backend rejects submit and success never renders).
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "reset-password-success"
    timeout: 40000
    optional: true
- tapOn:
    id: "reset-password-cta"
    optional: true
- waitForAnimationToEnd:
    timeout: 10000
