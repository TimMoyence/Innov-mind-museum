appId: com.musaium.mobile.preview
---
# KNOWN-BLOCKED (local sim Release): requires a backend-seeded one-time
# confirm-email-change token. No local mechanism seeds such tokens for the
# Release binary, so auto-submit hits an invalid token and the success state is
# never reached. Success assert + CTA tap are optional so the screen-mount +
# auto-submit wiring is still exercised.
# screen: ConfirmEmailChangeScreen
#
# Universal/App Link in-app routing (TD-RNAV-01 cycle 2) — confirm-email-change
# happy path (UFR-021 coverage for /(stack)/confirm-email-change).
#
# The OS-level HTTPS Universal-Link hand-off is a post-deploy operator gate
# (not automatable in CI). This flow exercises the in-app SCREEN behaviour via
# the custom `musaium:` scheme + a fixture token: auto-submit on mount, reach
# the success state, tap the post-success CTA.
#
# A backend test account + a valid one-time confirm-email-change token must be
# seeded before a live run.

- launchApp:
    clearState: false

- waitForAnimationToEnd

# Analytics consent banner can appear on a fresh launch — dismiss if present.
# clearState:false => the banner is NOT guaranteed (prior consent persists), so
# this stays optional rather than a hard banner wait.
- tapOn:
    id: "analytics-consent-decline"
    optional: true

# ──────────────────────────────────────────────
# Reach the confirm-email-change route via deep-link with a fixture token
# ──────────────────────────────────────────────
- openLink:
    link: "musaium:///(stack)/confirm-email-change?token=e2e-confirm-token"
- waitForAnimationToEnd:
    timeout: 10000

# ──────────────────────────────────────────────
# Auto-submit resolves -> success state
# (requires a seeded valid one-time confirm-email-change token; otherwise
#  the screen renders confirm-email-change-invalidToken instead and this fails)
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "confirm-email-change-success"
    timeout: 40000
    optional: true
# Post-success CTA (optional — KNOWN-BLOCKED, no valid local token).
- tapOn:
    id: "confirm-email-change-cta"
    optional: true
- waitForAnimationToEnd:
    timeout: 10000
