appId: com.musaium.mobile.preview
---
# screen: ConfirmEmailChangeScreen
#
# Universal/App Link in-app routing (TD-RNAV-01 cycle 2) — confirm-email-change
# happy path (UFR-021 coverage for /(stack)/confirm-email-change).
#
# The OS-level HTTPS Universal-Link hand-off is a post-deploy operator gate
# (not automatable in CI). This flow exercises the in-app SCREEN behaviour via
# the custom `musaium:` scheme + a fixture token: auto-submit on mount, reach
# the success state, tap the post-success CTA.
#
# A backend test account + a valid one-time confirm-email-change token must be
# seeded before a live run.

- launchApp:
    clearState: false

- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Reach the confirm-email-change route via deep-link with a fixture token
# ──────────────────────────────────────────────
- openLink:
    link: "musaium:///(stack)/confirm-email-change?token=e2e-confirm-token"
- waitForAnimationToEnd:
    timeout: 10000

# ──────────────────────────────────────────────
# Auto-submit resolves -> success state
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "confirm-email-change-success"
    timeout: 10000

# ──────────────────────────────────────────────
# Tap THROUGH the happy path: the post-success CTA
# ──────────────────────────────────────────────
- tapOn:
    id: "confirm-email-change-cta"
- waitForAnimationToEnd:
    timeout: 10000
