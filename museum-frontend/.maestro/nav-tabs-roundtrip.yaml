appId: com.musaium.mobile.preview
---
# Tab navigation — Roundtrip across all 3 tabs
#
# NOTE: The bottom tab bar only exposes 3 tabs (see app/(tabs)/_layout.tsx):
#   - Dashboard (Tableau de bord)
#   - Museums   (Musées)
#   - Home      (Accueil)
# There are NO "Discover", "Carnet", or "Settings" tabs — those are stack
# routes reached via Home (settings gear / carnet link / intent chips).
# This flow only exercises the 3 real tabs to catch tab-bar regressions.
#
# Tabs have no testIDs (expo-router Tabs.Screen title from i18n), so we tap by
# the FR|EN label and assert a screen-unique marker per tab.

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000

- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"

# ──────────────────────────────────────────────
# Phase 0: Authenticate, land on Home
# ──────────────────────────────────────────────
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"

- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    id: "analytics-consent-decline"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true

- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 1: Dashboard tab
# ──────────────────────────────────────────────
- tapOn:
    text: ".*(Tableau de bord|Dashboard).*"
- extendedWaitUntil:
    visible:
      text: "Commencer une nouvelle conversation|Start a new conversation"
    timeout: 15000

# ──────────────────────────────────────────────
# Phase 2: Museums tab
# ──────────────────────────────────────────────
- tapOn:
    text: ".*(Musées|Museums).*"
- extendedWaitUntil:
    visible:
      text: "Musées à proximité|Nearby Museums"
    timeout: 15000

# ──────────────────────────────────────────────
# Phase 3: Home tab (return)
# ──────────────────────────────────────────────
- tapOn:
    text: ".*(Accueil|Home).*"
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 15000

# ──────────────────────────────────────────────
# Phase 4: Re-confirm round-trip — tap Dashboard then Home again
# (catches stuck-tab regressions on a second tap)
# ──────────────────────────────────────────────
- tapOn:
    text: ".*(Tableau de bord|Dashboard).*"
- extendedWaitUntil:
    visible:
      text: "Commencer une nouvelle conversation|Start a new conversation"
    timeout: 15000

- tapOn:
    text: ".*(Accueil|Home).*"
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 15000
