appId: com.musaium.mobile.preview
---
# Auth — Register (happy path)
#
# Fill all registration fields with valid data, accept GDPR, submit.
# Expect either onboarding/home navigation (auto-login) OR an
# "email verification pending" message (depending on backend config).
#
# Prerequisites:
#   - Backend running (docker-compose, localhost:3000)
#   - Development build installed (bundle id com.musaium.mobile.preview)
#   - App freshly launched (not logged in)
#   - Frontend i18n falls back to EN when device locale is not FR — assertions
#     therefore accept both EN and FR via regex when text-based.
#
# Identity:
#   - Email: maestro+register-${MAESTRO_RUN_ID}@local.dev   (unique per run)
#   - Password: MuseumMaestro!2026X                          (complex, not in breach corpus)
#   - DOB: 10/08/1994                                        (FR DD/MM/YYYY format, parser accepts it)

# ──────────────────────────────────────────────
# Phase 1: Reach auth screen (login mode by default)
# ──────────────────────────────────────────────
- waitForAnimationToEnd
- assertVisible:
    text: "Welcome back|Bon retour"

# ──────────────────────────────────────────────
# Phase 2: Switch to register mode
# ──────────────────────────────────────────────
- tapOn:
    text: "No account\\? Sign up|Pas de compte \\? S'inscrire"
- waitForAnimationToEnd
- assertVisible:
    text: "Create your account|Créez votre compte"

# ──────────────────────────────────────────────
# Phase 3: Fill registration form
# ──────────────────────────────────────────────

# First name (no testID — match by placeholder text)
- tapOn:
    text: "First name|Prénom"
- inputText: "Maestro"

# Last name
- tapOn:
    text: "Last name|Nom"
- inputText: "Tester"

# Email — unique per concurrent run via MAESTRO_RUN_ID env, default if unset
- tapOn:
    id: "email-input"
- inputText: "maestro+register-${MAESTRO_RUN_ID:-default}@local.dev"

# Password (complex, not in breach corpus)
- tapOn:
    id: "password-input"
- inputText: "MuseumMaestro!2026X"

# Date of birth (DD/MM/YYYY — accepted by parseDateOfBirth)
- tapOn:
    id: "date-of-birth-input"
- inputText: "10/08/1994"

# Hide keyboard before tapping GDPR checkbox / submit
- hideKeyboard

# Accept GDPR (matches both FR + EN consent label, no dedicated testID)
- tapOn:
    text: "I agree to the.*|J'accepte les.*"

# Scroll to make submit reachable on small simulators, then submit
- scrollUntilVisible:
    element:
      id: "auth-submit"
    direction: DOWN
    timeout: 5000

- tapOn:
    id: "auth-submit"

# ──────────────────────────────────────────────
# Phase 4: Verify post-registration state
# ──────────────────────────────────────────────
# Backend can be configured two ways:
#   (a) Auto-login → app navigates to onboarding or home
#   (b) Email verification required → info banner "Inscription terminée" /
#       "Registration complete. Please log in." stays on auth screen
#
# We accept BOTH outcomes — failure means neither appeared after 15s.
- waitForAnimationToEnd:
    timeout: 10000

- extendedWaitUntil:
    visible:
      text: "Your museum companion|Votre compagnon de musée|Skip|Passer|Inscription terminée|Registration complete"
    timeout: 15000

# Sanity: the registration form ("Create your account") MUST NOT be visible
# anymore (either we navigated away, or we flipped back to login mode).
- assertNotVisible:
    text: "Create your account|Créez votre compte"
