appId: com.musaium.mobile.preview
---
# screen: PreferencesScreen
# Settings → Preferences — switch locale (fr ↔ en) and verify the UI re-renders.
#
# The language buttons render each option's NATIVE label ("Français" / "English"),
# which is locale-INDEPENDENT (always shown regardless of the active locale), so we
# tap those literals directly. To verify the switch took effect we assert on the
# Preferences screen TITLE, which IS localized: EN "Preferences" vs FR "Préférences".
# App starts in French, so the title begins as "Préférences".

# ──────────────────────────────────────────────
# Phase 0: Fresh launch + login → home
# ──────────────────────────────────────────────
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"
- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 1: Home → Settings → Préférences
# (Settings reached via the home gear; Préférences is the first
# FloatingContextMenu item, tappable by its label.)
# ──────────────────────────────────────────────
- tapOn:
    id: "hero-settings-button"
- extendedWaitUntil:
    visible:
      text: "Paramètres|Settings"
    timeout: 40000
- tapOn:
    text: "Préférences|Preferences"
    index: 0
- extendedWaitUntil:
    visible:
      text: "Préférences|Preferences"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 2: Switch to English, assert the EN title appears.
# The language Pressable's accessibilityLabel (a11y.preferences.language_button,
# "Sélectionner la langue English" / "Select English language") COLLAPSES the
# subtree, so the visible "English" Text is NOT separately queryable — match the
# accessibility label via a substring regex that works in either active locale.
# ──────────────────────────────────────────────
- tapOn:
    text: ".*English.*"
- extendedWaitUntil:
    visible:
      text: "Preferences"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 3: Switch back to Français, assert the FR title returns
# ──────────────────────────────────────────────
- tapOn:
    text: ".*Français.*"
- extendedWaitUntil:
    visible:
      text: "Préférences"
    timeout: 40000
