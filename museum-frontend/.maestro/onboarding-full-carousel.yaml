appId: com.musaium.mobile.preview
---
# Onboarding — Full 4-slide carousel walkthrough
#
# Validates the V2 Spec B onboarding carousel:
#   1. Greeting:     "Welcome to Musaium"
#   2. Museum mode:  "Museum mode"
#   3. Camera intent:"Photograph artworks"
#   4. Walk intent:  "Guided walks"
#
# Flow:
#   - Fresh install (clearState).
#   - Login via helper to get an authenticated session
#     (so handleComplete -> markOnboardingComplete hits the server path).
#   - Re-trigger onboarding from Settings → "Onboarding Help" (settings
#     route '/(stack)/onboarding') — this is the only deterministic way
#     to reach the carousel for a seeded test account whose
#     hasSeenOnboarding flag may already be true.
#   - Walk forward via "Next" 3 times → on slide 4 the button label
#     flips to "Get Started" → tap it → expect home.
#
# Regression catches:
#   - Renamed/missing slide titles (translation key drift).
#   - Broken Next button (state machine stuck on currentStep).
#   - Get Started label not switching on last slide (isLast logic).
#   - handleComplete crash on authenticated path.

- launchApp:
    clearState: true
    stopApp: true

- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 1: Authenticate
# ──────────────────────────────────────────────
- runFlow:
    when:
      visible: "Welcome back"
    file: helpers/quick-login.yaml

# Helper may have already dismissed onboarding via Skip.
# We force the carousel via Settings for determinism.
- extendedWaitUntil:
    visible: "Your museum companion"
    timeout: 15000

# ──────────────────────────────────────────────
# Phase 2: Reach the carousel via Settings → Onboarding Help
# ──────────────────────────────────────────────
- tapOn:
    id: "hero-settings-button"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Settings"
    timeout: 5000

- scrollUntilVisible:
    element:
      text: "Onboarding Help"
    direction: DOWN

- tapOn: "Onboarding Help"
- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 3: Slide 1 — Greeting
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible: "Welcome to Musaium"
    timeout: 5000

- assertVisible: "Skip"
- assertVisible: "Next"

- tapOn: "Next"
- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 4: Slide 2 — Museum mode
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible: "Museum mode"
    timeout: 5000

- assertVisible: "Next"
- tapOn: "Next"
- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 5: Slide 3 — Camera intent
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible: "Photograph artworks"
    timeout: 5000

- assertVisible: "Next"
- tapOn: "Next"
- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 6: Slide 4 — Walk intent (last slide, Get Started CTA)
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible: "Guided walks"
    timeout: 5000

# On the last slide the primary button MUST switch label from "Next" to
# "Get Started". This is the isLast assertion contract.
- assertVisible: "Get Started"
- assertNotVisible: "Next"

- tapOn: "Get Started"
- waitForAnimationToEnd:
    timeout: 8000

# ──────────────────────────────────────────────
# Phase 7: Verify we land on home
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible: "Your museum companion"
    timeout: 15000

- assertNotVisible: "Welcome to Musaium"
- assertNotVisible: "Authentication required"
