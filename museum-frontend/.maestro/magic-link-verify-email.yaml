appId: com.musaium.mobile.preview
---
# screen: VerifyEmailScreen
#
# Universal/App Link in-app routing (TD-RNAV-01 cycle 2) — verify-email happy
# path (UFR-021 coverage for /(stack)/verify-email).
#
# The OS-level HTTPS Universal-Link hand-off is a post-deploy operator gate
# (not automatable in CI). This flow exercises the in-app SCREEN behaviour via
# the custom `musaium:` scheme + a fixture token: the screen auto-submits the
# token on mount, reaches the success state, and we tap the post-success CTA.
#
# A backend test account + a valid one-time verify-email token must be seeded
# before a live run (same caveat as mfa-enroll-flow.yaml).

- launchApp:
    clearState: false

- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Reach the verify-email route via deep-link with a fixture token
# ──────────────────────────────────────────────
- openLink:
    link: "musaium:///(stack)/verify-email?token=e2e-verify-token"
- waitForAnimationToEnd:
    timeout: 10000

# ──────────────────────────────────────────────
# Auto-submit resolves -> success state
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "verify-email-success"
    timeout: 10000

# ──────────────────────────────────────────────
# Tap THROUGH the happy path: the post-success CTA
# ──────────────────────────────────────────────
- tapOn:
    id: "verify-email-cta"
- waitForAnimationToEnd:
    timeout: 10000
