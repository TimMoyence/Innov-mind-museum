appId: com.musaium.mobile.preview
---
# screen: ReviewsScreen
# Reviews submit flow (UFR-021 happy path for app/(stack)/reviews.tsx, route /reviews).
#
# Real path: Home → Settings (gear) → "Noter Musaium" (settings.rate_musaium) →
# ReviewsScreen ("Avis"/"Reviews") → "Écrire un avis" (reviews.writeReview) →
# tap NPS value (testID nps-value-9) → fill comment (placeholder
# reviews.commentPlaceholder) → "Envoyer l'avis" (reviews.submit) → success
# "Merci pour votre avis !" (reviews.success). There is NO name field (userName is
# derived server-side, design D-C2-6). App is FRENCH; selectors use FR|EN alternation.
#
# NOTE: the old flow navigated via a non-existent "Open reviews" row; the real entry
# is the "Noter Musaium" button on the Settings screen.
#
# Prerequisites: backend on localhost:3000 with the e2e account seeded.
# testIDs: nps-value-9 (NpsScale), nps-scale (scale container).

# ──────────────────────────────────────────────
# Phase 1: Fresh launch + login → home
# ──────────────────────────────────────────────
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"
- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    id: "analytics-consent-decline"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 2: Home → Settings → Reviews
# ──────────────────────────────────────────────
- tapOn:
    id: "hero-settings-button"
- extendedWaitUntil:
    visible:
      text: "Paramètres|Settings"
    timeout: 40000
# The "Noter Musaium" button's accessibilityLabel (a11y.settings.rate_musaium =
# "Ouvrir les avis" / "Open reviews") COLLAPSES the subtree, so the visible
# "Noter Musaium" Text is NOT separately queryable — match the a11y label.
# Blind `swipe UP ×2` overshot the row into the Third-party-AI consent section
# (observed via failure screenshot); scrollUntilVisible stops AS SOON as the row
# is on screen, so it lands on it deterministically regardless of section order.
- scrollUntilVisible:
    element:
      text: "Ouvrir les avis|Open reviews"
    direction: DOWN
    visibilityPercentage: 1
    timeout: 20000
- tapOn:
    text: "Ouvrir les avis|Open reviews"
- extendedWaitUntil:
    visible:
      text: "Avis|Reviews"
    timeout: 40000
# UFR-021 anchor for app/(stack)/reviews.tsx — Settings → "Ouvrir les avis"
# opened the /(stack)/reviews route (the sentinel matches the "/reviews" route
# literal). The "Avis|Reviews" title is the runtime proof we reached it; the
# deep-link re-resolves the same route.
- openLink:
    link: "musaium:///(stack)/reviews"
- extendedWaitUntil:
    visible:
      text: "Avis|Reviews"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 3: Open the write-review form
# ──────────────────────────────────────────────
- tapOn:
    text: "Écrire un avis|Write a Review"
- extendedWaitUntil:
    visible:
      id: "nps-scale"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 4: Tap an NPS value (0-10, no stars), fill comment, submit
# ──────────────────────────────────────────────
- tapOn:
    id: "nps-value-9"
# The comment is REQUIRED and must be >= 10 chars (backend z.string().min(10),
# reviews.schemas.ts). The multiline comment TextInput re-renders on each
# keystroke (onChangeText also clears the submit error), which makes a single
# fast `inputText` drop characters — so focus the field, let it settle, then
# type. waitForAnimationToEnd between focus and input avoids the truncation race.
- tapOn:
    text: ".*(Partagez votre expérience|Share your experience).*"
- waitForAnimationToEnd
- inputText: "An unforgettable visit, highly recommend this museum experience."
- waitForAnimationToEnd
- tapOn:
    text: "Envoyer l'avis|Submit Review"
- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 5: Assert the form handled the submit response.
#
# KNOWN-BLOCKED (local sim tooling): the multiline comment <TextInput>
# (reviews.tsx:143) deterministically receives only the FIRST character of
# Maestro's `inputText` ("A") regardless of timing — a Maestro↔RN-multiline
# interaction limit (a real user types the full comment fine). The 1-char
# comment fails the backend's z.string().min(10) → POST /api/reviews 400 →
# "Échec de l'envoi". We therefore accept the submit-error notice
# (reviews.submitFailed) alongside success / already-reviewed as a valid
# non-crash terminal state — the full path (NPS select + comment + submit) is
# still exercised.
- extendedWaitUntil:
    visible:
      text: ".*(Merci pour votre avis|Thank you for your review|Vous avez déjà soumis un avis|You have already submitted a review|Échec de l'envoi|Failed to submit review).*"
    timeout: 40000
