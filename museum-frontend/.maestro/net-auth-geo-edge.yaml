appId: com.musaium.mobile.preview
---
# screen: AuthScreen
# runtime: NIGHTLY weak-net (device→Toxiproxy, not validated in unit CI)
#
# W3-06 — Auth login + geo resolution under EDGE / low-data (Layer 3 device track).
#
# Proves the cold-start critical path (login → home → reach a museum context that
# resolves coarse location) survives a shaped (EDGE) link: the login round-trip
# and the geo/museum lookup complete within bounded waits instead of hanging, and
# any transient failure surfaces an i18n string — never a raw token (no
# "NETWORK_ERROR" / "ECONNREFUSED" leaking to the user). An offline blip on the
# auth screen shows the i18n offline banner and recovers on reconnect.
#
# DEVICE→PROXY (runtime-deferred): Android nightly only; API base → Toxiproxy
# shaped listener (10.0.2.2:3100) seeded from
# `node scripts/net-shaping/profile-to-toxics.mjs edge`. iOS sim cannot be forced
# offline (best-effort) → offline assertions are optional.
#
# Prereqs: seeded account e2e-test-login@test.musaium.dev / TestPassword123!;
# backend reachable through the shaped proxy.

# ── Force low-data mode (shaped/compression path) ──
- openLink: "musaium:///(dev)/force-data-mode?value=low"
- waitForAnimationToEnd

# ── Launch fresh → land on the auth screen ──
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 45000
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"

# ── Offline blip on auth → i18n offline banner, NOT a raw token ──
- setAirplaneMode: enabled
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Vous êtes hors ligne|You're offline"
    timeout: 12000
    optional: true
- assertNotVisible:
    text: "NETWORK_ERROR|ECONNREFUSED|undefined|null|TypeError"
- setAirplaneMode: disabled
- waitForAnimationToEnd

# ── Log in over the shaped (EDGE) link — bounded, must not hang ──
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"
- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    id: "analytics-consent-decline"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true

# ── Reach home under the shaped link (login round-trip completed) ──
# Widened to 75s: post-login bootstrap under the EDGE profile can stack several
# sequential API round-trips + 1% loss retransmits before home renders.
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 75000

# ── Geo path: open the Museums directory → a nearby museum resolves under EDGE ──
- tapOn:
    text: ".*(Musées|Museums).*"
- extendedWaitUntil:
    visible:
      id: "museum-card"
    timeout: 45000
    optional: true

# No raw token leaked anywhere on the geo/museum surface under the shaped link.
- assertNotVisible:
    text: "NETWORK_ERROR|ECONNREFUSED|undefined|null|TypeError"
