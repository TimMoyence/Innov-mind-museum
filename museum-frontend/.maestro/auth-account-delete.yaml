appId: com.musaium.mobile.preview
---
# Auth — Account deletion (login → settings → delete → confirm → logout)
#
# Login as the seeded smoke account, navigate to Settings → Danger Zone,
# tap "Delete account", confirm the native Alert, and expect to land back
# on the auth screen (auto-logout after backend success).
#
# WARNING: This flow DESTROYS the account it logs into. Use a dedicated
# deletable account, NOT the global TEST_EMAIL. Recommended:
#   cd museum-backend && pnpm seed:smoke-account -- \
#     --email=maestro+delete-${MAESTRO_RUN_ID}@local.dev \
#     --password=DeleteMe!2026X
# Then run this flow with:
#   MAESTRO_DELETE_EMAIL=maestro+delete-${MAESTRO_RUN_ID}@local.dev
#   MAESTRO_DELETE_PASSWORD=DeleteMe!2026X
#
# If those env vars are unset, the flow falls back to the .env TEST_EMAIL
# (apple.test@apple.com / Apple1234!) — re-seed after every run.
#
# Notes for maintainers (see AUTH_FLOWS_NOTES.md):
#   - "Delete account" Pressable in SettingsDangerZone has accessibilityLabel
#     `a11y.settings.delete_account` but NO testID. We tap by visible text
#     ("Supprimer le compte" / "Delete account").
#   - The confirmation is a native iOS/Android Alert (Alert.alert) — buttons
#     match by text ("Supprimer" / "Delete", "Annuler" / "Cancel").

# ──────────────────────────────────────────────
# Phase 1: Login
# ──────────────────────────────────────────────
- waitForAnimationToEnd
- assertVisible:
    text: "Welcome back|Bon retour"

- runScript:
    script: |
      output.email = (typeof MAESTRO_DELETE_EMAIL !== 'undefined' && MAESTRO_DELETE_EMAIL)
        ? MAESTRO_DELETE_EMAIL
        : 'apple.test@apple.com';
      output.password = (typeof MAESTRO_DELETE_PASSWORD !== 'undefined' && MAESTRO_DELETE_PASSWORD)
        ? MAESTRO_DELETE_PASSWORD
        : 'Apple1234!';

- tapOn:
    id: "email-input"
- inputText: "${output.email}"

- tapOn:
    id: "password-input"
- inputText: "${output.password}"

- hideKeyboard

- tapOn:
    id: "auth-submit"

- waitForAnimationToEnd:
    timeout: 10000

# Skip onboarding if it shows on first login
- tapOn:
    text: "Skip|Passer"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Your museum companion|Votre compagnon de musée"
    timeout: 10000

# ──────────────────────────────────────────────
# Phase 2: Navigate to Settings
# ──────────────────────────────────────────────
- tapOn:
    text: "Settings|Réglages|Paramètres"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Settings|Paramètres"
    timeout: 5000

# ──────────────────────────────────────────────
# Phase 3: Scroll to Danger Zone + tap Delete account
# ──────────────────────────────────────────────

# The Danger Zone card is at the bottom of Settings; scroll until visible
- scrollUntilVisible:
    element:
      text: "Danger zone|Zone de danger"
    direction: DOWN
    timeout: 10000

- assertVisible:
    text: "Danger zone|Zone de danger"

# Tap the "Delete account" button (no testID — see notes above)
- tapOn:
    text: "Delete account|Supprimer le compte"

# ──────────────────────────────────────────────
# Phase 4: Confirm native Alert
# ──────────────────────────────────────────────

# Alert.alert renders a native dialog — assert title appears
- extendedWaitUntil:
    visible:
      text: "Delete account|Supprimer le compte"
    timeout: 5000

# The body explains the irreversibility (settings.delete_confirm_body)
- assertVisible:
    text: "permanently|définitivement"

# Tap the destructive "Delete" / "Supprimer" Alert button.
# Use index: 1 because the cancel button (index 0) also says "Cancel"/"Annuler"
# but they are different labels — so direct text match is safe.
- tapOn:
    text: "^Delete$|^Supprimer$"

# ──────────────────────────────────────────────
# Phase 5: Verify logout — back on auth screen
# ──────────────────────────────────────────────
- waitForAnimationToEnd:
    timeout: 10000

- extendedWaitUntil:
    visible:
      text: "Welcome back|Bon retour"
    timeout: 15000

# Sanity: app evicted us from settings
- assertNotVisible:
    text: "Danger zone|Zone de danger"
- assertNotVisible:
    text: "Your museum companion|Votre compagnon de musée"
