appId: com.musaium.mobile.preview
---
# Auth — Account deletion (login → settings → delete → confirm → logout)
#
# Login as a deletable seeded account, navigate to Settings → Danger Zone,
# tap "Delete account", confirm the native Alert, and expect to land back
# on the auth screen (auto-logout after backend success).
#
# WARNING: This flow DESTROYS the account it logs into. It uses the seeded
# apple.test@apple.com / Apple1234! account — the validation harness MUST
# RE-SEED that account after every run of this flow.
#
# Notes (see AUTH_FLOWS_NOTES.md):
#   - Home reaches Settings only via the hero gear button (testID
#     "hero-settings-button"); there is no tappable "Settings" text on home.
#   - "Delete account" Pressable has accessibilityLabel a11y.settings.delete_account
#     but NO testID — we tap by visible text ("Supprimer le compte" / "Delete account").
#   - The confirmation is a native Alert.alert: title="Supprimer le compte",
#     destructive button=common.delete ("Supprimer"/"Delete").
# screen: AuthScreen

# ──────────────────────────────────────────────
# Phase 0: Cold start -> auth screen
# ──────────────────────────────────────────────
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Welcome back|Bon retour"
    timeout: 40000
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"

# ──────────────────────────────────────────────
# Phase 1: Login (seeded deletable account, hard-coded — RE-SEED after run)
# ──────────────────────────────────────────────
- tapOn:
    id: "email-input"
- inputText: "apple.test@apple.com"

- tapOn:
    id: "password-input"
- inputText: "Apple1234!"

- hideKeyboard

- tapOn:
    id: "auth-submit"
# iOS native "Save Password?" dialog
- tapOn:
    text: "Plus tard|Not Now"
    optional: true

- waitForAnimationToEnd:
    timeout: 10000

# Skip onboarding if it shows on first login
- tapOn:
    text: "Skip|Passer"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Your museum companion|Votre compagnon de musée"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 2: Navigate to Settings (hero gear button)
# ──────────────────────────────────────────────
- tapOn:
    id: "hero-settings-button"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Settings|Paramètres"
    timeout: 10000

# ──────────────────────────────────────────────
# Phase 3: Scroll to Danger Zone + tap Delete account
# ──────────────────────────────────────────────
# Low visibility threshold — the Danger Zone heading sits at the bottom of the
# settings scroll and rarely reaches 100% visibility.
- scrollUntilVisible:
    element:
      text: "Zone de danger|Danger Zone"
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 1
- assertVisible:
    text: "Zone de danger|Danger Zone"

# Tap the "Delete account" row button (no testID). Its visible label is
# "Supprimer le compte" but its accessibilityLabel (a11y.settings.delete_account
# = "Supprimer le compte définitivement" / "Delete account permanently")
# COLLAPSES the subtree, so match the a11y label.
- tapOn:
    text: "Supprimer le compte définitivement|Delete account permanently"

# ──────────────────────────────────────────────
# Phase 4: Confirm native Alert (settings.delete_confirm_title / _body)
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      text: ".*(permanently|définitivement).*"
    timeout: 5000

# Tap the destructive alert button (common.delete = "Supprimer" / "Delete").
- tapOn:
    text: "^Delete$|^Supprimer$"

# ──────────────────────────────────────────────
# Phase 5: Verify logout — back on auth screen
# ──────────────────────────────────────────────
- waitForAnimationToEnd:
    timeout: 10000

- extendedWaitUntil:
    visible:
      text: "Welcome back|Bon retour"
    timeout: 40000

# Sanity: app evicted us from settings
- assertNotVisible:
    text: "Danger zone|Zone de danger"
- assertNotVisible:
    text: "Your museum companion|Votre compagnon de musée"
