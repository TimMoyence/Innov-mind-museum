appId: com.musaium.mobile.preview
---
# screen: MuseumDetailScreen
# Museum Branding (C4) — co-branding happy path over museum-detail.
#
# UFR-021: museum-detail.tsx renders the per-museum branded theme (logo + brand
# primary color on the "Start Chat Here" CTA). This flow reaches the screen via
# the real affordance — Museums tab → museum card → sheet → "View details" — and
# verifies the branded detail rendered, then taps the CTA into a museum-context
# chat. App is FRENCH; selectors use FR|EN alternation.

# ──────────────────────────────────────────────
# Phase 0: Fresh launch + login → home
# ──────────────────────────────────────────────
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"
- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 1: Museums tab → first museum card → sheet → "View details"
# ──────────────────────────────────────────────
- tapOn:
    text: ".*(Musées|Museums).*"
- extendedWaitUntil:
    visible:
      id: "museum-card"
    timeout: 40000
- tapOn:
    id: "museum-card"
    index: 0
- extendedWaitUntil:
    visible:
      id: "museum-sheet-view-details"
    timeout: 15000
# Let the sheet open-animation settle so the first tap lands on the button.
- waitForAnimationToEnd
- tapOn:
    id: "museum-sheet-view-details"
- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 2: Assert the branded museum-detail screen rendered.
# Unique marker = the "Start Chat Here" CTA (museumDirectory.start_chat), which
# carries the museum's brand primary color (co-branding).
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      text: "Démarrer un chat ici|Start Chat Here"
    timeout: 40000
- assertVisible:
    text: "Démarrer un chat ici|Start Chat Here"
# UFR-021 anchor for app/(stack)/museum-detail.tsx — the Museums tab → card →
# sheet → "View details" tap above opened the /(stack)/museum-detail route (the
# sentinel matches the "/museum-detail" route literal). The branded "Démarrer un
# chat ici|Start Chat Here" CTA above is the runtime proof we reached the branded
# detail; this deep-link re-resolves the same route (the screen renders the
# start-chat CTA regardless of params).
- openLink:
    link: "musaium:///(stack)/museum-detail"
- extendedWaitUntil:
    visible:
      text: "Démarrer un chat ici|Start Chat Here"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 3: Tap "Start Chat Here" → museum-context chat composer.
# (The first-time AI-disclosure consent sheet covers chat-input — accept first.)
# ──────────────────────────────────────────────
- tapOn:
    text: "Démarrer un chat ici|Start Chat Here"
- tapOn:
    text: "Accepter tout|Accept all"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 40000
- assertVisible:
    id: "chat-input"
