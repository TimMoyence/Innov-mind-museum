appId: com.musaium.mobile.preview
---
# Auth — Register with breached password
#
# Submit a registration with a password known to appear in HaveIBeenPwned
# breach corpus. Expect the backend to respond with PASSWORD_BREACHED, which
# the FE maps to error.auth.password_breached. The user MUST stay on the
# registration screen — no navigation.
#
# Backend reference: museum-backend/src/modules/auth — POST /api/auth/register
# returns 400 { code: "PASSWORD_BREACHED" } when the password sha-1 prefix is
# found in the HIBP k-anonymity index.

# ──────────────────────────────────────────────
# Phase 1: Reach auth screen + switch to register
# ──────────────────────────────────────────────
- waitForAnimationToEnd
- assertVisible:
    text: "Welcome back|Bon retour"

- tapOn:
    text: "No account\\? Sign up|Pas de compte \\? S'inscrire"
- waitForAnimationToEnd
- assertVisible:
    text: "Create your account|Créez votre compte"

# ──────────────────────────────────────────────
# Phase 2: Fill form with a breached password
# ──────────────────────────────────────────────
- tapOn:
    text: "First name|Prénom"
- inputText: "Maestro"

- tapOn:
    text: "Last name|Nom"
- inputText: "Tester"

- runScript:
    script: |
      output.runId = (typeof MAESTRO_RUN_ID !== 'undefined' && MAESTRO_RUN_ID) ? MAESTRO_RUN_ID : Date.now().toString();
- tapOn:
    id: "email-input"
- inputText: "maestro+breached-${output.runId}@local.dev"

# Notorious breach password — appears millions of times in HIBP
- tapOn:
    id: "password-input"
- inputText: "password123"

- tapOn:
    id: "date-of-birth-input"
- inputText: "10/08/1994"

- hideKeyboard

- tapOn:
    text: "I agree to the.*|J'accepte les.*"

- scrollUntilVisible:
    element:
      id: "auth-submit"
    direction: DOWN
    timeout: 5000

- tapOn:
    id: "auth-submit"

# ──────────────────────────────────────────────
# Phase 3: Expect inline error, no navigation
# ──────────────────────────────────────────────

# Backend ~200-2000ms response time (Pwned Passwords HTTP roundtrip)
- extendedWaitUntil:
    visible:
      id: "auth-error-state"
    timeout: 10000

# Match either EN ("appears in known data breaches") or FR
# ("figure dans des fuites de données connues") substrings
- assertVisible:
    text: "data breaches|fuites de données"

# Sanity: stayed on Register screen
- assertVisible:
    text: "Create your account|Créez votre compte"
- assertNotVisible:
    text: "Your museum companion|Votre compagnon de musée"
