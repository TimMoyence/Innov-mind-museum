appId: com.musaium.mobile.preview
---
# Auth — Register with breached password
#
# Submit a registration with a password known to appear in HaveIBeenPwned
# breach corpus. Expect the backend to respond with PASSWORD_BREACHED, which
# the FE maps to error.auth.password_breached. The user MUST stay on the
# registration screen — no navigation.
#
# The FE schema only enforces password min(8); "password123" (11 chars)
# passes FE validation and reaches the backend HIBP k-anonymity check.
# screen: AuthScreen

# ──────────────────────────────────────────────
# Phase 0: Cold start + switch to register
# ──────────────────────────────────────────────
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Welcome back|Bon retour"
    timeout: 40000
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"

- tapOn:
    text: "Passer à l'inscription|Switch to registration"  # accessibilityLabel (collapses visible "Pas de compte ? S'inscrire")
- waitForAnimationToEnd
- assertVisible:
    text: "Create your account|Créez votre compte"

# ──────────────────────────────────────────────
# Phase 2: Fill form with a breached password
# ──────────────────────────────────────────────
- tapOn:
    id: "firstname-input"
- inputText: "Maestro"

- tapOn:
    id: "lastname-input"
- inputText: "Tester"

# Static literal (no account is ever created — the breach check rejects first —
# so duplicate-email is impossible). bash-style ${VAR:-default} is invalid JS in Maestro.
- tapOn:
    id: "email-input"
- inputText: "maestro-breached-test@local.dev"

# Notorious breach password — appears millions of times in HIBP
- tapOn:
    id: "password-input"
- inputText: "password123"

- tapOn:
    id: "date-of-birth-input"
- inputText: "10/08/1994"

# Dismiss keyboard via a static-text tap — hideKeyboard hard-FAILS on the custom
# DOB editor (no standard dismiss).
- tapOn:
    text: "Create your account|Créez votre compte"

# Accept GDPR by tapping the checkbox SQUARE (row left edge). Tapping the row
# center hits the inline Terms/Privacy links (own onPress → navigate away).
- tapOn:
    point: "11%,67%"

# Submit (button already on screen; a hard scrollUntilVisible@100% fails when no
# scroll is needed). Wait + tap by testID.
- extendedWaitUntil:
    visible:
      id: "auth-submit"
    timeout: 10000
- tapOn:
    id: "auth-submit"
# iOS native "Save Password?" dialog can still surface on submit
- tapOn:
    text: "Plus tard|Not Now"
    optional: true

# ──────────────────────────────────────────────
# Phase 3: Expect inline error, no navigation
# ──────────────────────────────────────────────
# Backend ~200-2000ms response time (Pwned Passwords HTTP roundtrip)
- extendedWaitUntil:
    visible:
      id: "auth-error-state"
    timeout: 10000

# Match either EN ("appears in known data breaches") or FR
# ("figure dans des fuites de données connues") substrings
- extendedWaitUntil:
    visible:
      text: ".*(data breaches|fuites de données).*"
    timeout: 10000

# Sanity: stayed on Register screen
- assertVisible:
    text: "Create your account|Créez votre compte"
- assertNotVisible:
    text: "Your museum companion|Votre compagnon de musée"
