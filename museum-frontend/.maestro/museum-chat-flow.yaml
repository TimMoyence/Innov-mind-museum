appId: com.musaium.mobile.preview
---
# Museum → Chat Flow: Navigate to a museum, open its sheet, start chat from museum context
#
# Prerequisites:
#   - Seeded test account e2e-test-login@test.musaium.dev / TestPassword123!
#   - Backend running on localhost:3000 with seeded museums
#   - At least one museum returned by the API
#
# Trace: Museums tab → tap first museum-card → MuseumSheet → "Start Chat Here"
#        (museum-sheet-start-chat) → chat loads with museum context.
# Validates the S11 fix: museumName resolved, GPS context, nearby museums injection.

# ──────────────────────────────────────────────
# Phase 0: Launch fresh + log in
# ──────────────────────────────────────────────
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"
- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    id: "analytics-consent-decline"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 1: Navigate to Museums tab
# ──────────────────────────────────────────────
- tapOn:
    text: ".*(Musées|Museums).*"
- extendedWaitUntil:
    visible:
      id: "museum-card"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 2: Tap first museum card → MuseumSheet opens
# ──────────────────────────────────────────────
- tapOn:
    id: "museum-card"
    index: 0
- extendedWaitUntil:
    visible:
      id: "museum-sheet-start-chat"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 3: Start chat from the museum context
# ──────────────────────────────────────────────
- tapOn:
    id: "museum-sheet-start-chat"

# The first-time AI-disclosure consent sheet ("Réponses générées par IA")
# mounts OVER the chat screen and COVERS chat-input, so it MUST be accepted
# BEFORE asserting the composer is reachable (mirror chat-flow Phase 3). Wait
# for it deterministically, then accept.
- extendedWaitUntil:
    visible:
      text: "Accepter tout|Accept all"
    timeout: 20000
- tapOn:
    text: "Accepter tout|Accept all"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 4: Send a test message to verify museum-context chat is functional
# ──────────────────────────────────────────────
- tapOn:
    id: "chat-input"
- inputText: "What artworks can I see here?"
- hideKeyboard
- tapOn:
    id: "send-button"
- assertVisible: "What artworks can I see here?"

# C-08 — Assert the ASSISTANT bubble rendered (not just the optimistic user
# echo). `chat-bubble-assistant` (ChatMessageBubble.tsx:205,219) is only present
# once a real assistant message lands in the store; the pending phase uses the
# distinct `chat-assistant-pending` placeholder. Wait for LLM latency.
- extendedWaitUntil:
    visible:
      id: "chat-bubble-assistant"
    timeout: 40000
- assertVisible:
    id: "chat-bubble-assistant"
