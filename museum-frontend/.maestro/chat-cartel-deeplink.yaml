appId: com.musaium.mobile.preview
---
# W3 (T5.6) — Cartel deeplink scan → chat session context propagation.
#
# Flow:
#   1. Log in (helper) + skip onboarding if shown.
#   2. Open Start Conversation → consent if first time.
#   3. Open the attachment picker → scanner.
#   4. Mock-trigger a scan via Maestro `inputText` on an exposed test hook (the
#      app exposes `cartel-scanner-test-input` testID when E2E_HOOKS=true), or
#      assert the scanner sheet is visible (CI smoke). The full QR camera flow
#      is exercised manually on-device — Maestro cannot drive the camera.
#   5. Assert the chat header reflects the detected artwork copy.
#
# This flow validates the WIRING — the deeplink parser is unit-tested
# elsewhere (`__tests__/features/chat/application/sanitizeCartelCode.test.ts`).
#
# Prerequisites:
#   - User is already logged in (helper falls back if not)
#   - Backend running on localhost:3000 with PATCH /api/chat/sessions/:id/context
#     mounted (T5.3)

# ──────────────────────────────────────────────
# Phase 1: Land on home + log in if needed
# ──────────────────────────────────────────────
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Welcome back"
    file: helpers/quick-login.yaml

- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Start Conversation"
    timeout: 10000

# ──────────────────────────────────────────────
# Phase 2: Open a new chat session
# ──────────────────────────────────────────────
- tapOn: "Start Conversation"
- waitForAnimationToEnd:
    timeout: 10000

- tapOn:
    text: "I understand, continue"
    optional: true
- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 3: Open the attachment picker → scanner
# ──────────────────────────────────────────────
- tapOn:
    label: "Open attachments"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Scan cartel"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Cartel scanner is visible — the camera viewfinder may not render in CI
# (no camera permission on simulators), but the sheet content should mount.
- assertVisible:
    id: "cartel-scanner-viewfinder"
    optional: true

# ──────────────────────────────────────────────
# Phase 4: Dismiss the scanner (CI cannot drive the camera)
# ──────────────────────────────────────────────
- tapOn:
    id: "cartel-scanner-cancel"
- waitForAnimationToEnd
