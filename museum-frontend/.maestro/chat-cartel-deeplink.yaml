appId: com.musaium.mobile.preview
---
# W3 (T5.6) — Cartel scanner sheet wiring → chat session context propagation.
#
# Flow:
#   1. Launch fresh + log in.
#   2. Open Start Conversation → consent if first time.
#   3. Open the attachment picker → Scan cartel → scanner sheet mounts.
#   4. Assert the scanner sheet is visible (CI smoke). The full QR camera flow
#      is exercised manually on-device — Maestro cannot drive the camera.
#   5. Cancel the scanner.
#
# This flow validates the WIRING — the deeplink parser is unit-tested elsewhere
# (`__tests__/features/chat/application/sanitizeCartelCode.test.ts`).
#
# Prerequisites:
#   - Seeded test account e2e-test-login@test.musaium.dev / TestPassword123!
#   - Backend running on localhost:3000 with PATCH /api/chat/sessions/:id/context

# ──────────────────────────────────────────────
# Phase 0: Launch fresh + log in
# ──────────────────────────────────────────────
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"
- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    id: "analytics-consent-decline"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 1: Open a new chat session
# ──────────────────────────────────────────────
# The home default-conversation CTA ("Commencer une nouvelle conversation") sits
# half-under the bottom tab bar on this binary, so a tap on it lands on the
# "Musées" tab and routes to the nearby-museums directory (hybrid companion model
# hands off to a context picker before chatting). Exercise the home affordance
# best-effort, then make the directory deterministic via the "Musées" tab, pick a
# museum card -> sheet -> "Démarrer un chat ici" -> chat.
# Navigate straight to the Museums tab (the passing museum-chat-flow does exactly
# this). The old best-effort "Start a new conversation" tap actually opened a chat
# on this binary and the AI-disclosure sheet mounted OVER the screen, covering the
# "Musées" bottom tab so the deterministic tap below failed. The Museums tab is
# reachable directly from home — no CTA detour needed.
- tapOn:
    text: ".*(Musées|Museums).*"
- extendedWaitUntil:
    visible:
      id: "museum-card"
    timeout: 40000
- tapOn:
    id: "museum-card"
    index: 0
- extendedWaitUntil:
    visible:
      id: "museum-sheet-start-chat"
    timeout: 40000
- tapOn:
    id: "museum-sheet-start-chat"
# AI-disclosure consent sheet mounts OVER the chat & covers chat-input — it
# MUST be accepted BEFORE the composer is reachable. First-session-only, so
# the wait is bounded and the tap is the deterministic dismissal.
- extendedWaitUntil:
    visible:
      text: "Accepter tout|Accept all"
    timeout: 20000
- tapOn:
    text: "Accepter tout|Accept all"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 2: Open the attachment picker → scanner
# ──────────────────────────────────────────────
- tapOn:
    id: "composer-attach-button"
- extendedWaitUntil:
    visible:
      id: "attachment-picker-scan-cartel"
    timeout: 40000
- tapOn:
    id: "attachment-picker-scan-cartel"
- waitForAnimationToEnd:
    timeout: 5000

# Cartel scanner is visible — the camera viewfinder may not render in CI (no
# camera permission on simulators), but the sheet content mounts. Either the
# viewfinder OR the permission-pending/denied state proves the sheet is up.
- extendedWaitUntil:
    visible:
      id: "cartel-scanner-cancel"
    timeout: 10000

# ──────────────────────────────────────────────
# Phase 3: Dismiss the scanner (CI cannot drive the camera)
# ──────────────────────────────────────────────
- tapOn:
    id: "cartel-scanner-cancel"
- waitForAnimationToEnd
