appId: com.musaium.mobile.preview
---
# screen: MuseumSheet
#
# C2 — MuseumSheet happy path (UFR-021 modal coverage).
#
# Trigger (prod): tap a <MuseumCard> in the Museums tab directory, which sets
# `selectedMuseum` and opens the sheet (app/(tabs)/museums.tsx).
#
# Anchors (contract — see .maestro/MODAL_FLOWS_NOTES.md):
#   museum-card               (open trigger — first card)
#   museum-sheet-start-chat   (assert sheet open)
#   museum-sheet-close        (dismiss — header close button, a11y-reachable)
#   museum-sheet-backdrop     (touch-dismiss affordance; a11y-hidden, not a Maestro target)
#
# Prerequisites:
#   - Seeded test account (login below).
#   - At least one museum in the backend directory (`pnpm seed:museums`).

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000

- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"

# ──────────────────────────────────────────────
# Phase 0: Authenticate
# ──────────────────────────────────────────────
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"

- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    id: "analytics-consent-decline"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true

- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 1: Go to the Museums tab, wait for the directory list
# ──────────────────────────────────────────────
- tapOn:
    text: ".*(Musées|Museums).*"
- extendedWaitUntil:
    visible:
      id: "museum-card"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 2: Open the first museum card → sheet
# ──────────────────────────────────────────────
- tapOn:
    id: "museum-card"
    index: 0

# ──────────────────────────────────────────────
# Phase 3: Assert the sheet is open, then dismiss via the header close button.
# NB: the backdrop (testID museum-sheet-backdrop) is touch-dismissable in the
# app but is a11y-hidden behind the sheet's accessibilityViewIsModal, so Maestro
# cannot target it — verified on a live iOS 26.4 simulator run (2026-05-25).
# Dismiss therefore uses the header close button (museum-sheet-close).
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "museum-sheet-start-chat"
    timeout: 15000
- tapOn:
    id: "museum-sheet-close"
- extendedWaitUntil:
    notVisible:
      id: "museum-sheet-start-chat"
    timeout: 15000
