appId: com.musaium.mobile.preview
---
# Audio Recording Flow — proves the FULL STT → LLM → TTS voice round-trip.
#
# Maestro cannot drive a real microphone on a simulator/emulator, so the build
# bakes a test-only fixture injection seam (env EXPO_PUBLIC_MAESTRO_AUDIO_FIXTURE
# = "true", set on the Maestro build jobs in .github/workflows/ci-cd-mobile.yml).
# When set, useAudioRecorder.startRecording/stopRecording return a bundled
# pre-recorded clip ("Who painted the Mona Lisa") instead of driving expo-audio
# (see features/chat/application/maestroAudioFixture.ts + .maestro/fixtures/audio.md).
# That clip uploads through the SAME multipart path as a live recording, so the
# backend STT (gpt-4o-mini-transcribe) → LLM → TTS (gpt-4o-mini-tts) pipeline runs
# deterministically. The round-trip assertions below are therefore NON-optional:
# a dead STT / LLM / TTS fails this flow.
#
# Flow: open chat -> mic -> EU AI Act voice-disclosure gate -> record toggle ->
#       send -> assert STT transcript + assistant reply + TTS "Listen" affordance.
#
# Prerequisites:
#   - Seeded test account e2e-test-login@test.musaium.dev / TestPassword123!
#   - Backend running on localhost:3000 with STT (gpt-4o-mini-transcribe) and
#     TTS (gpt-4o-mini-tts) configured
#   - The Maestro build sets EXPO_PUBLIC_MAESTRO_AUDIO_FIXTURE=true (CI does;
#     a hand-built APK/app without it leaves the recorder on the live mic path
#     and the round-trip assertions will fail — that is intended).

# ──────────────────────────────────────────────
# Phase 0: Launch fresh + log in
# ──────────────────────────────────────────────
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"
- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    id: "analytics-consent-decline"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 1: Open a chat session.
# The home default-conversation CTA sits half-under the bottom tab bar, so its
# tap lands on the "Musées" tab → nearby-museums directory. Exercise it
# best-effort, then deterministically: Musées tab → museum card → sheet →
# "Démarrer un chat ici" → chat composer.
- scrollUntilVisible:
    element:
      text: "Commencer une nouvelle conversation|Start a new conversation"
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 30
- tapOn:
    text: "Commencer une nouvelle conversation|Start a new conversation"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: ".*(Musées|Museums).*"
- extendedWaitUntil:
    visible:
      id: "museum-card"
    timeout: 40000
- tapOn:
    id: "museum-card"
    index: 0
- extendedWaitUntil:
    visible:
      id: "museum-sheet-start-chat"
    timeout: 40000
- tapOn:
    id: "museum-sheet-start-chat"
# AI-disclosure consent sheet mounts OVER the chat & covers chat-input — it
# MUST be accepted BEFORE the composer is reachable. First-session-only, so
# the wait is bounded and the tap is the deterministic dismissal.
- extendedWaitUntil:
    visible:
      text: "Accepter tout|Accept all"
    timeout: 20000
- tapOn:
    text: "Accepter tout|Accept all"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 2: Tap mic -> EU AI Act voice-disclosure gate -> acknowledge
# ──────────────────────────────────────────────
# First mic press of the session opens the voice-intro sheet (the actual
# rawToggleRecording fires only after acknowledging — chat/[sessionId].tsx:152).
- tapOn:
    id: "composer-mic-button"
- waitForAnimationToEnd

# Acknowledge the voice disclosure (testID voice-disclosure-start). Acknowledging
# fires rawToggleRecording() automatically (chat/[sessionId].tsx
# onAcknowledgeVoiceDisclosure), so recording is ON right after this tap.
# `optional` only for resilience if the disclosure was already acknowledged this
# session — in either branch recording is active afterwards.
- tapOn:
    id: "voice-disclosure-start"
    optional: true
- waitForAnimationToEnd

# With the EXPO_PUBLIC_MAESTRO_AUDIO_FIXTURE seam the recorder never touches the
# OS mic, so no permission dialog should appear. Kept optional purely so a stray
# system dialog (rare on iOS) does not wedge the flow.
- tapOn:
    text: "Allow|OK|Autoriser"
    optional: true
- waitForAnimationToEnd

# Recording is active — tap the mic again to STOP. stopRecording resolves the
# bundled fixture clip to a file:// URI and surfaces the audio pill. This tap is
# deterministic (the fixture seam removed the live-capture race), so NOT optional:
# if it cannot stop the recording, the round-trip cannot run and the flow fails.
- tapOn:
    id: "composer-mic-button"
- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 3: The audio pill surfaced (fixture URI captured) — send it
# ──────────────────────────────────────────────
- tapOn:
    id: "send-button"
- waitForAnimationToEnd:
    timeout: 30000

# ──────────────────────────────────────────────
# Phase 4: STT -> LLM -> TTS round-trip assertions (NON-optional)
# ──────────────────────────────────────────────
# The fixture clip says "Who painted the Mona Lisa". If STT is alive the user
# bubble shows that transcript; if the LLM is alive an assistant bubble appears;
# if TTS is alive the "Listen" affordance renders. A dead STT/LLM/TTS fails here.
- extendedWaitUntil:
    visible: "Who painted the Mona Lisa"
    timeout: 20000
- assertVisible:
    id: "chat-bubble-assistant"
- assertVisible:
    text: "Écouter|Listen"

# ──────────────────────────────────────────────
# Phase 5: Cleanup — close the chat
# ──────────────────────────────────────────────
- tapOn:
    text: "Fermer la conversation|Close conversation"
    optional: true
- waitForAnimationToEnd
