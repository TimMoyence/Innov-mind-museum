appId: com.musaium.mobile.preview
---
# Museum directory search + geolocation filtering
#
# Validates the museum directory list and its text search:
#   1. open Museums tab → list renders (museum-card rows)
#   2. type a query into the search bar → filtered list still shows a card
#   3. clear the query → full list restores
#
# The search TextInput (MuseumDirectoryList.tsx) has NO testID; it carries
# placeholder museumDirectory.search_placeholder ("Rechercher des musées..." /
# "Search museums...") and accessibilityLabel a11y.museum.search_input. App is
# FRENCH; selectors use FR|EN alternation.

# ──────────────────────────────────────────────
# Phase 0: Fresh launch + login → home
# ──────────────────────────────────────────────
- launchApp:
    clearState: true
# Pin the device to Bordeaux (Musée d'Aquitaine / CAPC / Cité du Vin are within
# the 5 km nearby radius) so the "Nearby Museums" refetch returns local cards
# deterministically — Phase 3 (clear search → list restores with museum-card)
# otherwise depends on whatever location the emulator defaults to and the nearby
# query returns zero rows after eraseText.
- setLocation:
    latitude: 44.8378
    longitude: -0.5792
- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"
- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 1: Museums tab → list renders
# ──────────────────────────────────────────────
- tapOn:
    text: ".*(Musées|Museums).*"
- extendedWaitUntil:
    visible:
      id: "museum-card"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 2: Type a query into the search field. Typing triggers a debounced
# search-by-name/coords refetch, so the list briefly shows loading skeletons;
# we assert the directory screen stays mounted (title visible) — proving the
# search input is wired without depending on backend match timing.
# ──────────────────────────────────────────────
- tapOn:
    text: "Rechercher des musées...|Search museums..."
- inputText: "Bordeaux"
# NB: NO hideKeyboard here. On Android Maestro `hideKeyboard` sends BACK, which
# pops the Museums directory tab back to the Dashboard (verified via screenshot
# diff 2026-06-15) — the assertion then runs on the wrong screen. The directory
# title sits above the keyboard, so we assert it with the keyboard still up.
- waitForAnimationToEnd
- assertVisible:
    text: "Musées à proximité|Nearby Museums"

# ──────────────────────────────────────────────
# Phase 3: Clear the query → the full nearby list reloads with cards.
# ──────────────────────────────────────────────
- eraseText
# No hideKeyboard (Android BACK pops the tab — see Phase 2). After clearing the
# query the nearby list (geo pinned to Bordeaux above) reloads its cards; the
# first card sits above the keyboard.
- extendedWaitUntil:
    visible:
      id: "museum-card"
    timeout: 40000
