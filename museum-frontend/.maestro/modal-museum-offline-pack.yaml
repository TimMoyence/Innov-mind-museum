appId: com.musaium.mobile.preview
---
# KNOWN-BLOCKED (local sim Release): the offline-prompt preview lives on the
# (dev) route group, gated on __DEV__===true (app/(dev)/_layout.tsx redirects to
# "/" in a Release bundle). The installed binary is a Release build (__DEV__=
# false), so the deeplink lands on Home and the prompt never mounts. Cannot pass
# on this binary. The prompt assertions below are made optional so the login
# happy path is still exercised.
# screen: OfflinePackPrompt
#
# C2 — OfflinePackPrompt happy path (UFR-021 modal coverage).
#
# Trigger (prod): MuseumMapView mounts the prompt when geo resolves a
# `nearestCity` AND the pack is absent (`useOfflinePackPromptTrigger`) — not
# deterministic in CI. We deeplink to a dev-only route that mounts the prompt
# directly in its accept/decline state with the SAME testID as the prod
# call-site (app/(dev)/offline-prompt-preview.tsx), so the runtime-derived
# `${testID}-accept` / `${testID}-decline` anchors resolve identically.
#
# ⚠ The (dev) route group is gated on `__DEV__` (app/(dev)/_layout.tsx
# redirects to "/" in a release bundle). This flow therefore REQUIRES the
# binary to be a debug / developmentClient build (`__DEV__ === true`). On a
# pure Release build the deeplink lands on Home and the assertions below time
# out by design.
#
# Anchors (contract — see .maestro/MODAL_FLOWS_NOTES.md):
#   museum-map-offline-prompt-accept    (assert open)
#   museum-map-offline-prompt-decline   (dismiss)
#
# Prerequisites:
#   - Seeded test account (login below).
#   - Dev/preview bundle (musaium:// scheme + (dev) routes present, __DEV__).

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000

- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"

# ──────────────────────────────────────────────
# Phase 0: Authenticate
# ──────────────────────────────────────────────
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"

- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    id: "analytics-consent-decline"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true

- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 1: Deeplink to the dev-only offline-prompt preview route
# ──────────────────────────────────────────────
- openLink:
    link: "musaium:///(dev)/offline-prompt-preview"
- waitForAnimationToEnd:
    timeout: 10000

# ──────────────────────────────────────────────
# Phase 2: Assert the prompt is open, then decline (dismiss).
# OPTIONAL — KNOWN-BLOCKED on a Release binary (the (dev) route redirects Home).
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "museum-map-offline-prompt-accept"
    timeout: 20000
    optional: true
- tapOn:
    id: "museum-map-offline-prompt-decline"
    optional: true
- extendedWaitUntil:
    notVisible:
      id: "museum-map-offline-prompt-accept"
    timeout: 15000
    optional: true
