appId: com.musaium.mobile.preview
---
# KNOWN-BLOCKED (local sim Release) — RE-DIAGNOSED 2026-06-01. The previously
# recorded cause ("simctl addmedia hangs, fixture not selectable, no /chat/compare
# request reaches the backend") was WRONG. Verified on iPhone 17 / iOS 26.5:
#   - `xcrun simctl addmedia booted .maestro/fixtures/test-artwork.jpg` returns
#     exit 0 instantly on a settled sim (the earlier "hang" was transient
#     post-boot MediaServices/Photos daemon state).
#   - The fixture IS selectable: the top-left PHPicker cell (point 15%,30%) picks
#     it, and `useCompareTrigger` DOES fire POST /api/chat/compare (confirmed in
#     backend logs: compare_request with a queryEmbeddingHash, userId 38).
# The REAL blocker is backend-side: the SigLIP ONNX encoder model
# (`./models/siglip2-base-patch16-224.onnx`, ~354MB) must be present in the
# backend, else every compare returns HTTP 503 "Visual similarity encoder is
# temporarily unavailable" (log: siglip_onnx_session_create_failed → fallbackReason
# encoder_unavailable). As of 2026-06-14 (P0.C1) the model is OWNED + baked into
# the prod image via a pinned GHCR base image (museum-backend/deploy/Dockerfile.prod
# `COPY --from museum-backend-base:siglip-v1`) — the old GCS-bucket blocker is gone.
# A local dev-stack backend still needs the file (run `bash scripts/pull-siglip-
# model.sh`), and /chat/compare additionally needs seeded artwork_embeddings to
# return matches. Both are backend-infra prerequisites that CI/nightly provisions,
# so this stays a NIGHTLY/CI-only flow against a prod-image backend. The UI wiring (chat
# entry → attachment picker → Compare → pick → POST /chat/compare) is fully
# exercised locally and the app degrades gracefully (an "Unexpected server error"
# banner, no crash). NOTE: the image-DESCRIBE path (chat-image-describe.yaml) uses
# the vision LLM (no SigLIP) and IS runtime-green locally.
# Chat Compare Flow (C3 Image Comparative — Cycle D Option C).
#
# Validates visual similarity matching via the REAL trigger: the "Compare"
# action inside the attachment-picker bottom sheet.
#   open chat → open attachments (composer-attach-button) → "Compare"
#   (attachment-picker-compare) → pick a gallery photo → useCompareTrigger fires
#   POST /chat/compare → reload() surfaces the persisted assistant message →
#   ImageCompareCarousel renders → assert "Similar artworks" / "Œuvres similaires".
#
# Status: NIGHTLY (backend SigLIP/ONNX-dependent), NOT PR-blocking.
#
# Prerequisites:
#   - SigLIP ONNX encoder live + at least one ingested artwork w/ public-domain image
#   - Fixture .maestro/fixtures/test-artwork.jpg in the sim photo library
#     (CI / local: `xcrun simctl addmedia booted ...` before the run).

# ──────────────────────────────────────────────
# Phase 0: Fresh launch + login → home
# ──────────────────────────────────────────────
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"
- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 1: Open a chat session.
# The home default-conversation CTA sits half-under the bottom tab bar, so its
# tap lands on the "Musées" tab and routes to the nearby-museums directory.
# Exercise it best-effort, then deterministically: Musées tab → museum card →
# sheet → "Démarrer un chat ici" → chat composer (accept the AI-disclosure
# consent sheet first since it covers chat-input).
# ──────────────────────────────────────────────
- scrollUntilVisible:
    element:
      text: "Commencer une nouvelle conversation|Start a new conversation"
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 30
- tapOn:
    text: "Commencer une nouvelle conversation|Start a new conversation"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: ".*(Musées|Museums).*"
- extendedWaitUntil:
    visible:
      id: "museum-card"
    timeout: 40000
- tapOn:
    id: "museum-card"
    index: 0
- extendedWaitUntil:
    visible:
      id: "museum-sheet-start-chat"
    timeout: 40000
- tapOn:
    id: "museum-sheet-start-chat"
- extendedWaitUntil:
    visible:
      text: "Accepter tout|Accept all"
    timeout: 20000
- tapOn:
    text: "Accepter tout|Accept all"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 2: Open the attachment picker → tap "Compare" (Option C trigger)
# ──────────────────────────────────────────────
- tapOn:
    id: "composer-attach-button"
- waitForAnimationToEnd
- tapOn:
    id: "attachment-picker-compare"
- waitForAnimationToEnd

# expo-image-picker requests media-library permission on first use; accept it.
- tapOn:
    text: "Allow|Allow Access to All Photos|Autoriser|Tout autoriser"
    optional: true
- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 3: Pick the seeded test image from the system gallery picker.
# Native PHPicker shows a thumbnail grid (no filenames) → tap the top-left cell
# (most-recent asset = the fixture CI/local just added). Filename tap is a
# fallback for documents-style pickers.
# ──────────────────────────────────────────────
- tapOn:
    text: "test-artwork.jpg"
    optional: true
- tapOn:
    point: "15%,30%"
    optional: true
- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 4: Wait for the compare round-trip → carousel render
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      text: "Similar artworks|Œuvres similaires"
    timeout: 60000
- assertVisible:
    text: "Similar artworks|Œuvres similaires"

# ──────────────────────────────────────────────
# Phase 5: Tap the first match card (optional — seeded catalogue may return zero
# matches, in which case the carousel shows the no-match empty state). `label:`
# under tapOn is only a log label, so match the card's accessibilityLabel prefix
# via `text:`. Re-assert a stable affordance afterward to prove no crash.
# ──────────────────────────────────────────────
- tapOn:
    text: "Similar artwork:.*|Œuvre similaire :.*"
    optional: true
- waitForAnimationToEnd
- assertVisible:
    text: "Similar artworks|Œuvres similaires|Fermer|Close|Retour|Back"
