appId: com.musaium.mobile.preview
---
# Chat Compare Flow (C3 Image Comparative — realigned to Cycle D Option C).
#
# Validates the visitor-facing flow for visual similarity matching via the REAL
# trigger: the "Compare" action inside the attachment-picker bottom sheet.
#   open chat → open attachments (`composer-attach-button`)
#   → tap "Compare" (`attachment-picker-compare`) → pick a gallery photo
#   → useCompareTrigger fires POST /chat/compare → reload() surfaces the
#     persisted assistant message → ImageCompareCarousel renders
#   → assert the localized "Similar artworks" / "Œuvres similaires" header
#   → tap the first match card.
#
# D-07 — This flow previously waited on a phantom path: it tapped a non-existent
# `label: "Attach image"` (the real attach affordance is `composer-attach-button`
# / "Open attachments") and never went through the attachment-picker "Compare"
# action, which is now the only wired entry point (Cycle D Option C). The header
# text itself ("Similar artworks"/"Œuvres similaires" = `chat.compare.title`,
# shared/locales/{en,fr}/translation.json) is real and retained.
#
# Status: nightly (Android cron + iOS nightly), NOT PR-blocking.
#
# Prerequisites:
#   - User logged in (helpers/quick-login.yaml fallback handles re-auth)
#   - Backend on localhost:3000 with `/api/chat/compare` reachable
#   - SigLIP ONNX encoder live (env DOCKER + ONNX model preloaded)
#   - At least one ingested artwork with a public-domain image
#   - Test fixture image present at `/sdcard/Download/test-artwork.jpg` (Android)
#     or in the iOS simulator's photo library (`xcrun simctl addmedia`).
#     The CI nightly job uploads `museum-frontend/.maestro/fixtures/test-artwork.jpg`
#     before invoking maestro.

# ──────────────────────────────────────────────
# Phase 1: Land on home, log in if necessary
# ──────────────────────────────────────────────
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Welcome back"
    file: helpers/quick-login.yaml

- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Start Conversation"
    timeout: 10000

# ──────────────────────────────────────────────
# Phase 2: Open a new chat session
# ──────────────────────────────────────────────
- tapOn: "Start Conversation"
- waitForAnimationToEnd:
    timeout: 10000

- tapOn:
    text: "I understand, continue"
    optional: true
- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 3: Open the attachment picker → tap "Compare" (Option C trigger)
# ──────────────────────────────────────────────
# The composer exposes the attachment bottom sheet via `composer-attach-button`
# (museum-frontend/features/chat/ui/Composer.tsx:95, label "Open attachments").
# The sheet's "Compare" action carries testID `attachment-picker-compare`
# (AttachmentPickerSheetContent.tsx:173) and fires `onCompareImage()` →
# `useCompareImagePicker` (launchImageLibraryAsync) → `useCompareTrigger`.
- tapOn:
    id: "composer-attach-button"
- waitForAnimationToEnd

- tapOn:
    id: "attachment-picker-compare"
- waitForAnimationToEnd

# expo-image-picker requests media-library permission on first use; accept it.
- tapOn:
    text: "Allow"
    optional: true
- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 4: Pick the seeded test image from the system gallery picker
# ──────────────────────────────────────────────
# CI uploads the fixture immediately before running this flow so it surfaces as
# the most-recent asset:
#   • Android emulator — `adb push .maestro/fixtures/test-artwork.jpg /sdcard/Download/`
#   • iOS simulator    — `xcrun simctl addmedia booted .maestro/fixtures/test-artwork.jpg`
#
# Two-step strategy because the underlying picker varies:
#   1. Documents-style picker (Android Files / older OS) lists by filename
#      → tap by literal "test-artwork.jpg".
#   2. Native Photo Picker (PHPicker on iOS, Photo Picker on Android 13+)
#      shows a thumbnail grid with no visible filenames → tap the top-left
#      cell, which is the most-recent asset (i.e. the one CI just uploaded).
# Both taps are optional so whichever picker is on screen, exactly one wins.
- tapOn:
    text: "test-artwork.jpg"
    optional: true
- tapOn:
    point: "15%,30%"
    optional: true
- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 5: Wait for the compare round-trip → reload → carousel render
# ──────────────────────────────────────────────
# useCompareTrigger reload()s the session once POST /chat/compare resolves; the
# persisted assistant message (metadata.compareResults) surfaces and the bubble
# renders ImageCompareCarousel, whose header is `chat.compare.title`
# ("Similar artworks" EN / "Œuvres similaires" FR — verified in
# shared/locales/{en,fr}/translation.json).
- extendedWaitUntil:
    visible:
      text: "Similar artworks|Œuvres similaires"
    timeout: 60000

# ──────────────────────────────────────────────
# Phase 6: Assert carousel header is rendered (FR or EN locale)
# ──────────────────────────────────────────────
- assertVisible:
    text: "Similar artworks|Œuvres similaires"

# ──────────────────────────────────────────────
# Phase 7: Tap the first match card
# ──────────────────────────────────────────────
# Uses the `accessibilityLabel` set by ImageCompareCard (ImageCompareCard.tsx:42):
#   "Similar artwork: <title>, <artist>, <rationale>" (EN)
#   "Œuvre similaire : <title>, <artist>, <rationale>" (FR)
# We match the prefix only — the title/artist are seed-data dependent. The tap
# is `optional` because the seeded catalogue may legitimately return zero
# matches, in which case the carousel renders the explicit "no match" empty
# state (ImageCompareCarousel.tsx:52) and there is no card to tap.
- tapOn:
    label:
      text: "Similar artwork:|Œuvre similaire :"
    optional: true
- waitForAnimationToEnd

# Defensive re-assert: confirm the tap (or no-op when empty) did not crash the
# bubble — the carousel header must still be on screen.
- assertVisible:
    text: "Similar artworks|Œuvres similaires"
