appId: com.musaium.mobile.preview
---
# screen: QuotaUpsellModal
#
# C2 / stream H7 — QuotaUpsellModal happy path via the REAL production trigger.
#
# Trigger (production, NOT a dev route): when a free-tier account has exhausted
# its monthly session quota, `POST /api/sessions` returns 402 `QUOTA_EXCEEDED`.
# The axios response interceptor (shared/infrastructure/httpClient.ts:291-308)
# forwards the payload to `setPaywallHandler` → `PaywallProvider.open()`
# (features/paywall/application/PaywallProvider.tsx:91-98), and the globally-
# mounted host (app/_layout.tsx PaywallModalHost) renders QuotaUpsellModal ABOVE
# all routes. NONE of that path is `__DEV__`-gated, so it fires in a Release APK
# exactly as in production — which is why this flow no longer deeplinks the
# `(dev)/paywall-preview` route (that route redirected Home in a Release bundle,
# so the modal never opened and the old flow passed green VACUOUSLY — stream H7).
#
# Pre-exhausted account: this flow logs in as the DEDICATED paywall account
# `e2e-paywall@test.musaium.dev`, seeded with `sessions_month_count = limit` and
# `sessions_month_start = first-of-current-UTC-month` (the CI `Boot backend` step
# runs `E2E_EXHAUST_QUOTA=1 pnpm seed:e2e-maestro-account`). A SEPARATE account is
# used so the other museum-shard flows that create real sessions are not 402'd.
# Local repro: from museum-backend, with the local Docker stack up:
#   E2E_SEED_ALLOW=1 E2E_EXHAUST_QUOTA=1 DB_HOST=localhost DB_PORT=5433 \
#     DB_USER=museum_dev DB_PASSWORD=museum_dev_password PGDATABASE=museum_dev \
#     E2E_LOGIN_EMAIL=e2e-paywall@test.musaium.dev E2E_LOGIN_PASSWORD='TestPassword123!' \
#     pnpm seed:e2e-maestro-account
#
# Anchors (contract — see .maestro/MODAL_FLOWS_NOTES.md):
#   quota-upsell-modal      (assert open — HARD)
#   quota-upsell-email      (input)
#   quota-upsell-consent    (GDPR consent tick)
#   quota-upsell-submit     (submit — hits /api/leads/paywall-interest, live BE)
#   quota-upsell-dismiss    (dismiss — terminal assertion)
#
# INVARIANT (stream H7): this flow MUST NOT pass green without the modal actually
# opening. The `quota-upsell-modal` assertion below is NON-optional — if the 402
# path failed to mount the modal (e.g. the account was not pre-exhausted, or a
# regression broke the interceptor), the flow goes RED.

- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000

- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"

# ──────────────────────────────────────────────
# Phase 0: Authenticate as the quota-exhausted paywall account
# ──────────────────────────────────────────────
- tapOn:
    id: "email-input"
- inputText: "e2e-paywall@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"

# Systemic interceptors (iOS "Save Password?" / consent / onboarding skip)
- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    id: "analytics-consent-decline"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true

- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 1: Tap the home "Start a new conversation" CTA. This calls
# chatApi.createSession() → POST /api/sessions. The account's quota is exhausted,
# so the backend returns 402 QUOTA_EXCEEDED, the axios interceptor opens the
# paywall, and the modal mounts over the home screen.
#
# centerElement: true scrolls the CTA (the LAST home ScrollView child) to the
# viewport center so it clears the bottom tab bar — same robustness trick as
# chat-flow.yaml.
# ──────────────────────────────────────────────
- scrollUntilVisible:
    element:
      text: "Commencer une nouvelle conversation|Start a new conversation"
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 100
    centerElement: true
- tapOn:
    text: "Commencer une nouvelle conversation|Start a new conversation"
- waitForAnimationToEnd:
    timeout: 10000

# ──────────────────────────────────────────────
# Phase 2: HARD-assert the paywall modal opened (the real 402 trigger). NON-
# optional: a vacuous green (modal never opened) MUST fail here (stream H7).
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "quota-upsell-modal"
    timeout: 30000
- assertVisible:
    id: "quota-upsell-modal"

# ──────────────────────────────────────────────
# Phase 3: Exercise the lead-capture form, then dismiss.
# ──────────────────────────────────────────────
- tapOn:
    id: "quota-upsell-email"
- inputText: "qa+paywall@musaium.test"
- hideKeyboard
- tapOn:
    id: "quota-upsell-consent"
- tapOn:
    id: "quota-upsell-submit"
- waitForAnimationToEnd:
    timeout: 15000

# Submit hits the live backend (/api/leads/paywall-interest) and shows an inline
# success/error line — it does NOT auto-close the modal (QuotaUpsellModal.tsx:241-242).
# The dismiss button (× / quota-upsell-dismiss) is therefore the deterministic
# terminal action; the modal must be gone after it.
- tapOn:
    id: "quota-upsell-dismiss"
- extendedWaitUntil:
    notVisible:
      id: "quota-upsell-modal"
    timeout: 15000
- assertNotVisible:
    id: "quota-upsell-modal"
