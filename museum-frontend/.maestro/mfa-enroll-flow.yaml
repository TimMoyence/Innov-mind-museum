appId: com.musaium.mobile.preview
---
# screen: MfaEnrollScreen
#
# MFA enrollment (TOTP) — happy path (UFR-021 coverage for /(stack)/mfa-enroll).
#
# The screen displays the live TOTP shared secret (QR + manual key) + 10
# one-time recovery codes; while focused, screen capture is blocked
# (TD-SEC-02 / expo-screen-capture). This flow taps THROUGH the happy path:
# authenticate → reach the route → Generate → assert QR/manual/recovery →
# enter a 6-digit code → Verify.
#
# Reaches the route via the app deep-link scheme `musaium:` since the screen
# has no in-app affordance yet (it is wired as a minimal route this run).
#
# Test account must be seeded in the backend before running E2E tests.

- launchApp:
    clearState: false

- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 0: Authenticate (login if the auth screen is showing)
# ──────────────────────────────────────────────
- runFlow:
    when:
      visible: "Welcome back|Bon retour|Log in"
    file: helpers/quick-login.yaml

- tapOn:
    text: "Skip|Passer"
    optional: true
- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 1: Navigate to the MFA enrollment route (deep-link)
# ──────────────────────────────────────────────
- openLink:
    link: "musaium:///(stack)/mfa-enroll"
- waitForAnimationToEnd:
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "mfa-enroll-screen"
    timeout: 10000

# ──────────────────────────────────────────────
# Phase 2: Generate the TOTP secret + recovery codes
# ──────────────────────────────────────────────
- tapOn:
    id: "mfa-generate-button"
- waitForAnimationToEnd:
    timeout: 10000

# QR + manual-key fallback + recovery codes are now rendered. The QR is an SVG
# (react-native-qrcode-svg) with no Maestro-queryable testID, so we assert the
# manual-key + recovery-code text from the same conditional render branch —
# proof the secret screen rendered (the screen-capture protection is now active).
- assertVisible:
    text: "Or enter this key manually:"
- assertVisible:
    text: "Recovery codes"

# ──────────────────────────────────────────────
# Phase 3: Enter a 6-digit code and verify
# ──────────────────────────────────────────────
- tapOn:
    id: "mfa-totp-input"
- inputText: "123456"
- hideKeyboard

- tapOn:
    id: "mfa-verify-button"
- waitForAnimationToEnd:
    timeout: 10000
