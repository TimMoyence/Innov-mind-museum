appId: com.musaium.mobile.preview
---
# Stack navigation — reach each (stack) screen via real UI taps.
#
# Screens covered:
#   1. /(stack)/museum-detail     — Museums tab → museum sheet → "View details"
#   2. /(stack)/chat/[sessionId]  — Dashboard tab → "Start New Conversation"
#                                   → nearby-museums directory → museum → chat
#   3. /(stack)/settings          — Home hero gear (hero-settings-button)
#   4. /(stack)/change-password   — Settings → Security card
#   5. /(stack)/change-email      — Settings → Security card
#   6. /(stack)/privacy           — Settings → FloatingContextMenu "RGPD/Privacy"
#   7. /(stack)/terms             — Settings → Compliance card "Terms of Service"
#   8. /(stack)/support           — Settings → FloatingContextMenu "Support"
#
# App is FRENCH; selectors use FR|EN alternation.

# ──────────────────────────────────────────────
# Phase 0: Fresh launch + login → home
# ──────────────────────────────────────────────
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"
- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ══════════════════════════════════════════════
# 1. museum-detail (Museums tab → sheet → View details)
# ══════════════════════════════════════════════
- tapOn:
    text: ".*(Musées|Museums).*"
- extendedWaitUntil:
    visible:
      id: "museum-card"
    timeout: 40000
- tapOn:
    id: "museum-card"
    index: 0
- extendedWaitUntil:
    visible:
      id: "museum-sheet-view-details"
    timeout: 15000
- waitForAnimationToEnd
- tapOn:
    id: "museum-sheet-view-details"
- waitForAnimationToEnd
# museum-detail unique marker: the "Start Chat Here" CTA (museumDirectory.start_chat).
- extendedWaitUntil:
    visible:
      text: "Démarrer un chat ici|Start Chat Here"
    timeout: 40000
# Back → Museums directory. museum-detail is a full-screen stack route (no tab
# bar) and its hardware `back` is unreliable; tap the top-left back arrow
# (accessibilityLabel common.back = "Retour" / "Back").
- tapOn:
    text: "Retour|Back"
- extendedWaitUntil:
    visible:
      id: "museum-card"
    timeout: 15000
# Return to Home
- tapOn:
    text: ".*(Accueil|Home).*"
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 15000

# ══════════════════════════════════════════════
# 2. chat/[sessionId] (Dashboard → Start New Conversation → directory → chat)
# ══════════════════════════════════════════════
- tapOn:
    text: ".*(Tableau de bord|Dashboard).*"
- extendedWaitUntil:
    visible:
      text: "Tableau de bord|Dashboard"
    timeout: 15000
# The Dashboard "Nouvelle conversation" button's accessibilityLabel
# (a11y.conversations.start_new = "Commencer une nouvelle conversation" /
# "Start a new conversation") COLLAPSES the subtree, so match the a11y label.
# Unlike the Home CTA, the Dashboard CTA creates a session DIRECTLY (no museum
# picker) → chat screen, where the first-time AI-disclosure consent sheet covers
# the composer. Accept it, then assert the send button.
- tapOn:
    text: "Commencer une nouvelle conversation|Start a new conversation"
- tapOn:
    text: "Accepter tout|Accept all"
    optional: true
- waitForAnimationToEnd
# Chat session screen — the send button is present on every chat screen.
- extendedWaitUntil:
    visible:
      id: "send-button"
    timeout: 40000
# Return Home: close the chat (back to Dashboard tab), then tap the Home tab.
- tapOn:
    text: "Fermer la conversation|Close conversation"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: ".*(Accueil|Home).*"
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 15000

# ══════════════════════════════════════════════
# 3. settings (Home gear)
# ══════════════════════════════════════════════
- tapOn:
    id: "hero-settings-button"
- extendedWaitUntil:
    visible:
      text: "Paramètres|Settings"
    timeout: 15000

# ══════════════════════════════════════════════
# 4. change-password (Settings → Security card)
# ══════════════════════════════════════════════
# Row taps match the collapsed accessibilityLabel (a11y.settings.change_password
# = "Changer le mot de passe du compte"), not the visible shorter text.
- scrollUntilVisible:
    element:
      text: "Changer le mot de passe du compte|Change your account password"
    direction: DOWN
    visibilityPercentage: 1
- tapOn:
    text: "Changer le mot de passe du compte|Change your account password"
- extendedWaitUntil:
    visible:
      text: "Changer le mot de passe|Change Password"
    timeout: 15000
# The change-password screen has its own "Retour" button (common.back); the
# hardware `back` does not pop it. Tap the button.
- tapOn:
    text: "Retour|Back"
- extendedWaitUntil:
    visible:
      text: "Paramètres|Settings"
    timeout: 15000

# ══════════════════════════════════════════════
# 5. change-email (Settings → Security card)
# ══════════════════════════════════════════════
- scrollUntilVisible:
    element:
      text: "Changer l'adresse email du compte|Change your account email"
    direction: DOWN
    visibilityPercentage: 1
- tapOn:
    text: "Changer l'adresse email du compte|Change your account email"
- extendedWaitUntil:
    visible:
      text: "Changer d'email|Change Email"
    timeout: 15000
- tapOn:
    text: "Retour|Back"
- extendedWaitUntil:
    visible:
      text: "Paramètres|Settings"
    timeout: 15000

# ══════════════════════════════════════════════
# 6. privacy (Settings → FloatingContextMenu "RGPD/Privacy")
# ══════════════════════════════════════════════
- scrollUntilVisible:
    element:
      text: "Paramètres|Settings"
    direction: UP
    speed: 80
- waitForAnimationToEnd
- tapOn:
    text: "RGPD|Privacy"
    index: 0
# privacy unique marker: the "Faits essentiels / Quick Facts" heading.
- extendedWaitUntil:
    visible:
      text: "Faits essentiels|Quick Facts"
    timeout: 15000
# The privacy screen has no hardware-back; its FloatingContextMenu "Paramètres"
# item (privacy.menu.settings) navigates back to Settings. Assert a
# settings-UNIQUE marker ("Ouvrir les préférences") to confirm we left privacy
# (the privacy screen ALSO shows a "Paramètres" menu chip, so that text is
# ambiguous).
- tapOn:
    text: "Paramètres|Settings"
    index: 0
- extendedWaitUntil:
    visible:
      text: "Ouvrir les préférences|Open Preferences"
    timeout: 15000

# ══════════════════════════════════════════════
# 7. terms (Settings → Compliance card "Terms of Service")
# ══════════════════════════════════════════════
- scrollUntilVisible:
    element:
      text: "Ouvrir les conditions d'utilisation|Open Terms of Service"
    direction: DOWN
    visibilityPercentage: 1
- tapOn:
    text: "Ouvrir les conditions d'utilisation|Open Terms of Service"
# terms unique marker: the version note near the top (terms.version_note =
# "Version X — Dernière mise à jour …" / "Version X — Last updated …"). The
# "Politique de confidentialité" link is below the fold AND collapses its visible
# text under a11y "Voir la politique de confidentialité", so use the version note.
- extendedWaitUntil:
    visible:
      text: ".*(Version .* Dernière mise à jour|Version .* Last updated).*"
    timeout: 15000
# The terms screen also uses a FloatingContextMenu (no hardware back); its
# "Paramètres" item returns to Settings. Confirm via the settings-unique marker.
- tapOn:
    text: "Paramètres|Settings"
    index: 0
- extendedWaitUntil:
    visible:
      text: "Ouvrir les préférences|Open Preferences"
    timeout: 15000

# ══════════════════════════════════════════════
# 8. support (Settings → FloatingContextMenu "Support")
# ══════════════════════════════════════════════
- scrollUntilVisible:
    element:
      text: "Paramètres|Settings"
    direction: UP
    speed: 80
- waitForAnimationToEnd
- tapOn:
    text: "Support"
    index: 0
# support unique marker: the "Créer un ticket" CTA (the social channel is
# Telegram, not Instagram).
- extendedWaitUntil:
    visible:
      text: "Créer un ticket|Create Ticket"
    timeout: 15000
# The support screen back button's visible label is "Retour aux paramètres" but
# its accessibilityLabel (a11y.support.back_settings = "Retourner aux paramètres"
# / "Return to settings") COLLAPSES the subtree — match the a11y label. Swipe up
# first so the bottom button is on screen.
- swipe:
    direction: UP
    duration: 400
- tapOn:
    text: "Retourner aux paramètres|Return to settings"
- extendedWaitUntil:
    visible:
      text: "Paramètres|Settings"
    timeout: 15000
