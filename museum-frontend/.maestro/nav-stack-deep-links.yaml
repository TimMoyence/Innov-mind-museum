appId: com.musaium.mobile.preview
---
# Stack navigation — Reach each (stack) screen via real UI taps
#
# Validates the stack-route surface that the user can actually navigate
# to via in-app affordances (no deep-linking via expo-router URL).
#
# Screens covered:
#   1. /(stack)/museum-detail        — via Museums tab → museum sheet → "View details"
#   2. /(stack)/chat/[sessionId]     — via Dashboard tab → "Start New Conversation"
#   3. /(stack)/settings             — via Home hero-settings-button (gear icon)
#   4. /(stack)/change-password      — via Settings → Security card
#   5. /(stack)/change-email         — via Settings → Security card
#   6. /(stack)/privacy              — via Settings → FloatingContextMenu "Privacy"
#   7. /(stack)/terms                — via Settings → compliance card "Terms of Service"
#   8. /(stack)/support              — via Settings → FloatingContextMenu "Support"
#   9. /(stack)/tickets              — SKIPPED: no UI entry from Settings (only via
#      support hub deep-link); covered separately in support-ticket-create.yaml
#  10. /(stack)/ticket-detail        — SKIPPED: requires existing ticket pre-state
#
# For each screen we assert (a) the screen-unique title is visible and
# (b) the top-left back button returns us to the previous screen.
#
# Regression catches:
#   - Screen renamed (translation key drift on title).
#   - Missing _layout for a route group.
#   - Broken back navigation (router.back stuck / unmounted screen).
#   - Settings card refactor breaking sub-screen entry points.

- launchApp:
    clearState: false

- waitForAnimationToEnd

# ──────────────────────────────────────────────
# Phase 0: Authenticate, land on Home
# ──────────────────────────────────────────────
- runFlow:
    when:
      visible: "Welcome back"
    file: helpers/quick-login.yaml

- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Your museum companion"
    timeout: 15000

# ══════════════════════════════════════════════
# 1. museum-detail (via Museums tab → sheet → View details)
# ══════════════════════════════════════════════
- tapOn: "Museums"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Nearby Museums"
    timeout: 8000

# Tap the first museum card. The list is dynamic — we open the SHEET
# first by tapping any visible museum row, then tap "View details".
# If no museum is in range (CI emulator without geolocation), the assertion
# below will fail with a clear "no museums" message → degrade gracefully.
- runFlow:
    when:
      notVisible: "No museums found"
    commands:
      # The MuseumDirectoryList renders Pressable rows whose primary text
      # is the museum name. We tap the "View details" button as soon as
      # the sheet renders.
      - tapOn:
          text: "View details"
          optional: true
      - waitForAnimationToEnd

      # museum-detail.tsx title = params.name (dynamic), but the section
      # title "Museum Details" (museumDirectory.detail_title) is rendered
      # in a sub-card when a description exists. Fall back to "Open in
      # Maps" or "Start Chat Here" — both are screen-unique.
      - extendedWaitUntil:
          visible: "Start Chat Here"
          timeout: 8000

      # Back navigation
      - tapOn:
          id: "common.back"
          optional: true
      - back
      - waitForAnimationToEnd

      - extendedWaitUntil:
          visible: "Nearby Museums"
          timeout: 5000

# Return to home
- tapOn: "Home"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Your museum companion"
    timeout: 8000

# ══════════════════════════════════════════════
# 2. chat/[sessionId] (via Dashboard → Start New Conversation)
# ══════════════════════════════════════════════
- tapOn: "Dashboard"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Your recent museum sessions"
    timeout: 8000

# Dashboard sticky bar exposes "Start New Conversation" (conversations.start_new).
- tapOn: "Start New Conversation"
- waitForAnimationToEnd:
    timeout: 10000

# Chat session screen — we just assert the composer is rendered (the
# input field has placeholder text from chat.placeholder / chat.compose_*).
# A reliable screen-unique marker is the send-button testID present
# on every chat session screen.
- extendedWaitUntil:
    id: "send-button"
    timeout: 10000

# Back navigation — returns to Dashboard
- back
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Your recent museum sessions"
    timeout: 8000

# Return to home
- tapOn: "Home"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Your museum companion"
    timeout: 8000

# ══════════════════════════════════════════════
# 3. settings (via Home gear icon)
# ══════════════════════════════════════════════
- tapOn:
    id: "hero-settings-button"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Settings"
    timeout: 8000

# ══════════════════════════════════════════════
# 4. change-password (via Settings → Security card)
# ══════════════════════════════════════════════
- scrollUntilVisible:
    element:
      text: "Change password"
    direction: DOWN

- tapOn: "Change password"
- waitForAnimationToEnd

# change_password.title => "Change Password"
- extendedWaitUntil:
    visible: "Change Password"
    timeout: 5000

# Back to settings
- back
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Settings"
    timeout: 5000

# ══════════════════════════════════════════════
# 5. change-email (via Settings → Security card)
# ══════════════════════════════════════════════
- scrollUntilVisible:
    element:
      text: "Change email"
    direction: DOWN

- tapOn: "Change email"
- waitForAnimationToEnd

# change_email.title => "Change Email"
- extendedWaitUntil:
    visible: "Change Email"
    timeout: 5000

- back
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Settings"
    timeout: 5000

# ══════════════════════════════════════════════
# 6. privacy (via Settings → FloatingContextMenu "Privacy")
# ══════════════════════════════════════════════
# The privacy quick-link is in the top FloatingContextMenu (icon row).
# Label = settings.privacy_short => "Privacy".
# Scroll back to top to make sure the menu is visible.
- scrollUntilVisible:
    element:
      text: "Settings"
    direction: UP
    speed: 80

- tapOn:
    text: "Privacy"
    index: 0
- waitForAnimationToEnd

# privacy.tsx has a unique label "Privacy" header + a secondary subtitle
# section. "Privacy" is generic; assert on a privacy-only label:
# privacy.quick_facts or privacy.gdpr_rights. Most reliable = the "Contact
# support" CTA at bottom (privacy.open_support).
- extendedWaitUntil:
    visible: "Contact support"
    timeout: 5000

- back
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Settings"
    timeout: 5000

# ══════════════════════════════════════════════
# 7. terms (via Settings → compliance card "Terms of Service")
# ══════════════════════════════════════════════
- scrollUntilVisible:
    element:
      text: "Terms of Service"
    direction: DOWN

- tapOn: "Terms of Service"
- waitForAnimationToEnd

# terms.tsx unique marker: "Privacy Policy" link OR version_note.
# "Privacy Policy" is screen-unique inside the terms page.
- extendedWaitUntil:
    visible: "Privacy Policy"
    timeout: 5000

- back
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Settings"
    timeout: 5000

# ══════════════════════════════════════════════
# 8. support (via Settings → FloatingContextMenu "Support")
# ══════════════════════════════════════════════
- scrollUntilVisible:
    element:
      text: "Settings"
    direction: UP
    speed: 80

- tapOn:
    text: "Support"
    index: 0
- waitForAnimationToEnd

# support.tsx renders "Instagram" and "Telegram" buttons (support.instagram /
# support.telegram). "Instagram" is screen-unique inside support.
- extendedWaitUntil:
    visible: "Instagram"
    timeout: 5000

- back
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Settings"
    timeout: 5000

# ══════════════════════════════════════════════
# Phase 9: Return to Home via Back to Home CTA
# ══════════════════════════════════════════════
- scrollUntilVisible:
    element:
      text: "Back to Home"
    direction: DOWN

- tapOn: "Back to Home"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "Your museum companion"
    timeout: 10000
