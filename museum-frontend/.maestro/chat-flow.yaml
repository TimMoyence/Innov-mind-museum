appId: com.musaium.mobile.preview
---
# Chat Flow: Start a new conversation -> send a message -> verify AI response
#
# Prerequisites:
#   - Seeded test account e2e-test-login@test.musaium.dev / TestPassword123!
#   - Backend running on localhost:3000 with a working LLM provider
#
# This flow validates the core chat experience.

# ──────────────────────────────────────────────
# Phase 0: Launch fresh + log in (Maestro 2.5.1 does NOT auto-launch)
# ──────────────────────────────────────────────
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Bon retour|Welcome back|Pas de compte|Sign up"
    timeout: 40000
# Systemic interceptor #1 — analytics consent banner. It mounts a beat AFTER the
# auth screen (async consent read), so an immediate optional tap races and misses
# it. Wait for the banner to be present, THEN decline (deterministic on clearState).
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"
- tapOn:
    id: "email-input"
- inputText: "e2e-test-login@test.musaium.dev"
- tapOn:
    id: "password-input"
- inputText: "TestPassword123!"
- hideKeyboard
- tapOn:
    id: "auth-submit"
# Systemic interceptor #2 — iOS native "Save Password?" dialog
- tapOn:
    text: "Plus tard|Not Now"
    optional: true
- tapOn:
    id: "analytics-consent-decline"
    optional: true
- tapOn:
    text: "Passer|Skip"
    optional: true

# ──────────────────────────────────────────────
# Phase 1: Land on home
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      text: "Votre compagnon de musée|Your museum companion"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 2: Start a new conversation -> reach the chat composer.
#
# The home default-conversation CTA ("Commencer une nouvelle conversation",
# the LAST element in the home ScrollView) sits half-under the bottom tab bar
# on this binary — the content does not scroll it clear of the tab bar, so a
# tap on it lands on the "Musées" tab instead and routes to the nearby-museums
# directory (the hybrid companion model hands off to a context picker before
# chatting). We exercise that real home affordance (best-effort tap), then make
# the directory deterministic by tapping the "Musées" tab explicitly. From the
# directory: tap a museum card -> sheet -> "Démarrer un chat ici" -> chat.
# ──────────────────────────────────────────────
- scrollUntilVisible:
    element:
      text: "Commencer une nouvelle conversation|Start a new conversation"
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 30
- tapOn:
    text: "Commencer une nouvelle conversation|Start a new conversation"
    optional: true
- waitForAnimationToEnd

# Deterministic: ensure we are in the nearby-museums directory. The "Musées"
# tab is always present in the bottom tab bar; tapping it is idempotent (a
# no-op if already there).
- tapOn:
    text: ".*(Musées|Museums).*"
- extendedWaitUntil:
    visible:
      id: "museum-card"
    timeout: 40000

# Pick the first museum as the chat context. Tapping a card opens the museum
# sheet; "Démarrer un chat ici" (museum-sheet-start-chat) creates the session
# and routes into chat.
- tapOn:
    id: "museum-card"
    index: 0
- extendedWaitUntil:
    visible:
      id: "museum-sheet-start-chat"
    timeout: 40000
- tapOn:
    id: "museum-sheet-start-chat"

# ──────────────────────────────────────────────
# Phase 3: Handle the AI-disclosure consent sheet (first time only). It mounts
# OVER the chat screen ("Réponses générées par IA") and covers chat-input, so it
# MUST be accepted BEFORE asserting the composer is reachable.
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      text: "Accepter tout|Accept all"
    timeout: 20000
- tapOn:
    text: "Accepter tout|Accept all"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 40000

# ──────────────────────────────────────────────
# Phase 4: Send a text message
# ──────────────────────────────────────────────
- tapOn:
    id: "chat-input"
- inputText: "Who painted the Mona Lisa?"
- hideKeyboard
- tapOn:
    id: "send-button"

# ──────────────────────────────────────────────
# Phase 5: Wait for AI response
# ──────────────────────────────────────────────
# Verify the user message echoed
- assertVisible: "Who painted the Mona Lisa?"

# C-07 — Assert the ASSISTANT bubble actually rendered, not just the optimistic
# user echo. `chat-bubble-assistant` (ChatMessageBubble.tsx:205,219) wraps the
# streamed body, present only once a real assistant message exists in the store
# (the pending phase uses the distinct `chat-assistant-pending` placeholder).
- extendedWaitUntil:
    visible:
      id: "chat-bubble-assistant"
    timeout: 40000
- assertVisible:
    id: "chat-bubble-assistant"

# ──────────────────────────────────────────────
# Phase 6: Send a follow-up message
# ──────────────────────────────────────────────
- tapOn:
    id: "chat-input"
- inputText: "Tell me about the style of this painting"
- hideKeyboard
- tapOn:
    id: "send-button"
- assertVisible: "Tell me about the style of this painting"
- waitForAnimationToEnd:
    timeout: 30000

# ──────────────────────────────────────────────
# Phase 7: Close the chat and return
# ──────────────────────────────────────────────
# The close button (ChatHeader.tsx:137) carries accessibilityLabel
# a11y.chat.close — Maestro matches it via the `text` selector (a bare `label:`
# under tapOn is only a log label, NOT a target → it taps nothing).
- tapOn:
    text: "Fermer la conversation|Close conversation"
- waitForAnimationToEnd
- assertNotVisible:
    id: "chat-input"
