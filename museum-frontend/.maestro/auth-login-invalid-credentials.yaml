appId: com.musaium.mobile.preview
---
# Auth — Login with invalid credentials
#
# Attempt login with credentials that do not match any account.
# Expect backend 401 → INVALID_CREDENTIALS → FE renders
# error.auth.invalid_credentials. User MUST stay on auth screen.

# ──────────────────────────────────────────────
# Phase 1: Reach auth screen
# ──────────────────────────────────────────────
- waitForAnimationToEnd
- assertVisible:
    text: "Welcome back|Bon retour"

# ──────────────────────────────────────────────
# Phase 2: Fill wrong creds
# ──────────────────────────────────────────────
- tapOn:
    id: "email-input"
# Use a unique address that definitely does NOT exist in the backend DB
- inputText: "maestro+nope-${MAESTRO_RUN_ID:-default}@local.dev"

- tapOn:
    id: "password-input"
- inputText: "WrongPassword!9999"

- hideKeyboard

- tapOn:
    id: "auth-submit"

# ──────────────────────────────────────────────
# Phase 3: Expect invalid-credentials error, no navigation
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "auth-error-state"
    timeout: 10000

# EN: "Wrong email or password."
# FR: "Email ou mot de passe incorrect."
- assertVisible:
    text: "Wrong email or password|Email ou mot de passe incorrect"

# Sanity: still on login screen
- assertVisible:
    text: "Welcome back|Bon retour"
- assertNotVisible:
    text: "Your museum companion|Votre compagnon de musée"
