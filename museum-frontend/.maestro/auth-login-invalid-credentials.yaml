appId: com.musaium.mobile.preview
---
# Auth — Login with invalid credentials
#
# Attempt login with credentials that do not match any account.
# Expect backend 401 → INVALID_CREDENTIALS → FE renders
# error.auth.invalid_credentials. User MUST stay on auth screen.
# screen: AuthScreen

# ──────────────────────────────────────────────
# Phase 0: Cold start -> auth screen
# ──────────────────────────────────────────────
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Welcome back|Bon retour"
    timeout: 40000
- extendedWaitUntil:
    visible:
      id: "analytics-consent-banner"
    timeout: 15000
- tapOn:
    id: "analytics-consent-decline"

# ──────────────────────────────────────────────
# Phase 2: Fill wrong creds
# ──────────────────────────────────────────────
- tapOn:
    id: "email-input"
# An address that definitely does NOT exist in the backend DB. (A literal is
# deterministic; the previous bash-style ${VAR:-default} is invalid JS and Maestro
# evaluates ${} as JavaScript → SyntaxError.)
- inputText: "maestro-nope-nonexistent@local.dev"

- tapOn:
    id: "password-input"
- inputText: "WrongPassword!9999"

- hideKeyboard

- tapOn:
    id: "auth-submit"
# iOS native "Save Password?" dialog can still appear on submit attempts
- tapOn:
    text: "Plus tard|Not Now"
    optional: true

# ──────────────────────────────────────────────
# Phase 3: Expect invalid-credentials error, no navigation
# ──────────────────────────────────────────────
- extendedWaitUntil:
    visible:
      id: "auth-error-state"
    timeout: 10000

# EN: "Wrong email or password."  FR: "Email ou mot de passe incorrect."
# Maestro `text` is a FULL-STRING regex match — the rendered string ends with a
# period, so anchor-free `.*` wrappers are required around the alternation.
- extendedWaitUntil:
    visible:
      text: ".*(Wrong email or password|Email ou mot de passe incorrect).*"
    timeout: 10000

# Sanity: still on login screen
- assertVisible:
    text: "Welcome back|Bon retour"
- assertNotVisible:
    text: "Your museum companion|Votre compagnon de musée"
