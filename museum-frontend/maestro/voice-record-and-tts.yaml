# Voice record + TTS E2E flow — T3.7 of audit-360 S3 tests-quality.
#
# Voice V1 (docs/AI_VOICE.md, shipped 2026-04) is the STT -> LLM -> TTS
# round-trip that powers the "tap mic, speak, hear answer" UX on mobile:
#
#   1. User taps composer mic -> `useAudioRecorder.toggleRecording`
#      requests mic permission (native: `AudioModule.requestRecordingPermissionsAsync`),
#      flips composer mic icon to `stop-circle-outline`, sets accessibilityState.busy.
#   2. User taps mic again -> `stopRecording` saves the buffer URI, the
#      `composer-audio-pill` (Ionicons musical-notes) becomes visible.
#   3. Send path posts multipart audio to POST /api/sessions/:id/audio,
#      backend transcribes via gpt-4o-mini-transcribe, runs the LangChain
#      orchestrator, persists assistant text, returns it inline.
#   4. Assistant bubble renders with a `Listen` action (TtsSection ->
#      AssistantMetaActions, a11y label `chat.listen` in EN). Tapping it
#      lazy-fetches POST /api/sessions/:id/messages/:msgId/synthesize ->
#      gpt-4o-mini-tts MP3 buffer, plays through expo-audio. While playing
#      the a11y label flips to `chat.listening` ("Playing...") and the icon
#      to `pause-outline`. Tapping again calls `stopPlayback`.
#
# Until this commit, the voice pipeline shipped without an honest end-to-end
# Maestro flow:
#   - The legacy `.maestro/audio-recording-flow.yaml` (not run on CI per
#     .maestro/shards.json — verified 2026-05-16) was written against a
#     long-press "Hold to talk" UX that NO LONGER MATCHES the shipped
#     composer (mic is a `composer-mic-button` toggle with a11y label
#     "Voice message" / "Stop voice recording"), and a `MAESTRO_AUDIO_FIXTURE`
#     env-var read hook that was NEVER wired into source (verified via
#     grep — only the fixtures/audio.md contract doc references it).
#   - Unit tests cover `useAudioRecorder` and `useTextToSpeech` in isolation
#     but nothing exercises the composer mic toggle + assistant TTS button
#     sequence on a real device.
#
# ── Audio-injection limitation (UFR-013 honesty) ────────────────────────────
# Maestro 2.x has NO native primitive to inject WAV/PCM into the iOS or
# Android microphone stream. The three known workarounds are :
#   (a) A test-only env-var ("MAESTRO_AUDIO_FIXTURE") read by the recorder
#       hook. S3 forbids edits under `museum-frontend/features/**`, the
#       hook is not wired, and shipping a test-only branch into production
#       binary code is itself an anti-pattern.
#   (b) Long-press the mic and rely on ambient sound in the CI emulator.
#       Brittle, non-reproducible, and `useAudioRecorder` does tap-to-toggle
#       not press-and-hold, so the long-press maps to "start" then leaves
#       the recorder running indefinitely.
#   (c) A `dev`/debug deep-link that seeds a fake transcribed message.
#       No such deep-link exists in `app.config.ts` schemes (verified).
#
# **This flow uses STRATEGY (d): `inputText`-surrogate.** We tap the mic
# button to validate the toggle UX (icon flip, a11y busy state), tap it
# again to stop, then use the text composer (`ChatInput` placeholder
# `chatInput.placeholder` EN = "Ask about an artwork, monument, or send
# voice/photo...") to send a typed surrogate message. The backend returns
# an assistant reply through the same `ChatService.postMessage` use-case
# that the audio path would call after STT, so the downstream LLM ->
# assistant-bubble -> TTS button path is genuinely exercised.
#
# **What this flow validates:**
#   - Composer mic toggle UX: tap -> a11y label flips from "Voice message"
#     to "Stop voice recording", busy=true. Second tap reverts.
#   - Assistant reply renders with the `Listen` TTS action (proves the
#     `AssistantMetaActions` onToggleTts plumbing on a non-streaming bubble).
#   - Tapping Listen toggles the a11y label to "Playing..." (proves the
#     `useTextToSpeech.togglePlayback` -> backend synthesize -> expo-audio
#     play sequence, including the local FS cache write since this is a
#     fresh message id).
#
# **What this flow does NOT validate** (and any reader claiming otherwise
# misreads UFR-013):
#   - STT fidelity (gpt-4o-mini-transcribe) — there is no audio buffer
#     uploaded. Transcription accuracy stays a manual-QA + integration-test
#     pass (`tests/integration/chat/audio-transcription.test.ts` on backend).
#   - Real-world latency of the multipart audio upload path.
#   - Pixel-perfect audio playback (expo-audio decode + audible MP3) —
#     Maestro can read accessibility state but cannot listen to the
#     device speaker. Audible regression remains a manual-QA pass on a
#     physical device per the launch checklist.
#
# Once Maestro 3.x ships native audio injection (tracked upstream), this
# flow should be upgraded by replacing the inputText surrogate (Phase 4)
# with a real `injectAudio` step on the held mic state from Phase 3.
#
# ── Prerequisites ──────────────────────────────────────────────────────────
#   - Backend reachable; test account `e2e-test-login@test.musaium.dev /
#     TestPassword123!` seeded (same account used by the other regression
#     flows in `.maestro/helpers/quick-login.yaml`).
#   - Free-tier quota NOT exhausted on the account (else the paywall modal
#     hijacks "Start Conversation" — see T3.5 paywall-quota-exhaustion.yaml
#     for that path). If you run this flow back-to-back with the paywall
#     one, reset the test user's sessions_month_count first.
#   - App built with appId `com.musaium.mobile.preview` (the CI shard
#     target). `com.musaium.mobile` is the App Store screenshot build,
#     a different binary.
#   - LLM_AUDIO_TRANSCRIPTION_MODEL / TTS_MODEL configured on the backend
#     env (Voice V1 always-on, no feature flag — docs/AI_VOICE.md).
#
# ── Test discipline gaps (UFR-013 honesty) ─────────────────────────────────
#   - `composer-mic-button` HAS a testID (verified
#     `museum-frontend/features/chat/ui/Composer.tsx:109`); we use that
#     stable accessor.
#   - The TTS button (AssistantMetaActions Pressable, lines ~88-105) carries
#     NO testID — matchers below key on the EN a11y labels `Listen`
#     (`chat.listen`) and `Playing...` (`chat.listening`). If those copy
#     strings move, this flow breaks loudly which is the desired behavior.
#     A productize follow-up should add `testID="bubble-tts-button"` —
#     out of S3 scope per "no source edits" constraint.
#
# Ref: docs/roadmap-night/audit-360-2026-05-16/S3-tests.tasks.md T3.7

appId: com.musaium.mobile.preview
tags:
  - voice
  - tts
  - regression
  - smoke

---

# ──────────────────────────────────────────────────────────────────────
# Phase 1 — App startup + auth.
# ──────────────────────────────────────────────────────────────────────
- waitForAnimationToEnd

# Quick-login via shared helper. Relative path matches the existing
# museum-frontend/maestro/paywall-quota-exhaustion.yaml + rtl-switch-ar.yaml
# convention (../.maestro/helpers/quick-login.yaml from this directory).
- runFlow:
    when:
      visible: "Welcome back"
    file: ../.maestro/helpers/quick-login.yaml

# First-launch onboarding may surface between login and home.
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

# Home sentinel — same EN CTA every other regression flow waits on.
- extendedWaitUntil:
    visible: "Start Conversation"
    timeout: 15000

# ──────────────────────────────────────────────────────────────────────
# Phase 2 — Open a chat session.
# ──────────────────────────────────────────────────────────────────────
- tapOn: "Start Conversation"
- waitForAnimationToEnd:
    timeout: 10000

# AI-consent modal — first session of this user only; optional otherwise.
# `voice.disclosure.startButton` EN = "I understand, continue" via the
# AiConsentSheetContent component.
- tapOn:
    text: "I understand, continue"
    optional: true
- waitForAnimationToEnd

# Composer placeholder is the chat-screen mounted sentinel. EN =
# "Ask about an artwork, monument, or send voice/photo..." (regex tolerant
# of bidi whitespace or future copy edits to the suffix).
- extendedWaitUntil:
    visible:
      text: "Ask about an artwork.*"
    timeout: 15000

# ──────────────────────────────────────────────────────────────────────
# Phase 3 — Validate composer mic TOGGLE UX (tap -> recording -> tap -> idle).
#
# `useAudioRecorder.toggleRecording` requests mic permission on first tap.
# On Android the system permission dialog ("Allow Musaium to record audio?")
# surfaces; on iOS the same. We pre-grant the permission so the dialog is
# either skipped or auto-dismissed within Maestro's tap-through. Use the
# `composer-mic-button` testID — stable, source-verified.
# ──────────────────────────────────────────────────────────────────────
- tapOn:
    id: "composer-mic-button"
- waitForAnimationToEnd

# Permission dialog auto-handling. Maestro grants media-recording permission
# automatically on the CI emulator (see `.maestro/config.yaml`). If a system
# dialog DOES surface (first-run only), tap through the localized accept.
- tapOn:
    text: "Allow"
    optional: true
- tapOn:
    text: "While using the app"
    optional: true
- waitForAnimationToEnd

# After the toggle, the a11y label MUST flip from "Voice message" to
# "Stop voice recording" (`chat.composer.a11y.mic_recording` EN bundle).
# This is the visible signal that `isRecording` -> true and the recorder
# is open. Without audio injection (see preamble), the recorder captures
# silence which is fine for UX validation — we're not asserting transcription.
- extendedWaitUntil:
    visible:
      label: "Stop voice recording"
    timeout: 5000

# Sanity: the busy state is held on the mic button (recorder is actively
# capturing). Maestro reads accessibilityState.busy via the same label
# lookup — if the toggle didn't fire, the label would still read "Voice
# message" and this assertion would fail.
- assertVisible:
    label: "Stop voice recording"

# Stop recording — second tap on the same button. This calls
# `stopRecording`, saves the URI, and (on web) the `recordedAudioUri`
# state becomes truthy. On native the `composer-audio-pill` only appears
# when `hasAudio = recordedAudioUri !== null` — which requires a non-empty
# buffer URI from expo-audio. Without real mic input the URI may or may
# not materialize; assert optionally to absorb both outcomes honestly.
- tapOn:
    id: "composer-mic-button"
- waitForAnimationToEnd

# After stop, the a11y label MUST flip back to "Voice message"
# (`chat.composer.a11y.mic`). Proves `isRecording` -> false.
- extendedWaitUntil:
    visible:
      label: "Voice message"
    timeout: 5000

# Optional: if expo-audio produced a buffer URI, the audio pill surfaces.
# Captured silence on the CI emulator may or may not produce a URI; this
# assertion is OPTIONAL to keep the flow stable across emulator audio
# stack variability.
- assertVisible:
    id: "composer-audio-pill"
    optional: true

# ──────────────────────────────────────────────────────────────────────
# Phase 4 — Surrogate: send a TEXT message to drive the LLM -> assistant
#           reply -> TTS-button path. See preamble for why this is a
#           surrogate (no STT validation).
# ──────────────────────────────────────────────────────────────────────
- tapOn:
    text: "Ask about an artwork.*"

# Surrogate prompt — picks an art-on-topic question so the chat
# guardrail (art-topic-guardrail.ts V1 keyword filter) does not block.
# Keeps the assistant reply short so TTS synthesize stays under the
# 30s extendedWaitUntil window.
- inputText: "Who painted the Mona Lisa?"

- tapOn:
    label: "Send message"

# Wait for the assistant reply bubble. The `Listen` a11y label
# (`chat.listen` EN) is rendered by AssistantMetaActions on every
# non-streaming assistant message via TtsSection — its presence is the
# success criterion for "assistant reply landed AND TTS plumbing wired".
- extendedWaitUntil:
    visible:
      label: "Listen"
    timeout: 30000

# Sanity: the user's surrogate question is still visible (the bubble
# wasn't replaced by an error). Confirms the round-trip preserved
# conversation state.
- assertVisible: "Who painted the Mona Lisa?"

# ──────────────────────────────────────────────────────────────────────
# Phase 5 — Trigger TTS playback, assert busy state, then stop.
#
# `useTextToSpeech.togglePlayback(messageId)` POSTs the synthesize
# request, decodes the MP3 buffer, and starts expo-audio playback.
# A11y label flips from "Listen" -> "Playing..." while audible, and
# the icon swaps to `pause-outline`. Maestro can't hear the speaker
# but it CAN read the label flip — that's the playback success signal.
# ──────────────────────────────────────────────────────────────────────
- tapOn:
    label: "Listen"

# Loading indicator (ActivityIndicator) renders briefly while the
# synthesize POST is in flight. Tolerate the transient by waiting on
# the post-loading label flip directly.
- extendedWaitUntil:
    visible:
      label: "Playing..."
    timeout: 20000

- assertVisible:
    label: "Playing..."

# Tap again to stop. `togglePlayback` with the same messageId calls
# `stopPlayback` -> `cleanup()` -> player.remove() -> isPlaying=false.
# Label reverts to "Listen".
- tapOn:
    label: "Playing..."
- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      label: "Listen"
    timeout: 5000

- assertVisible:
    label: "Listen"

# ──────────────────────────────────────────────────────────────────────
# Phase 6 — Cleanup: close the chat.
#
# `a11y.chat.close` EN = "Close conversation".
# ──────────────────────────────────────────────────────────────────────
- tapOn:
    label: "Close conversation"
- waitForAnimationToEnd

# Back on home; flow complete.
- extendedWaitUntil:
    visible: "Start Conversation"
    timeout: 10000
