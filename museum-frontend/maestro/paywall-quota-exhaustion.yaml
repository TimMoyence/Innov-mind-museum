# Soft-paywall quota-exhaustion E2E flow — T3.5 of audit-360 S3 tests-quality.
#
# Validates the R1 soft-paywall journey shipped 2026-05-16 against the three
# correctives:
#   - F1 — middleware ordering (valid body × N then 4th hit triggers 402, not
#     inflated by Zod 400s).
#   - F2 — RN Modal persistent host state reset (email + consent + banner
#     must NOT leak across re-opens; persistent host = `app/_layout.tsx`
#     PaywallModalHost mounted unconditionally).
#   - F3 — ISO wire → Intl FE format doctrine (resetAt rendered via
#     Intl.DateTimeFormat, never raw `2026-06-01T00:00:00.000Z`).
#
# Path note (T3.5 reviewer): authored at `museum-frontend/maestro/` per the
# tasks.md ask, alongside the App Store screenshot flows (capture-screens,
# login-and-capture, screenshots). The Android CI shard matrix (.github/
# workflows/ci-cd-mobile.yml + museum-frontend/.maestro/shards.json) reads
# from `museum-frontend/.maestro/` (dot prefix). Wiring this flow into CI
# requires either (a) relocate to `.maestro/paywall-quota-exhaustion.yaml`
# and add a `paywall` shard to shards.json + ci-cd-mobile.yml matrix, or
# (b) keep here as a doc-only regression spec runnable via
# `maestro test museum-frontend/maestro/paywall-quota-exhaustion.yaml`.
# Option (a) is the productive path; left out of this commit per T3.5
# "Optional wiring" guidance and to keep S3 scope to a single YAML.
#
# AppId pinned to `.preview` to match the existing CI Maestro shard flows
# (.maestro/auth-flow.yaml, .maestro/chat-flow.yaml). The capture-screens
# trio in this directory uses `.mobile` (production build) — that's a
# different target and doesn't apply to regression e2e.
#
# Prerequisites:
#   - Backend on localhost:3000 with FREE_TIER_MONTHLY_SESSION_LIMIT=3 (default).
#   - Test account `e2e-test-login@test.musaium.dev / TestPassword123!`
#     seeded as free-tier user with sessions_month_count=0 BEFORE running.
#   - Backend respects the F1-corrective middleware ordering (validateBody
#     runs before monthlySessionQuota — `chat-session.route.ts`).
#
# Test discipline gaps (UFR-013 honesty):
#   - QuotaUpsellModal carries NO testID props (verified by grep of
#     features/paywall/*). All matchers below use text/label fallbacks
#     keyed on the i18n strings in shared/locales/en/translation.json
#     (paywall.resetsOn, paywall.modalTitle, paywall.fieldEmail,
#     paywall.consent, paywall.submit, paywall.success, paywall.dismiss).
#     S3 scope forbids editing museum-frontend/features/** — adding
#     testIDs to source is out of scope and noted as TODO below.
#   - The honeypot field is `display:'none'` and cannot be inspected via
#     Maestro accessibility queries — its reset is covered by the
#     QuotaUpsellModal.test.tsx unit test (F2.AC5), not this flow.
#   - The locale-formatted reset date regex tolerates EN long-form output
#     "June 1, 2026" / "May 31, 2026" (Intl `dateStyle: 'long'` can shift
#     ±1 day by device timezone — F3.Risk9). What it MUST NOT match is the
#     raw ISO `T00:00:00.000Z` suffix — that's the F3 bug we're guarding.
#
# TODO (out of S3 scope, productize V1.1):
#   - Add testIDs to QuotaUpsellModal (`paywall-modal-root`,
#     `paywall-modal-email`, `paywall-modal-consent`, `paywall-modal-submit`,
#     `paywall-modal-dismiss`, `paywall-modal-reset-meta`) so this flow
#     can use stable accessors instead of locale-coupled text matchers.
#   - Relocate to .maestro/ + register `paywall` shard once stable.

appId: com.musaium.mobile.preview
tags:
  - paywall
  - regression
  - r1-corrective

---

# ────────────────────────────────────────────────────────────────
# Phase 1 — App startup + auth (login as free-tier test account)
# ────────────────────────────────────────────────────────────────
- waitForAnimationToEnd

# If we land on the auth screen, run the shared quick-login helper that the
# other regression flows (chat-flow, auth-persistence, etc.) use. This
# guarantees the same account state across CI shards.
- runFlow:
    when:
      visible: "Welcome back"
    file: ../.maestro/helpers/quick-login.yaml

# First-launch onboarding sometimes appears between login and home.
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

# Home screen sentinel — every regression flow waits on this string.
- extendedWaitUntil:
    visible: "Start Conversation"
    timeout: 15000

# ────────────────────────────────────────────────────────────────
# Phase 2 — Exhaust the monthly free-tier quota (limit = 3).
#
# F1 corrective ensures only VALID-body POST /api/sessions calls bump
# the counter. Each successful "Start Conversation" tap → AI-consent
# accept → first message send creates one session row + bumps the
# free-tier counter exactly once.
#
# We run the create-session+send loop THREE times to reach count=3.
# The fourth attempt MUST trip the 402 → axios interceptor →
# PaywallProvider.open → QuotaUpsellModal visible.
# ────────────────────────────────────────────────────────────────

- repeat:
    times: 3
    commands:
      - tapOn: "Start Conversation"
      - waitForAnimationToEnd:
          timeout: 10000

      # AI-consent modal — first session only; optional on later iterations.
      - tapOn:
          text: "I understand, continue"
          optional: true
      - waitForAnimationToEnd

      # Send one message so the session is materially used (mirrors
      # real user flow — not strictly required for F1's session-create
      # quota bump, but keeps the loop semantically honest).
      - tapOn:
          text: "Ask about an artwork.*"
      - inputText: "Quota exhaustion test message"
      - tapOn:
          label: "Send message"

      # Close the conversation and return to home for the next iteration.
      - waitForAnimationToEnd:
          timeout: 20000
      - tapOn:
          label: "Close conversation"
      - waitForAnimationToEnd
      - extendedWaitUntil:
          visible: "Start Conversation"
          timeout: 10000

# ────────────────────────────────────────────────────────────────
# Phase 3 — Trigger the 4th create-session → expect 402 → paywall modal.
#
# The axios interceptor in `museum-frontend/shared/infrastructure/
# httpClient.ts` catches the 402 and calls PaywallProvider.open(reason).
# The PaywallModalHost (`app/_layout.tsx`) flips `visible=true` on
# <QuotaUpsellModal>. The modal title is `paywall.modalTitle` in
# `shared/locales/en/translation.json` → "Free monthly limit reached".
# ────────────────────────────────────────────────────────────────
- tapOn: "Start Conversation"
- waitForAnimationToEnd:
    timeout: 10000

# Modal must surface within a few seconds of the 402 response.
- extendedWaitUntil:
    visible: "Free monthly limit reached"
    timeout: 15000

# Sanity: the modal copy is visible — title + the resetsOn metadata prefix.
- assertVisible: "Free monthly limit reached"
- assertVisible:
    text: "Resets on.*"

# ────────────────────────────────────────────────────────────────
# Phase 4 — F3 doctrine assertion: reset date is LOCALIZED, not raw ISO.
#
# The BE emits resetAt as `2026-06-01T00:00:00.000Z` (or the next-month
# equivalent — `monthly-session-quota.middleware.ts:firstOfNextUtcMonthIso`).
# F3 requires `Intl.DateTimeFormat(i18n.language, { dateStyle: 'long' })`
# at the render site. The negative assertion below rejects any string that
# still carries the raw ISO suffix `T00:00:00.000Z` — if a refactor ever
# drops the formatter and reverts to raw interpolation, this flow fails.
#
# Maestro `assertNotVisible` with a regex is the negative-match guardrail.
# ────────────────────────────────────────────────────────────────
- assertNotVisible:
    text: ".*T00:00:00.*Z.*"
- assertNotVisible:
    text: ".*[0-9]{4}-[0-9]{2}-[0-9]{2}T.*"

# ────────────────────────────────────────────────────────────────
# Phase 5 — Submit the lead form (email + consent) once.
# ────────────────────────────────────────────────────────────────
- tapOn:
    text: "Email address"
- inputText: "paywall-e2e@test.musaium.dev"

# Tap the consent checkbox label — it carries the same accessibilityLabel
# as the field text via Pressable accessibilityLabel={t('paywall.consent')}.
- tapOn:
    text: "I agree to receive an email when premium launches."

# Submit ("Join the premium waitlist" = paywall.submit in EN bundle).
- tapOn:
    text: "Join the premium waitlist"

# Success banner — paywall.success EN bundle = "Thanks — we'll be in touch."
- extendedWaitUntil:
    visible: "Thanks — we'll be in touch."
    timeout: 10000

# ────────────────────────────────────────────────────────────────
# Phase 6 — Close the modal (paywall.dismiss accessibilityLabel = "Close").
#
# F2 corrective: the modal subtree stays mounted (PaywallModalHost renders
# unconditionally) so `visible=false` only hides chrome — the useEffect on
# [visible] resets the four useState slots (email, consent, website, state).
# ────────────────────────────────────────────────────────────────
- tapOn:
    label: "Close"
- waitForAnimationToEnd

# Modal chrome must be gone.
- assertNotVisible: "Free monthly limit reached"

# ────────────────────────────────────────────────────────────────
# Phase 7 — F2 doctrine assertion: re-open the modal, verify clean state.
#
# To re-trigger the 402 without consuming MORE sessions (we're already
# locked out), we tap "Start Conversation" again — the BE will respond
# 402 once more (the user is over limit, the counter is sticky for the
# month). The modal re-opens with the SAME PaywallProvider state but the
# QuotaUpsellModal's local state slots MUST have reset.
# ────────────────────────────────────────────────────────────────
- tapOn: "Start Conversation"
- waitForAnimationToEnd:
    timeout: 10000

- extendedWaitUntil:
    visible: "Free monthly limit reached"
    timeout: 15000

# F2.R7 — email field shows the placeholder/empty, NOT the previously
# submitted address. Maestro can't directly inspect a TextInput.value, but
# we CAN assert that the previously typed text is no longer present on the
# rendered screen — RN renders typed text as visible content inside the
# input. The test account's email itself ("e2e-test-login@…") may appear
# elsewhere on the screen (e.g. via Sentry breadcrumb overlay in dev mode)
# so we specifically reject the LEAD email we typed in Phase 5.
- assertNotVisible: "paywall-e2e@test.musaium.dev"

# F2.R4 / F2.R5 — the success banner must NOT be inherited from the prior
# open. paywall.success EN = "Thanks — we'll be in touch."
- assertNotVisible: "Thanks — we'll be in touch."

# F2.R6 — GDPR Art. 7 consent renewal. The consent text remains on screen
# (it's a label), but the checkbox visual state must be unchecked. Maestro
# 2.x lacks a direct accessibilityState getter, so we assert the consent
# label is visible (still a checkbox to tick) and rely on the F2 unit-test
# corpus (F2.AC2) for the strict accessibilityState.checked = false check.
- assertVisible: "I agree to receive an email when premium launches."

# Phase 8 — Tap upgrade CTA again on the fresh modal and confirm the
# submit path is still wired (the POST to /api/leads/paywall-interest
# happens fire-and-forget; we only need to ensure the button responds).
- tapOn:
    text: "Join the premium waitlist"

# F2.R6 + onSubmit `if (!consent) return;` guard — without re-ticking
# consent on this reopen, the submit MUST NOT fire. The sending/success
# banners should stay hidden.
- assertNotVisible: "Sending…"
- assertNotVisible: "Thanks — we'll be in touch."

# ────────────────────────────────────────────────────────────────
# Phase 9 — Dismiss the modal cleanly to leave the app in a usable state.
# ────────────────────────────────────────────────────────────────
- tapOn:
    label: "Close"
- waitForAnimationToEnd
- assertNotVisible: "Free monthly limit reached"
