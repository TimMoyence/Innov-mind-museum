# Maestro Screenshot Automation for Musaium
# Usage: TEST_EMAIL=x TEST_PASSWORD=y maestro test maestro/screenshots.yaml
#
# Device sizes:
#   iPhone 16 Pro Max (6.7") — required for App Store
#   iPhone 16 Plus (6.5") — recommended
#   iPad Pro 13-inch (M4) — required if iPad supported

appId: com.musaium.mobile

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# --- Launch app (keep Metro bundler connection) ---
- launchApp:
    clearState: false

# If Expo Dev Client list appears, tap localhost
- tapOn:
    text: ".*localhost.*"
    optional: true

# Dismiss Expo dev menu if it appears
- tapOn:
    text: "Continue"
    optional: true

# Dismiss any other modal
- tapOn:
    text: ".*ontinue.*|.*ismiss.*|.*lose.*"
    optional: true

# Wait for the actual app to load
- extendedWaitUntil:
    visible: ".*Bon retour.*|.*Se connecter.*|.*Sign in.*"
    timeout: 20000

# --- Screenshot 1: Auth Screen ---
- takeScreenshot: 01_auth

# --- Login: tap on the email text field (placeholder text) ---
- tapOn:
    text: ".*E-mail.*"
    index: 0
    optional: true
- tapOn:
    point: "50%,46%"
    optional: true
- inputText: ${TEST_EMAIL}

# Tap password field
- tapOn:
    text: ".*Mot de passe.*"
    index: 0
    optional: true
- tapOn:
    point: "50%,52%"
    optional: true
- inputText: ${TEST_PASSWORD}

# Hide keyboard and tap login
- hideKeyboard
- tapOn:
    text: ".*Se connecter.*"

# Wait for home screen
- extendedWaitUntil:
    visible: ".*Musaium.*|.*Bonjour.*|.*Hello.*"
    timeout: 20000

# --- Screenshot 2: Home ---
- takeScreenshot: 02_home

# --- Navigate to Conversations Tab ---
- tapOn:
    text: ".*onversation.*"
    optional: true

- extendedWaitUntil:
    visible: ".*onversation.*"
    timeout: 8000

# --- Screenshot 3: Conversations ---
- takeScreenshot: 03_conversations

# --- Navigate back to Home tab ---
- tapOn:
    text: ".*ccueil.*|.*ome.*"
    optional: true

# --- Navigate to Settings ---
- tapOn:
    text: ".*églages.*|.*aramètre.*|.*ettings.*"
    optional: true

- extendedWaitUntil:
    visible: ".*églages.*|.*aramètre.*|.*ettings.*|.*ompte.*"
    timeout: 5000

# --- Screenshot 4: Settings ---
- takeScreenshot: 04_settings
