# Login and capture screenshots — run AFTER app is already open on auth screen
# Usage: TEST_EMAIL=x TEST_PASSWORD=y maestro test maestro/login-and-capture.yaml

appId: com.musaium.mobile

env:
  TEST_EMAIL: ${TEST_EMAIL}
  TEST_PASSWORD: ${TEST_PASSWORD}

---

# --- Tap email field and type ---
- tapOn:
    point: "50%,37%"
- inputText: ${TEST_EMAIL}

# --- Tap password field and type ---
- tapOn:
    point: "50%,42%"
- inputText: ${TEST_PASSWORD}

# --- Hide keyboard and tap Se connecter ---
- hideKeyboard
- tapOn:
    text: ".*Se connecter.*"

# Wait for home to load
- extendedWaitUntil:
    visible: ".*Musaium.*|.*Bonjour.*"
    timeout: 20000

# --- Screenshot 2: Home ---
- takeScreenshot: 02_home

# --- Tap Conversations tab ---
- tapOn:
    text: ".*onversation.*"
    optional: true
- extendedWaitUntil:
    visible: ".*onversation.*"
    timeout: 8000

# --- Screenshot 3: Conversations ---
- takeScreenshot: 03_conversations

# --- Back to home and open settings ---
- tapOn:
    text: ".*ccueil.*|.*ome.*"
    optional: true

- tapOn:
    text: ".*églages.*|.*ettings.*"
    optional: true
- extendedWaitUntil:
    visible: ".*églages.*|.*ettings.*|.*ompte.*|.*rofil.*"
    timeout: 5000

# --- Screenshot 4: Settings ---
- takeScreenshot: 04_settings
