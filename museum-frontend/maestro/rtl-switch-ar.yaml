# RTL switch (Arabic) E2E smoke flow — T3.6 part 1/2 of audit-360 S3 tests-quality.
#
# Backs the 2026-05-14 audit F10 RTL codemod (28 sites migrated to
# marginStart/End, paddingStart/End, start/end positional, borderStart/End)
# with a bout-en-bout Maestro flow. Prior to this commit the RTL pipeline
# was covered ONLY by 3 jest-unit screen samples (__tests__/rtl/*) —
# nothing exercised the actual locale switch + RN I18nManager flip on a
# device. CLAUDE.md hardened the rule but had no e2e gate.
#
# Scope of this flow (intentionally narrow):
#   1. Launch app, login if needed.
#   2. Settings -> Open Preferences -> tap the Arabic language button
#      (rendered as native label "العربية" per shared/config/supportedLocales.ts).
#   3. Save preferences -> assert i18n re-render landed (AR strings visible).
#   4. Walk Home, Chat (via "Start Conversation" CTA), and Discover (via
#      Guided Mode menu — the only in-app path that pushes /(stack)/discover;
#      app.config.ts declares scheme=musaium but Maestro openLink across
#      Android/iOS preview builds is brittle and out of scope for a smoke).
#   5. On each screen assert at least one stable AR i18n string is visible,
#      which proves (a) the locale switch propagated through I18nProvider,
#      (b) the screen mounted without crash on RTL flip, and (c) no
#      catastrophic layout regression hides the primary copy.
#
# ── Acknowledged limitation ────────────────────────────────────────────────
# Maestro 2.x CANNOT read I18nManager.isRTL directly — there's no host-bridge
# API exposed to the YAML runner. Verification here is VISUAL + SMOKE:
#   - AR strings render -> i18next + I18nProvider wired correctly.
#   - Screens don't crash on locale flip -> RTL bidi flip + RN re-mount safe.
#   - End-aligned chrome (settings gear in home header, close icon in chat
#     header) remains tappable post-flip -> hit target moved with RTL flip.
# Pixel-perfect RTL parity (mirror of icon orientation, scroll direction,
# swipe gesture sides) remains an offline screenshot-diff job — see
# __tests__/rtl/_rtl-style-audit.ts for the unit-side audit and the T3.6
# part 2/2 Hebrew flow for a second locale data-point.
#
# ── Test discipline gaps (UFR-013 honesty) ─────────────────────────────────
#   - The language buttons in app/(stack)/preferences.tsx carry NO testID
#     props. Matchers below key on the AR native label "العربية" (visible
#     text) — robust because supportedLocales.ts is the source of truth and
#     the value never gets translated. If that file changes, this flow
#     breaks loudly which is the desired behavior.
#   - The Settings -> Preferences -> Save path is identical to the existing
#     .maestro/settings-locale-switch.yaml FR<->EN flow; we reuse its
#     conventions rather than refactor it into a helper (one flow, one ask).
#   - This file lives at museum-frontend/maestro/ (NOT .maestro/) per the
#     T3.6 ask and mirroring T3.5 paywall-quota-exhaustion.yaml placement.
#     Wiring into the CI Android shard matrix would require relocating to
#     .maestro/ + adding an `rtl` shard to .maestro/shards.json + bumping
#     the matrix in ci-cd-mobile.yml. Left as Optional Wiring per the same
#     guidance that landed paywall — keeps S3 scope to YAML-only.
#
# ── Prerequisites ──────────────────────────────────────────────────────────
#   - Backend reachable; test account `e2e-test-login@test.musaium.dev /
#     TestPassword123!` seeded (same account .maestro/helpers/quick-login
#     uses for the other regression flows).
#   - App built with appId `com.musaium.mobile.preview` (the CI shard target;
#     `com.musaium.mobile` is App Store screenshot build, different binary).
#
# ── Recovery note ──────────────────────────────────────────────────────────
# This flow DOES leave the app in Arabic locale. Re-running on the same
# emulator picks up `language=ar` from AsyncStorage. The flow itself only
# asserts a forward switch (en/fr -> ar); a sibling reset flow or manual
# re-launch is needed to restore the device to LTR. Acceptable for a smoke;
# device gets reset between CI runs anyway.
#
# Ref: docs/roadmap-night/audit-360-2026-05-16/S3-tests.tasks.md T3.6

appId: com.musaium.mobile.preview
tags:
  - rtl
  - a11y
  - smoke
  - i18n

---

# ──────────────────────────────────────────────────────────────────────
# Phase 1 — App startup + auth.
# ──────────────────────────────────────────────────────────────────────
- waitForAnimationToEnd

# Quick-login via shared helper. The relative path matches the existing
# museum-frontend/maestro/paywall-quota-exhaustion.yaml convention
# (../.maestro/helpers/quick-login.yaml from this directory).
- runFlow:
    when:
      visible: "Welcome back"
    file: ../.maestro/helpers/quick-login.yaml

# First-launch onboarding may appear post-login. Optional.
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

# Home sentinel — same string the locale-switch + paywall flows wait on.
# This asserts we're in an LTR locale (en) at flow entry; the home subtitle
# in EN is "Your museum companion" (home.hero_title in shared/locales/en).
- extendedWaitUntil:
    visible: "Your museum companion"
    timeout: 15000

# ──────────────────────────────────────────────────────────────────────
# Phase 2 — Navigate Home -> Settings -> Preferences.
# Mirrors .maestro/settings-locale-switch.yaml so the entry path is the
# same across the FR/EN flow and this AR flow.
# ──────────────────────────────────────────────────────────────────────
- tapOn: "Settings"
- waitForAnimationToEnd

- scrollUntilVisible:
    element: "Open Preferences"
    direction: DOWN

- tapOn: "Open Preferences"
- waitForAnimationToEnd

- assertVisible: "Preferences"

# ──────────────────────────────────────────────────────────────────────
# Phase 3 — Tap the Arabic language button.
#
# shared/config/supportedLocales.ts pins nativeLabel="العربية" for code=ar.
# app/(stack)/preferences.tsx renders LANGUAGE_OPTIONS.map -> Pressable
# with Text={option.nativeLabel}. Tapping it calls setLanguage('ar') which
# the I18nContext propagates to react-i18next + RN I18nManager (RTL flip).
# ──────────────────────────────────────────────────────────────────────
- scrollUntilVisible:
    element:
      text: "العربية"
    direction: DOWN

- tapOn:
    text: "العربية"
- waitForAnimationToEnd

# Save the preference so the locale persists past navigation. After save,
# the screen shows the AR-translated "Preferences saved" toast.
# preferences.saved AR = "تم حفظ التفضيلات"
- scrollUntilVisible:
    element: "حفظ التفضيلات"
    direction: DOWN
    optional: true
- tapOn:
    text: "حفظ التفضيلات"
    optional: true
- waitForAnimationToEnd

# Sanity: the Preferences screen heading now renders in Arabic.
# preferences.title AR = "التفضيلات" (also the menu label for `back`).
- assertVisible: "التفضيلات"

# ──────────────────────────────────────────────────────────────────────
# Phase 4 — Walk back to Home; assert AR strings render + screen mounts.
#
# preferences.menu.settings AR = "الإعدادات" — tapping returns to Settings,
# from which we navigate Home via the AR settings.back_to_home label
# = "العودة إلى الصفحة الرئيسية" (we use the simpler back gesture to keep
# the flow resilient to copy churn).
# ──────────────────────────────────────────────────────────────────────
- back
- waitForAnimationToEnd

# Now on Settings screen in AR. settings.title AR = "الإعدادات".
- assertVisible: "الإعدادات"

# Back to Home. The home tab is named via tabs.home AR = "الرئيسية".
- scrollUntilVisible:
    element: "العودة إلى الصفحة الرئيسية"
    direction: DOWN
    optional: true
- tapOn:
    text: "العودة إلى الصفحة الرئيسية"
    optional: true
- waitForAnimationToEnd

# If the back-button text matcher missed (e.g. due to scroll), fall back
# to the tab bar "Home" label which is always reachable.
- tapOn:
    text: "الرئيسية"
    optional: true
- waitForAnimationToEnd

# Home rendered in Arabic. home.hero_title AR = "رفيقك في المتحف".
# That string only appears once we're on the home (tabs)/home.tsx screen
# AND the locale switch propagated. Assertion = smoke success criterion 1.
- extendedWaitUntil:
    visible: "رفيقك في المتحف"
    timeout: 15000
- assertVisible: "رفيقك في المتحف"

# End-aligned chrome smoke: the settings gear in the home hero carries
# a11y.home.settings_gear AR = "فتح الإعدادات". Under RTL, the touch
# target moves to the start (visual left in AR). Maestro can't probe
# coordinates reliably across emulator sizes, so we assert by
# accessibilityLabel that the control remains discoverable — proves it
# didn't get clipped or unmounted by an LTR-only layout assumption.
- assertVisible:
    label: "فتح الإعدادات"

# ──────────────────────────────────────────────────────────────────────
# Phase 5 — Open Chat from Home; assert AR rendering + no crash.
#
# home.start_conversation AR = "بدء محادثة" (CTA label). Tapping pushes
# /(stack)/chat/[sessionId] after creating a session. The screen mounts
# the chat composer + ai-disclosure footer.
# ──────────────────────────────────────────────────────────────────────
- tapOn:
    text: "بدء محادثة"
- waitForAnimationToEnd:
    timeout: 10000

# AI consent modal (first session of this user only). Use the AR label;
# falls through if already accepted previously.
# voice.disclosure.startButton AR = "ابدأ".
- tapOn:
    text: "ابدأ"
    optional: true
- waitForAnimationToEnd

# Chat screen mounted in AR. chatInput.placeholder AR = "اسأل عن عمل فني
# أو معلم، أو أرسل صوتًا/صورة...". The composer renders this as the
# input placeholder, visible until focus + input. This is the smoke
# success criterion for chat.
- extendedWaitUntil:
    visible:
      text: ".*اسأل عن عمل فني.*"
    timeout: 15000

# AI disclosure footer carries chat_footer AR = "ردود مُولَّدة بالذكاء
# الاصطناعي — قد تحتوي على أخطاء.". Present on every chat session.
# Use a permissive regex to absorb pre/post-bidi whitespace differences.
- assertVisible:
    text: ".*ردود مُولَّدة بالذكاء الاصطناعي.*"

# End-aligned chrome smoke: chat header close button carries
# a11y.chat.close AR = "إغلاق المحادثة". Under RTL its visual position
# is mirrored; the label remains the discoverability anchor.
- assertVisible:
    label: "إغلاق المحادثة"

# Close the chat back to home. Using the AR a11y label is the
# RTL-safe route — tapping by visual position would couple to a
# specific screen size.
- tapOn:
    label: "إغلاق المحادثة"
- waitForAnimationToEnd

# Back on home.
- extendedWaitUntil:
    visible: "رفيقك في المتحف"
    timeout: 10000

# ──────────────────────────────────────────────────────────────────────
# Phase 6 — Open Discover; assert AR rendering + no crash.
#
# Discover (/(stack)/discover) has no direct home entry — only
# /(stack)/guided-museum-mode pushes it (see grep `router.push.*discover`
# in app/). Path: Home -> Settings -> "Open Guided Mode" -> "Start exploring".
#
# settings.guided_mode_info AR = "معلومات الوضع الإرشادي".
# guidedMode.start_exploring AR = "ابدأ الاستكشاف في اكتشف"
# OR a11y.guidedMode.start_exploring AR = "بدء الاستكشاف".
# ──────────────────────────────────────────────────────────────────────
- tapOn:
    label: "فتح الإعدادات"
- waitForAnimationToEnd

- scrollUntilVisible:
    element: "معلومات الوضع الإرشادي"
    direction: DOWN
- tapOn:
    text: "معلومات الوضع الإرشادي"
- waitForAnimationToEnd

# Tap the primary "Start exploring" CTA. Use accessibilityLabel
# a11y.guidedMode.start_exploring AR = "بدء الاستكشاف" as the matcher —
# the visible text "ابدأ الاستكشاف في اكتشف" includes the screen name
# and is more verbose; the a11y label is a more stable lookup.
- scrollUntilVisible:
    element:
      label: "بدء الاستكشاف"
    direction: DOWN
- tapOn:
    label: "بدء الاستكشاف"
- waitForAnimationToEnd:
    timeout: 10000

# Discover screen mounted in AR. discover.title AR = "اكتشف".
# This is the smoke success criterion for discover.
- extendedWaitUntil:
    visible: "اكتشف"
    timeout: 15000
- assertVisible: "اكتشف"

# Verify a known body string renders — discover.photo_title AR =
# "التقط صورة لعمل فني". Confirms the screen body mounted, not just
# the header. Discover ships 4 cards (photo / voice / continue /
# guided) and the photo card is always the first one rendered.
- assertVisible: "التقط صورة لعمل فني"

# End-aligned chrome smoke: discover photo card a11y label AR =
# "تصوير عمل فني" (a11y.discover.photo_card). Under RTL the card
# chrome (chevron, etc.) flips; the label anchors discoverability.
- assertVisible:
    label: "تصوير عمل فني"

# ──────────────────────────────────────────────────────────────────────
# Phase 7 — Flow complete. App is intentionally LEFT in AR locale.
# Re-runs on the same emulator pick up the persisted language. The
# CI matrix wipes emulator state between jobs (see
# .github/workflows/ci-cd-mobile.yml maestro reset step), so this
# is safe.
# ──────────────────────────────────────────────────────────────────────
- waitForAnimationToEnd
