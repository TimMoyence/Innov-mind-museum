name: ci-web

on:
  pull_request:
    paths:
      - 'museum-web/**'
      - '.github/workflows/ci-web.yml'
  push:
    paths:
      - 'museum-web/**'
      - '.github/workflows/ci-web.yml'
    branches: ['main']

jobs:
  web-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: museum-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: museum-web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run lint

      - name: Build
        run: pnpm run build
