name: lighthouse-web

on:
  pull_request:
    paths:
      - 'museum-web/**'
      - '.github/workflows/lighthouse-web.yml'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & Build
        working-directory: museum-web
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: museum-web/lighthouserc.json
          uploadArtifacts: true
