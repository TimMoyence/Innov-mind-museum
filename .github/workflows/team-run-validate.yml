name: team-run-validate

on:
  workflow_dispatch:
  push:
    branches: ['main']

jobs:
  # Gate: only run on workflow_dispatch or commits with [team-run] in message
  should-run:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif echo "${{ github.event.head_commit.message }}" | grep -q '\[team-run\]'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  backend-validate:
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: museum-backend
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: museum-backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (tsc --noEmit)
        run: pnpm run lint

      - name: Unit/Integration Tests
        run: pnpm test -- --bail --watchman=false --runInBand --testPathIgnorePatterns=tests/e2e

      - name: OpenAPI Contract Tests
        run: pnpm run test:contract:openapi

      - name: OpenAPI Spec Validate
        run: pnpm run openapi:validate

      - name: Build
        run: pnpm run build

  frontend-validate:
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: museum-frontend
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  web-validate:
    needs: should-run
    if: needs.should-run.outputs.run == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: museum-web
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: museum-web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

  ratchet-compare:
    needs: [backend-validate, frontend-validate, web-validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ratchet regression check
        run: |
          set -euo pipefail

          RATCHET_FILE=".claude/quality-ratchet.json"
          if [ ! -f "$RATCHET_FILE" ]; then
            echo "No ratchet baseline found — skipping"
            exit 0
          fi

          BASELINE_TESTS=$(jq -r '.testCount // 0' "$RATCHET_FILE")
          BASELINE_FE_TESTS=$(jq -r '.frontendTestCount // 0' "$RATCHET_FILE")
          BASELINE_WEB_TESTS=$(jq -r '.webTestCount // 0' "$RATCHET_FILE")
          BASELINE_TS_ERRORS=$(jq -r '.typecheckErrors // 0' "$RATCHET_FILE")
          BASELINE_AS_ANY=$(jq -r '.asAnyCount // 0' "$RATCHET_FILE")

          echo "=== Quality Ratchet Baseline ==="
          echo "Backend tests: $BASELINE_TESTS"
          echo "Frontend tests: $BASELINE_FE_TESTS"
          echo "Web tests: $BASELINE_WEB_TESTS"
          echo "Typecheck errors: $BASELINE_TS_ERRORS"
          echo "as any count: $BASELINE_AS_ANY"
          echo ""

          REGRESSION=false

          # Backend: typecheck errors must be 0
          if [ "$BASELINE_TS_ERRORS" -gt 0 ]; then
            echo "::warning::Ratchet baseline has $BASELINE_TS_ERRORS typecheck errors"
          fi

          # Backend: as any in tests must not exceed baseline
          CURRENT_AS_ANY=$( { grep -r "as any" museum-backend/tests/ --include="*.ts" 2>/dev/null || true; } | wc -l | tr -d ' ')
          if [ "$CURRENT_AS_ANY" -gt "$BASELINE_AS_ANY" ]; then
            echo "::error::RATCHET REGRESSION: as any count $CURRENT_AS_ANY > baseline $BASELINE_AS_ANY"
            REGRESSION=true
          else
            echo "as any count OK: $CURRENT_AS_ANY <= $BASELINE_AS_ANY"
          fi

          echo ""
          echo "=== Ratchet Summary ==="
          if $REGRESSION; then
            echo "::error::Quality ratchet regression detected — see above"
            exit 1
          else
            echo "All ratchet checks passed"
          fi
