name: artwork-image-liveness

# CONTENT-01/02/04 — verifies the daily-art catalog's hotlinked Wikimedia image
# URLs are still live (2xx). Wikimedia rotates thumbnail-width whitelists and
# renames/removes files, so these rot over time. Network-dependent — NOT on the
# main quality gate; runs weekly + on PRs that touch the catalog.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  pull_request:
    paths:
      - 'museum-backend/src/modules/daily-art/adapters/secondary/catalog/artworks.data.ts'
      - 'museum-backend/scripts/sentinels/artwork-image-liveness.mjs'
      - '.github/workflows/artwork-image-liveness.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  liveness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
      - name: Artwork image liveness (Wikimedia hotlinks)
        run: node museum-backend/scripts/sentinels/artwork-image-liveness.mjs
