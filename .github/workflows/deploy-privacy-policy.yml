name: deploy-privacy-policy

on:
  push:
    branches: ['main']
    paths:
      - 'docs/privacy-policy.html'
      - 'docs/maplibre/**'
      - '.github/workflows/deploy-privacy-policy.yml'

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}privacy-policy.html
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Prepare pages artifact
        run: |
          mkdir -p _site/maplibre
          cp docs/privacy-policy.html _site/privacy-policy.html
          cp docs/maplibre/cartodb-raster-style.json _site/maplibre/cartodb-raster-style.json

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5