name: deploy-privacy-policy

on:
  push:
    branches: ['main']
    paths:
      - 'docs/privacy-policy.html'
      - '.github/workflows/deploy-privacy-policy.yml'

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}privacy-policy.html
    steps:
      - uses: actions/checkout@v6

      - name: Prepare pages artifact
        run: |
          mkdir _site
          cp docs/privacy-policy.html _site/privacy-policy.html

      - uses: actions/upload-pages-artifact@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
