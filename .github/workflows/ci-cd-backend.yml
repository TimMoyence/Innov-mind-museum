name: backend

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'museum-backend/**'
      - '.github/workflows/ci-cd-backend.yml'
  push:
    branches: ['main', 'staging']
    paths:
      - 'museum-backend/**'
      - '.github/workflows/ci-cd-backend.yml'
  schedule:
    - cron: '17 3 * * *'

concurrency:
  group: ci-cd-backend-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── 1. Quality gate (always runs) ───────────────────────────────────
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: museum-backend
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: museum-backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=critical
        continue-on-error: true

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: OpenAPI Spec Validate
        run: pnpm run openapi:validate

      - name: OpenAPI Contract (spec-backed)
        run: pnpm run test:contract:openapi

      - name: Guard DB_SYNCHRONIZE
        run: |
          if grep -rq 'DB_SYNCHRONIZE=true' .env* 2>/dev/null; then
            echo "::error::DB_SYNCHRONIZE=true found in env files — forbidden in CI"
            exit 1
          fi

      - name: Unit/Integration Tests (non-E2E)
        run: pnpm test -- --watchman=false --runInBand --forceExit --coverage --testPathIgnorePatterns=tests/e2e

  # ─── 1b. Mutation testing (PR only, non-blocking) ────────────────────
  mutation:
    needs: quality
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    defaults:
      run:
        working-directory: museum-backend
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: museum-backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Stryker incremental report
        uses: actions/cache@v4
        with:
          path: museum-backend/reports/stryker-incremental.json
          key: stryker-incremental-${{ github.base_ref }}-${{ hashFiles('museum-backend/src/**/*.ts') }}
          restore-keys: |
            stryker-incremental-${{ github.base_ref }}-
            stryker-incremental-

      - name: Run Stryker (Phase 1 — critical files)
        run: |
          pnpm mutation:ci -- \
            --mutate \
            'src/modules/chat/application/art-topic-guardrail.ts' \
            --mutate \
            'src/modules/chat/application/guardrail-evaluation.service.ts' \
            --mutate \
            'src/shared/validation/input.ts' \
            --mutate \
            'src/shared/pagination/cursor-codec.ts' \
            --mutate \
            'src/modules/chat/application/llm-prompt-builder.ts' \
            --mutate \
            'src/modules/chat/application/history-window.ts' \
            --mutate \
            'src/modules/chat/application/llm-sections.ts'

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-mutation-report
          path: museum-backend/reports/mutation/
          retention-days: 14

      - name: Print mutation summary
        if: always()
        run: |
          if [ -f reports/mutation/mutation.json ]; then
            echo "## Stryker Mutation Report"
            node -e "
              const r = require('./reports/mutation/mutation.json');
              const files = r.files || {};
              let k=0, s=0, t=0;
              for (const [f, d] of Object.entries(files)) {
                const m = d.mutants || [];
                k += m.filter(x => x.status==='Killed'||x.status==='Timeout').length;
                s += m.filter(x => x.status==='Survived').length;
                t += m.length;
              }
              const score = t > 0 ? (k/t*100).toFixed(1) : 'N/A';
              console.log('Score: ' + score + '% (' + k + ' killed / ' + t + ' total, ' + s + ' survived)');
            "
          else
            echo "No mutation report found"
          fi

  # ─── 2. E2E tests (PR + nightly only) ────────────────────────────────
  e2e:
    needs: quality
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: museum-backend
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: museum-backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Docker availability
        run: docker version

      - name: E2E Postgres (Testcontainers)
        run: RUN_E2E=true pnpm test -- --watchman=false --runInBand --testPathPattern='tests/e2e/'

  # ─── 3. AI integration tests (manual only) ───────────────────────────
  ai-tests:
    needs: quality
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: museum-backend
    env:
      RUN_AI_TESTS: 'true'
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_MODEL: gpt-4o-mini
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: museum-backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: AI Integration Tests
        run: pnpm run test:ai

  # ─── 4. Deploy to production (push to main) ──────────────────────────
  deploy-prod:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_deploy-backend.yml
    with:
      environment: production
      image_prefix: museum-backend
      compose_service: backend
    secrets:
      GHCR_USER: ${{ secrets.GHCR_USER }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT_BACKEND: ${{ secrets.SENTRY_PROJECT_BACKEND }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_KEY: ${{ secrets.SERVER_KEY }}
      SMOKE_API_BASE_URL: ${{ secrets.PROD_SMOKE_API_BASE_URL }}
      SMOKE_TEST_EMAIL: ${{ secrets.PROD_SMOKE_TEST_EMAIL }}
      SMOKE_TEST_PASSWORD: ${{ secrets.PROD_SMOKE_TEST_PASSWORD }}

  # ─── 5. Deploy to staging (push to staging) ──────────────────────────
  deploy-staging:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    uses: ./.github/workflows/_deploy-backend.yml
    with:
      environment: staging
      image_prefix: museum-backend-staging
      compose_service: backend-staging
    secrets:
      GHCR_USER: ${{ secrets.GHCR_USER }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT_BACKEND: ${{ secrets.SENTRY_PROJECT_BACKEND }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_KEY: ${{ secrets.SERVER_KEY }}
      SMOKE_API_BASE_URL: ${{ secrets.STAGING_SMOKE_API_BASE_URL }}
      SMOKE_TEST_EMAIL: ${{ secrets.STAGING_SMOKE_TEST_EMAIL }}
      SMOKE_TEST_PASSWORD: ${{ secrets.STAGING_SMOKE_TEST_PASSWORD }}
