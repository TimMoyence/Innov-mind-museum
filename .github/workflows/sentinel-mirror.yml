name: sentinel-mirror

# =============================================================================
# Server-side mirror of the local pre-commit / pre-push sentinels.
# =============================================================================
# Purpose: catches any commit pushed with `--no-verify` (forbidden by team
# policy). The hooks under .husky/{pre-commit,pre-push} run the same gates
# locally; this workflow re-runs them on every push so a bypass attempt is
# surfaced at PR review time.
#
# A failure here MUST block PR merge — add this workflow's job names to the
# required status checks under branch protection. See docs/CONTRIBUTING.md.
# =============================================================================

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sentinel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mirror:
    name: sentinel-mirror
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # `setup-node` reads `cache: pnpm` and shells out to `pnpm` — so pnpm
      # MUST be on PATH before `setup-node` runs. Order matters here.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      # Monorepo — pnpm-lock.yaml lives in each app dir, not at the repo
      # root. List every lockfile so the cache key covers them all.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            museum-backend/pnpm-lock.yaml
            museum-web/pnpm-lock.yaml
            design-system/pnpm-lock.yaml

      - name: Install backend deps
        working-directory: museum-backend
        run: pnpm install --frozen-lockfile

      - name: Install web deps
        working-directory: museum-web
        run: pnpm install --frozen-lockfile

      - name: Install frontend deps
        working-directory: museum-frontend
        run: npm ci --legacy-peer-deps

      - name: Install gitleaks
        run: |
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      # ────────────────────────────────────────────────────────────────────
      # Pre-commit gate mirror
      # ────────────────────────────────────────────────────────────────────
      - name: 'Mirror Gate 1 — gitleaks (full repo)'
        run: gitleaks detect --redact --no-banner --config .gitleaks.toml

      - name: 'Mirror Gate 2 — env-policy sentinel'
        run: node scripts/sentinels/env-policy.mjs

      - name: 'Mirror Gate 4 — as-any ratchet'
        run: node scripts/sentinels/as-any-ratchet.mjs

      # ────────────────────────────────────────────────────────────────────
      # Pre-push gate mirror
      # ────────────────────────────────────────────────────────────────────
      - name: 'Mirror Gate P1 — backend tsc'
        working-directory: museum-backend
        run: pnpm lint

      - name: 'Mirror Gate P2 — frontend tsc'
        working-directory: museum-frontend
        run: npm run lint

      - name: 'Mirror Gate P3 — web tsc'
        working-directory: museum-web
        run: pnpm lint

      - name: 'Mirror Gate P4 — OpenAPI sync'
        run: node scripts/sentinels/openapi-sync.mjs

      - name: 'Mirror Gate P5 — migration revertibility'
        run: node scripts/sentinels/migration-revertibility.mjs

      - name: 'Mirror Gate P6 — cache-key parity'
        run: node scripts/sentinels/cache-key-parity.mjs

      - name: 'Mirror Gate P7 — IDOR matrix smoke'
        run: node scripts/sentinels/idor-smoke.mjs

      - name: 'Mirror Gate P8 — guardrails ratchet'
        run: node scripts/sentinels/guardrails-ratchet.mjs

      - name: 'Mirror Gate P9 — sentry-scrubber parity (PII redaction)'
        run: node scripts/sentinels/sentry-scrubber-parity.mjs

      - name: 'Mirror — net-profiles parity (FE↔BE network profile registry, W1-REG)'
        run: node scripts/sentinels/net-profiles-parity.mjs

      - name: 'Mirror Gate P21 — fe-version-sync (museum-frontend package.json ↔ app.config.ts)'
        run: node scripts/sentinels/fe-version-sync.mjs

      - name: 'Mirror Gate P19 — Prometheus metric-naming ratchet (BE)'
        working-directory: museum-backend
        run: node scripts/sentinels/metric-naming.mjs

      - name: 'Mirror Gate P15 — compose-parity (dev vs prod docker-compose)'
        run: node scripts/sentinels/compose-parity.mjs

      - name: 'Mirror Gate P23 — husky × git-lfs hook integrity (UFR-020)'
        run: node scripts/sentinels/husky-lfs-integrity.mjs

      - name: 'Mirror Gate P20 — roadmap claim resolves (UFR-024)'
        run: node scripts/sentinels/roadmap-claim-resolves.mjs

      - name: 'Mirror Gate P23 — subprocessor ledger completeness (GDPR Art 28, COMP-03/08)'
        run: node scripts/sentinels/subprocessor-ledger-completeness.mjs

      - name: 'Mirror Gate P24 — canonical domain (no musaium.app, repo-wide, A11Y-02/C11)'
        run: node museum-backend/scripts/sentinels/web-domain-canonical.mjs

      - name: 'Mirror Gate P25 — doc last-verified freshness (sidecar manifest, ≤ 90d, HON-08)'
        run: node scripts/sentinels/doc-last-verified.mjs

      - name: 'Mirror Gate P22 — ai-tests count ratchet (BE)'
        working-directory: museum-backend
        run: node scripts/sentinels/ai-tests-count.mjs

      - name: 'Mirror — screen-test-coverage (UFR-021, mobile)'
        run: node scripts/sentinels/screen-test-coverage.mjs

      - name: 'Mirror — factory-coverage ratchet (BE DRY-factories, was orphan)'
        run: node scripts/sentinels/audit-factory-coverage.mjs

      - name: 'Mirror — SBOM attestation contract (3 deploy workflows, was orphan)'
        run: node scripts/sentinels/sbom-attest-check.mjs

      - name: 'Mirror — a11y floor ratchet (EN 301 549 / RGAA, mobile)'
        run: node scripts/sentinels/a11y-ratchet.mjs

      - name: 'Mirror — quota/validator ordering (BE, ultrareview F1)'
        run: node museum-backend/scripts/sentinels/quota-ordering.mjs

      - name: 'Mirror — prod security-header invariants (BE helmet/CSP/CORS)'
        run: node museum-backend/scripts/sentinels/security-headers-invariants.mjs

      - name: 'Mirror — request-decompression invariants (BE gzip, W1-GZIP)'
        run: node museum-backend/scripts/sentinels/request-decompression-invariants.mjs

      - name: 'Mirror — net-fault prod-guard (BE, D3 OFF-in-prod, W2-10)'
        run: node museum-backend/scripts/sentinels/net-fault-prod-guard.mjs

      - name: 'Mirror — toxiproxy-no-prod (L3 shaper never in prod compose/EAS, W3-04)'
        run: node scripts/sentinels/toxiproxy-no-prod.mjs

      - name: 'Mirror — secret/cert rotation runbook freshness (≤120d)'
        run: node scripts/sentinels/secret-rotation-freshness.mjs

      - name: 'Mirror — hexagonal domain-purity (BE, ESLint-independent backstop)'
        run: node museum-backend/scripts/sentinels/hexagonal-domain-purity.mjs

      - name: 'Mirror — api-url production-safety (mobile, build-time localhost guard)'
        run: node museum-frontend/scripts/sentinels/api-url-production-safety.mjs

      # Install ast-grep for Gate P14 — Cargo+brew are slower than npm install in CI.
      - name: 'Install ast-grep CLI (for Gate P14)'
        run: npm install -g @ast-grep/cli

      - name: 'Mirror Gate P14 — ast-grep rules (tools/ast-grep-rules/)'
        run: |
          ast-grep scan --config sgconfig.yml --error 2>&1 | tee /tmp/ast-grep-output.txt
          if grep -qE '^(error|warning)' /tmp/ast-grep-output.txt; then
            echo "::error::ast-grep rule violation — see output above"
            exit 1
          fi

      # ────────────────────────────────────────────────────────────────────
      # Pre-push gates already covered by other workflows — not duplicated here
      # to keep sentinel-mirror runtime short. Listed for traceability :
      # ────────────────────────────────────────────────────────────────────
      # - Gate P10 (cache-key parity)         → covered above as "Mirror Gate P6"
      # - Gate P11 (gitleaks push range)      → superset = "Mirror Gate 1" (full repo)
      # - Gate P12 (contract OpenAPI test)    → ci-cd-backend.yml quality job
      # - Gate P13 (migration down() body)    → ci-cd-backend.yml quality job
      #                                         (`check-migration-down.cjs`)
      # - Gate P15 (oasdiff breaking)         → ci-cd-openapi-diff.yml
      # - Gate P16 (affected unit tests BE)   → subset of test:coverage in
      #                                         ci-cd-backend.yml quality
      # - Gate P17 (affected tests FE)        → ci-cd-mobile.yml quality test step
      # - Gate P18 (affected tests Web)       → ci-cd-web.yml quality test step

      - name: 'Mirror summary'
        if: success()
        run: echo "✅ All sentinels mirrored successfully — no local-bypass detected."

      - name: 'Mirror failed — bypass attempt or genuine regression'
        if: failure()
        run: |
          echo "::error::A sentinel that local hooks cover has failed in CI."
          echo "::error::Either local hooks were bypassed (UFR-020 forbids --no-verify) or a regression slipped in."
          echo "::error::Reproduce locally: re-run the failing gate from the step name above."
          exit 1
