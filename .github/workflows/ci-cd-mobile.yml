name: mobile

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile to run
        required: true
        default: internal
        type: choice
        options:
          - preview
          - internal
          - production
      platform:
        description: Platform target
        required: true
        default: android
        type: choice
        options:
          - ios
          - android
          - all
      submit:
        description: Submit to stores (production only)
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'
  pull_request:
    paths:
      - 'museum-frontend/**'
      - 'museum-backend/openapi/**'
      - '.github/workflows/ci-cd-mobile.yml'
  push:
    branches: ['main']
    tags: ['v*']
    paths:
      - 'museum-frontend/**'
      - 'museum-backend/openapi/**'
      - '.github/workflows/ci-cd-mobile.yml'
  schedule:
    # Nightly slot at 03:17 UTC. Since E41 (ubuntu-latest + KVM) the Android
    # Maestro matrix runs PER-PR, so this cron is mainly the iOS nightly suite
    # (maestro-ios-nightly, macos-latest) plus a full-matrix Android re-run as a
    # backstop against per-PR flakiness.
    - cron: '17 3 * * *'

concurrency:
  group: ci-cd-mobile-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Top-level least-privilege default. EAS build/submit jobs do not need write
# scopes (they delegate to Expo) so contents:read is sufficient for all jobs.
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: museum-frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate offline map style JSON (TD-3 drift guard)
        working-directory: ${{ github.workspace }}
        run: node -e "JSON.parse(require('fs').readFileSync('docs/maplibre/cartodb-raster-style.json','utf8'))"

      - name: Expo Doctor
        # I-OPS8 (R10): was `continue-on-error: true` (gate theatre — a failing
        # expo-doctor was ignored). Now a REAL blocking gate: it fails on any failed
        # check EXCEPT the one irreducible, intentional failure — the Metro config
        # check flags `resolver.unstable_enableSymlinks: true`, which is REQUIRED to
        # resolve the `@musaium/shared` file: dependency (see metro.config.js +
        # CLAUDE.md) and has NO expo-doctor disable toggle. App-config-sync (Prebuild,
        # committed native folders) + SDK version drift are silenced via
        # expo.doctor / expo.install in package.json, so any NEW failure surfaces.
        run: |
          set +e
          OUTPUT=$(npx expo-doctor 2>&1)
          STATUS=$?
          set -e
          printf '%s\n' "$OUTPUT"
          if [ "$STATUS" -eq 0 ]; then
            exit 0
          fi
          NON_METRO=$(printf '%s\n' "$OUTPUT" | grep '✖' | grep -v 'Check for issues with Metro config' || true)
          if [ -n "$NON_METRO" ]; then
            echo "::error::expo-doctor reported a failed check other than the tolerated Metro-symlinks one:"
            printf '%s\n' "$NON_METRO"
            exit 1
          fi
          echo "expo-doctor: only the known intentional Metro-symlinks check failed — tolerated."

      - name: Check OpenAPI Typegen Sync
        run: npm run check:openapi-types

      - name: Validate Backend OpenAPI Spec
        working-directory: museum-backend
        run: |
          corepack enable && pnpm install --frozen-lockfile
          pnpm run openapi:validate

      - name: Audit dependencies
        run: npm audit --audit-level=high

      # ── I-CMP6 / R11 (decision Q3 "Tout faire", design §D7) — CycloneDX SBOM
      # of the JS bundle dependency graph, uploaded as a CI artifact. There is
      # deliberately NO sigstore image attestation here: EAS `eas build
      # --no-wait` produces no local OCI image digest reachable from CI, so
      # there is nothing to bind a signed predicate to. The residual gap
      # (store-binary lacks a signed SBOM attestation) is tracked in
      # docs/TECH_DEBT.md against EU CRA Art.13/2027.
      # continue-on-error: the SBOM artifact must never block the quality gate.
      - name: Generate mobile SBOM (CycloneDX)
        continue-on-error: true
        run: npx @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-file sbom-mobile.json --spec-version 1.5 --output-reproducible

      - name: Upload mobile SBOM artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom-mobile
          path: museum-frontend/sbom-mobile.json
          retention-days: 90

      - name: Check i18n completeness
        run: npm run check:i18n

      - name: Check no unicode emoji in screens/copy (P4 emoji guard)
        # UX policy: mobile uses PNG (require) + Ionicons only. Per-line
        # allowlist at museum-frontend/shared/i18n/copy-emoji-allowlist.json
        # for legitimate symbols (©, OSM attribution).
        run: node ../scripts/check-no-unicode-emoji.cjs

      - name: Screen test-coverage sentinel (UFR-021)
        # Every new/changed user-facing screen MUST ship a Maestro flow (or an
        # explicit `// e2e-skip`). Mirrors pre-push Gate 22; `../` because the
        # quality job's default working-directory is museum-frontend.
        run: node ../scripts/sentinels/screen-test-coverage.mjs

      - name: Maestro shard-manifest sentinel
        run: node ../scripts/sentinels/maestro-shard-manifest.mjs

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage gate
        # Phase 8: dedicated `test:coverage` script invokes Jest with --coverage,
        # so the global coverage threshold in jest.config.js hard-fails the PR
        # if FE drops below the Phase 8 floor (Phase 9 will lift toward 85/70/74/85).
        run: npm run test:coverage

  # ─── 2. Maestro APK prebuild (cached on mobile-source content hash) ──────
  prebuild:
    needs: quality
    # Android builds need no macOS — moved off macos-latest (10× minute cost)
    # to ubuntu-latest. The Maestro emulator job is now also Linux (KVM), so the
    # whole Android e2e path is x86_64 + hardware-accelerated.
    runs-on: ubuntu-latest
    # E17: gradle/actions/setup-gradle caches ~/.gradle/caches + wrapper across
    # runs, so cold first run still ~30 min, warm runs ~3-5 min.
    # E34: bumped 25 → 35 after run 25508936326 hit the 25min cap on the cold
    # path with the new 6GB heap (heap fixed OOM but D8 :app:mergeExtDexRelease
    # still wants ~18-22 min wall on cold cache). Warm cache stays well under
    # 5 min, so this only widens the cold-path budget.
    timeout-minutes: 35
    defaults:
      run:
        working-directory: museum-frontend
    # E40 — Build a RELEASE APK of the `development` variant, NOT assembleDebug.
    #   * A Debug APK expects a Metro dev server on :8081 (it never embeds the JS
    #     bundle) → on a CI emulator with no Metro it shows the RN red error
    #     screen — the Android equivalent of the iOS expo-dev-client launcher
    #     that made the local e2e suite 0/43 false-green. assembleRelease runs
    #     `bundleReleaseJsAndAssets` → JS is embedded → standalone, no launcher.
    #   * APP_VARIANT=development keeps Android cleartext HTTP allowed
    #     (app.config.ts `usesCleartextTraffic: variant === 'development'` +
    #     plugins/withNetworkSecurity DEV_XML whitelists 10.0.2.2 / localhost),
    #     which a Release of preview/production would block.
    #   * On the Android emulator, the host runner is reachable at 10.0.2.2, NOT
    #     localhost (that is the emulator's own loopback). EXPO_PUBLIC_* vars are
    #     inlined into the JS bundle at assembleRelease time, so they MUST be set
    #     on this job (apiConfig.ts reads process.env.EXPO_PUBLIC_API_BASE_URL
    #     then Constants.expoConfig.extra.API_BASE_URL — both baked here).
    env:
      APP_VARIANT: development
      EXPO_PUBLIC_API_ENVIRONMENT: staging
      EXPO_PUBLIC_API_BASE_URL: http://10.0.2.2:3000
      # Test-only audio-fixture injection seam (useAudioRecorder.ts): bakes the
      # bundled "Who painted the Mona Lisa" clip into the recorder so the
      # audio-recording-flow STT→LLM→TTS round-trip is deterministic (Maestro
      # cannot drive a real microphone). EXPO_PUBLIC_* vars are inlined into the
      # JS bundle at assembleRelease, so it MUST be set on this build job. This
      # APK only runs on the CI emulator and is never shipped, so the seam never
      # reaches production. See .maestro/fixtures/audio.md.
      EXPO_PUBLIC_MAESTRO_AUDIO_FIXTURE: 'true'
      # @sentry/react-native's gradle integration auto-uploads JS sourcemaps on
      # RELEASE builds and needs SENTRY_AUTH_TOKEN (absent here). Disable it: the
      # Maestro APK only runs on the CI emulator and is never shipped.
      SENTRY_DISABLE_AUTO_UPLOAD: 'true'
    outputs:
      cache-hit: ${{ steps.cache-apk.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Restore APK cache
        id: cache-apk
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: museum-frontend/android/app/build/outputs/apk/release/app-release.apk
          # `release-v2` namespace so any stale Debug APK cached under the old
          # `maestro-apk-<os>-` key (different content) can never be restored.
          # The 10.0.2.2 base URL is baked into the bundle, so it is part of the
          # cache identity via app.config.ts in the hash set.
          key: maestro-apk-release-v2-${{ runner.os }}-${{ hashFiles('museum-frontend/src/**', 'museum-frontend/features/**', 'museum-frontend/shared/**', 'museum-frontend/app/**', 'museum-frontend/assets/**', 'museum-frontend/app.config.ts', 'museum-frontend/plugins/**', 'museum-frontend/package.json', 'museum-frontend/package-lock.json') }}
          restore-keys: |
            maestro-apk-release-v2-${{ runner.os }}-

      - name: Setup Java (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm deps (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: npm install --no-audit --no-fund

      - name: Expo prebuild Android (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --clean

      - name: Setup Gradle (cache deps, cache miss only)
        # E17: caches ~/.gradle/caches/modules-2 (~1-2 GB) + ~/.gradle/wrapper
        # (~150 MB) keyed on **/*.gradle*, **/gradle-wrapper.properties.
        # First run still cold (writes cache); subsequent cold-source runs warm-
        # restore in ~30s, cutting Gradle assembleRelease from ~35min → ~5min.
        # GRADLE_ENCRYPTION_KEY secret would encrypt the cache; left out for
        # now (works unencrypted) — future hardening when secret is provisioned.
        if: steps.cache-apk.outputs.cache-hit != 'true'
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4.4.3
        with:
          cache-read-only: false
          # NOTE: `build-root-directory` is NOT a valid input for
          # gradle/actions/setup-gradle@v4 (it warned + was ignored). The action
          # caches ~/.gradle regardless of the project root, and the build runs
          # from museum-frontend/android via `cd android` below.

      - name: Gradle assembleRelease (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        # Expo's generated android/app/build.gradle signs the `release` buildType
        # with the debug keystore when no upload keystore is configured, so this
        # produces a self-signed but installable APK — sufficient for `adb
        # install` on the CI emulator (no Play upload).
        #
        # E41 — `-PreactNativeArchitectures=x86_64`: the CI emulator is x86_64,
        # so build ONLY that ABI instead of the default 4 (armeabi-v7a, arm64-v8a,
        # x86, x86_64). Quarters the native build's time/disk/RAM and removes the
        # most likely cause of the silent process kill on the first run (the
        # 4-ABI cold build at 25% config exhausted runner resources with no
        # graceful Gradle error). `--info` dropped — it produced 23k lines that
        # buried the real failure; `--stacktrace` alone surfaces a clean error.
        run: cd android && ./gradlew assembleRelease --no-daemon --stacktrace -PreactNativeArchitectures=x86_64

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: maestro-apk
          path: museum-frontend/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 1

  # ─── 3a. Maestro matrix selector ─────────────────────────────────────────
  # Per-PR runs only the fast `smoke` subset (~12min, one emulator boot); the
  # full per-shard suite runs nightly (cron) + on manual dispatch. Emulator e2e
  # is ~45min/shard, so running all four shards on every PR (~50-65min) is too
  # heavy — smoke gives a fast pre-merge guard rail on the critical happy paths
  # while nightly keeps full coverage.
  maestro-matrix:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      shards: ${{ steps.set.outputs.shards }}
    steps:
      - id: set
        env:
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            echo 'shards=["smoke"]' >> "$GITHUB_OUTPUT"
          else
            echo 'shards=["auth","chat","museum","settings"]' >> "$GITHUB_OUTPUT"
          fi

  # ─── 3b. Maestro shard matrix (Android, ubuntu-latest + KVM emulator) ─────
  # E41 — migrated off macos-latest. GitHub's hosted ubuntu-latest runners
  # expose /dev/kvm (nested hardware virtualization), so an x86_64 AVD runs
  # HW-accelerated and boots in ~60-90s instead of timing out at 600s under
  # macos-latest's software-only arm64 path (HVF unavailable on hosted Macs).
  # This unlocks per-PR Maestro (smoke subset), turning the local-green Maestro
  # suite into a permanent CI guard rail (UFR-021) and closing the CNIL age-15
  # e2e blocker. iOS Maestro stays nightly — HVF on iOS needs a Mac runner.
  maestro-shard:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs: [prebuild, maestro-matrix]
    runs-on: ubuntu-latest
    # 70min cap: a nightly full shard (~45min, 18 flows × ~2.5min) plus a
    # boot-flake retry (attempt 1 timeout + attempt 2 full) must fit. The per-PR
    # smoke shard finishes in ~12-25min and never approaches this cap.
    timeout-minutes: 70
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.maestro-matrix.outputs.shards) }}
    defaults:
      run:
        working-directory: museum-frontend
    env:
      MAESTRO_VERSION: '2.5.1'
    # GHA service containers (mirror ci-cd-backend.yml + the docker-compose.dev
    # contract). pgvector/pgvector:pg16 because migration AddArtworkEmbeddings
    # runs `CREATE EXTENSION vector` (halfvec) — plain postgres:16 aborts the
    # migration and the backend never boots. redis:7-alpine because `pnpm dev`
    # eagerly boots BullMQ → without Redis, /api/health times out and every
    # shard dies at setup (the real reason the old macos native-PG path was
    # false-green: it had no Redis). No requirepass here (the host `pnpm dev`
    # connects password-less), matching ci-cd-backend.yml's redis service.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: museum_dev
          POSTGRES_PASSWORD: museum_dev_password
          POSTGRES_DB: museum_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U museum_dev -d museum_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json
      # No `pnpm/action-setup` here: the backend boot script
      # (maestro-runner-setup.sh) runs `corepack enable`, which resolves pnpm
      # per-package from each package.json's `packageManager` field (the repo
      # SSOT — museum-backend = pnpm@10.8.0) — the canonical way the backend is
      # launched, and it sidesteps the action's "multiple versions" error.
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Download APK artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: maestro-apk
          path: museum-frontend/android/app/build/outputs/apk/release/

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Verify Maestro version
        run: maestro --version

      - name: Boot backend (PG/Redis services + migrations + API + e2e seed)
        working-directory: museum-frontend
        env:
          # Host `pnpm dev` talks to the GHA service containers on localhost.
          SKIP_DOCKER_COMPOSE: '1'
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: museum_dev
          DB_PASSWORD: museum_dev_password
          PGDATABASE: museum_dev
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
          # Keep the host backend lightweight so it doesn't contend with the
          # software-GPU emulator boot for CPU on the 4-core runner (the BullMQ
          # extraction worker + its redis polling churn was a plausible cause of
          # intermittent emulator boot timeouts). The e2e flows never exercise
          # knowledge-extraction. (CLAUDE.md Stryker gotcha — same flags.)
          EXTRACTION_WORKER_ENABLED: 'false'
          # Real LLM for the chat shard flows (guardrail/off-topic/multiturn).
          # Same secret ci-cd-backend.yml + promptfoo use. The auth/museum/
          # settings shards never hit the LLM, so spend stays near zero there.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Provision the SigLIP encoder model + one public-domain artwork
          # embedding ONLY on the `chat` shard (the only shard that runs
          # chat-compare.yaml — shards.json). maestro-runner-setup.sh gates the
          # ~354MB model pull + catalog:ingest on this flag so the per-PR `smoke`
          # subset (which excludes chat-compare) stays lightweight. Without it the
          # nightly chat-compare carousel renders header-only and its strengthened
          # per-card assert fails RED — by design.
          CHAT_COMPARE_PROVISION: ${{ matrix.shard == 'chat' && '1' || '' }}
          # Seed the dedicated quota-exhausted paywall account ONLY on the
          # `museum` shard (the only shard that runs modal-paywall-quota-upsell.yaml).
          SEED_PAYWALL_ACCOUNT: ${{ matrix.shard == 'museum' && '1' || '' }}
        run: |
          ./scripts/maestro-runner-setup.sh
          # Seed the two FIXED Maestro login accounts (direct DB insert, bypasses
          # the HTTP register breach-check):
          #   1. e2e-test-login@test.musaium.dev / TestPassword123! — quick-login.yaml
          #   2. apple.test@apple.com / Apple1234! — auth-login-happy, auth-account-delete,
          #      cert-pinning-smoke (the Apple-review fixed account).
          cd ../museum-backend
          E2E_SEED_ALLOW=1 DB_HOST=localhost DB_PORT=5432 DB_USER=museum_dev \
            DB_PASSWORD=museum_dev_password PGDATABASE=museum_dev \
            pnpm seed:e2e-maestro-account
          E2E_SEED_ALLOW=1 DB_HOST=localhost DB_PORT=5432 DB_USER=museum_dev \
            DB_PASSWORD=museum_dev_password PGDATABASE=museum_dev \
            E2E_LOGIN_EMAIL=apple.test@apple.com E2E_LOGIN_PASSWORD='Apple1234!' \
            pnpm seed:e2e-maestro-account
          # 3. e2e-paywall@test.musaium.dev / TestPassword123! — DEDICATED account
          #    for modal-paywall-quota-upsell.yaml with its free-tier monthly
          #    session quota PRE-EXHAUSTED (E2E_EXHAUST_QUOTA=1), so the flow's
          #    first `POST /api/sessions` returns 402 → the QuotaUpsellModal opens
          #    via the REAL axios-402 interceptor (no dev-route deeplink). Separate
          #    email so the other museum-shard flows that create real sessions are
          #    not 402'd. Only seeded on the `museum` shard (where the flow runs).
          if [ "${SEED_PAYWALL_ACCOUNT:-}" = "1" ]; then
            E2E_SEED_ALLOW=1 E2E_EXHAUST_QUOTA=1 DB_HOST=localhost DB_PORT=5432 DB_USER=museum_dev \
              DB_PASSWORD=museum_dev_password PGDATABASE=museum_dev \
              E2E_LOGIN_EMAIL=e2e-paywall@test.musaium.dev E2E_LOGIN_PASSWORD='TestPassword123!' \
              pnpm seed:e2e-maestro-account
          fi

      - name: Enable KVM (hardware-accelerated emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # E41 — emulator-boot retry. The AVD boot is intermittently flaky on hosted
      # runners ("Timeout waiting for emulator to boot"): the IDENTICAL config
      # booted in 49s on some runs and timed out on others (pure runner-side
      # flake, not config). A single retry takes the per-run flake probability
      # from ~p to ~p². Attempt 1 is `continue-on-error`; attempt 2 only runs if
      # attempt 1 failed, and IT decides the job outcome. The in-emulator work is
      # a single committed script (maestro-emulator-script.sh) so the action runs
      # it as ONE line — normal shell state persists, and the two attempts share
      # one definition. Per-flow retries live inside maestro-run-shard.sh; this
      # outer retry exists for the boot itself.
      - name: Run Maestro shard on Android emulator (attempt 1)
        id: maestro_attempt1
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@1dcd0090116d15e7c562f8db72807de5e036a4ed  # v2
        env:
          MATRIX_SHARD: ${{ matrix.shard }}
        with:
          api-level: 33
          # ubuntu-latest is x86_64 + KVM → x86_64 system image runs natively
          # accelerated. The prebuild APK is x86_64-only, matching this emulator.
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-boot-timeout: 300
          ram-size: 4096M
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash museum-frontend/scripts/maestro-emulator-script.sh "$MATRIX_SHARD"

      - name: Run Maestro shard on Android emulator (attempt 2, retry on attempt-1 failure)
        if: steps.maestro_attempt1.outcome == 'failure'
        uses: reactivecircus/android-emulator-runner@1dcd0090116d15e7c562f8db72807de5e036a4ed  # v2
        env:
          MATRIX_SHARD: ${{ matrix.shard }}
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: true
          emulator-boot-timeout: 300
          ram-size: 4096M
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash museum-frontend/scripts/maestro-emulator-script.sh "$MATRIX_SHARD"

      - name: Upload shard logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: maestro-shard-${{ matrix.shard }}-logs
          path: museum-frontend/.maestro/logs/
          retention-days: 7

      # Diagnostics for failing flows: the backend log carries the exact HTTP
      # response of each register/login attempt (201 vs 409/422/500), and
      # Maestro's debug dir (~/.maestro/tests/<ts>/) carries the view hierarchy
      # + screenshot of the screen the app was actually on when an assertion
      # failed. Collected into one dir so a single artifact has both.
      - name: Collect failure diagnostics (backend log + Maestro hierarchy)
        if: always()
        run: |
          mkdir -p /tmp/diag
          cp /tmp/backend.log /tmp/diag/backend.log 2>/dev/null || true
          cp -r "$HOME/.maestro/tests" /tmp/diag/maestro-tests 2>/dev/null || true
      - name: Upload failure diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: maestro-shard-${{ matrix.shard }}-diag
          path: /tmp/diag/
          retention-days: 7

  # ─── 4. Aggregate shard results into a PR comment ─────────────────────────
  maestro-summary:
    # E41 — runs whenever the shard matrix runs: per-PR (the new guard rail),
    # nightly cron, and manual dispatch. `always()` so a failed shard still
    # gets summarized + turns this aggregator red (anti-false-green).
    if: ${{ always() && (github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
    needs: maestro-shard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: shard-logs
      - name: Summarize shard logs + fail on any FAIL
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const root = 'shard-logs';
            const shards = fs.existsSync(root) ? fs.readdirSync(root) : [];
            const lines = ['## Maestro shard results', ''];
            let totalFails = 0;
            for (const shard of shards) {
              const dir = path.join(root, shard);
              const logs = fs.readdirSync(dir).filter(f => f.endsWith('.log'));
              const fails = logs.filter(f => fs.readFileSync(path.join(dir, f), 'utf-8').includes('FAIL'));
              totalFails += fails.length;
              lines.push(`- **${shard}**: ${logs.length - fails.length}/${logs.length} flows passed${fails.length ? ` — failed: ${fails.map(f => f.replace('.log','')).join(', ')}` : ''}`);
            }
            const body = lines.join('\n');
            core.summary.addRaw(body).write();
            // Post a PR comment only when this run is attached to a PR (cron/dispatch have none).
            const { owner, repo } = context.repo;
            const issueNumber = context.payload.pull_request?.number;
            if (issueNumber) {
              await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body });
            }
            // Anti-false-green (audit 360 dim.2): a flow that logged FAIL must turn
            // this job red, even on cron/dispatch where there is no PR to comment on.
            if (totalFails > 0) {
              core.setFailed(`${totalFails} Maestro flow(s) failed across ${shards.length} shard(s) — see logs.`);
            }

      # Belt-and-suspenders: the matrix `needs` result is `success` only when ALL
      # shards exited 0. If a shard errored before writing parseable logs (emulator
      # boot crash, backend boot failure) the log-scan above can miss it — this gate
      # still turns the summary red. `skipped` (upstream prebuild/quality failed) is
      # also NOT a passed e2e, so anything other than `success` fails here.
      - name: Fail if any shard did not succeed
        if: ${{ needs.maestro-shard.result != 'success' }}
        run: |
          echo "::error::Maestro e2e did not pass (maestro-shard result: ${{ needs.maestro-shard.result }}). A green maestro-summary now REQUIRES every shard to succeed."
          exit 1

  # ─── 4b. Nightly / push-main alert — make a red FULL run impossible to miss ─
  # A scheduled (or push-to-main) full Maestro run executes unattended; a silent
  # red is a dead gate. On failure this opens (or re-pings) a tracking issue via
  # the native GITHUB_TOKEN — the repo owner gets a GitHub notification and the
  # issue stays visible in the Issues tab until fixed. On a green full run it
  # auto-closes the issue. No external secret/webhook needed.
  maestro-full-alert:
    if: ${{ always() && (github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
    needs: [maestro-shard, maestro-summary]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open/close the full-Maestro tracking issue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const failed = ${{ needs.maestro-shard.result != 'success' || needs.maestro-summary.result != 'success' }};
            const { owner, repo } = context.repo;
            const label = 'nightly-maestro-alert';
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const trigger = context.eventName === 'schedule' ? 'nightly' : 'push to main';
            const existing = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: label });
            if (failed) {
              const body = `The full Maestro suite failed on a **${trigger}** run.\n\nRun: ${runUrl}\n\nThis issue auto-closes when the next full Maestro run is green.`;
              if (existing.data.length > 0) {
                await github.rest.issues.createComment({ owner, repo, issue_number: existing.data[0].number, body: `Still failing (${trigger}) — ${runUrl}` });
              } else {
                try { await github.rest.issues.getLabel({ owner, repo, name: label }); }
                catch { await github.rest.issues.createLabel({ owner, repo, name: label, color: 'b60205', description: 'Auto-filed when a full Maestro run fails' }); }
                await github.rest.issues.create({ owner, repo, title: `🌙 Full Maestro failing (${trigger})`, body, labels: [label] });
              }
            } else {
              for (const issue of existing.data) {
                await github.rest.issues.createComment({ owner, repo, issue_number: issue.number, body: `✅ Full Maestro green again — ${runUrl}. Closing.` });
                await github.rest.issues.update({ owner, repo, issue_number: issue.number, state: 'closed' });
              }
            }

  # ─── 4b. Weak-net APK prebuild (baked at the Toxiproxy shaped listener) ───
  # The default `prebuild` APK bakes EXPO_PUBLIC_API_BASE_URL=http://10.0.2.2:3000,
  # i.e. it talks to the UNSHAPED host backend directly. If the netshape job reused
  # that APK, the device would never traverse Toxiproxy (:3100) and the "weak-net"
  # run would be a silent no-op (false-green): the toxics seeded on :3100 shape a
  # link nobody uses. This dedicated APK bakes the base URL at the Toxiproxy SHAPED
  # listener (http://10.0.2.2:3100), so every request the device makes goes
  # 10.0.2.2:3100 → toxiproxy → host.docker.internal:3000 and is genuinely shaped.
  # Its own cache namespace (`maestro-apk-netshape-v1-*`) keeps it distinct from the
  # unshaped :3000 APK so the two can never be cross-restored (the base URL is baked
  # into the JS bundle, so it is part of the cache identity).
  prebuild-netshape:
    needs: quality
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: museum-frontend
    env:
      APP_VARIANT: development
      EXPO_PUBLIC_API_ENVIRONMENT: staging
      # Baked at the Toxiproxy SHAPED listener (NOT the unshaped :3000 backend) so
      # the device→proxy link is genuinely shaped. This is the load-bearing
      # difference from the `prebuild` job and the fix for the false-green netshape
      # run: the emulator reaches 10.0.2.2:3100 (Toxiproxy) → host backend :3000.
      EXPO_PUBLIC_API_BASE_URL: http://10.0.2.2:3100
      SENTRY_DISABLE_AUTO_UPLOAD: 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Restore weak-net APK cache
        id: cache-apk
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: museum-frontend/android/app/build/outputs/apk/release/app-release.apk
          # `netshape-v1` namespace: a SEPARATE cache from the :3000 APK so the two
          # (different baked base URL → different bundle content) never cross-restore.
          key: maestro-apk-netshape-v1-${{ runner.os }}-${{ hashFiles('museum-frontend/src/**', 'museum-frontend/features/**', 'museum-frontend/shared/**', 'museum-frontend/app/**', 'museum-frontend/assets/**', 'museum-frontend/app.config.ts', 'museum-frontend/plugins/**', 'museum-frontend/package.json', 'museum-frontend/package-lock.json') }}
          restore-keys: |
            maestro-apk-netshape-v1-${{ runner.os }}-

      - name: Setup Java (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm deps (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: npm install --no-audit --no-fund

      - name: Expo prebuild Android (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --clean

      - name: Setup Gradle (cache deps, cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4.4.3
        with:
          cache-read-only: false

      - name: Gradle assembleRelease (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: cd android && ./gradlew assembleRelease --no-daemon --stacktrace -PreactNativeArchitectures=x86_64

      - name: Upload weak-net APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: maestro-apk-netshape
          path: museum-frontend/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 1

  # ─── 4c. Weak-net (Toxiproxy) Maestro selector ───────────────────────────
  # W3 device track (Layer 3). The full `netshape` shard runs on the nightly cron
  # + manual dispatch; on a PR it runs only the 2-flow `netshapeSmoke` subset and
  # ONLY when the chat / connectivity / net-shaping surfaces actually changed
  # (paths-filtered) — a fast pre-merge guard without paying the full weak-net
  # cost on every unrelated FE PR.
  netshape-matrix:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      run: ${{ steps.set.outputs.run }}
      shard: ${{ steps.set.outputs.shard }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      # On a PR, only proceed if a weak-net-relevant path changed. On cron /
      # dispatch the full shard always runs.
      - id: changed
        if: ${{ github.event_name == 'pull_request' }}
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3
        with:
          filters: |
            netshape:
              - 'museum-frontend/features/chat/**'
              - 'museum-frontend/shared/infrastructure/connectivity/**'
              - 'museum-frontend/.maestro/net-*.yaml'
              - 'museum-frontend/.maestro/shards.json'
              - 'museum-backend/src/shared/net-shaping/**'
              - 'scripts/net-shaping/**'
              - '.github/workflows/ci-cd-mobile.yml'
      - id: set
        env:
          EVENT: ${{ github.event_name }}
          PR_HIT: ${{ steps.changed.outputs.netshape }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            if [ "$PR_HIT" = "true" ]; then
              echo 'run=true'  >> "$GITHUB_OUTPUT"
              echo 'shard=netshapeSmoke' >> "$GITHUB_OUTPUT"
            else
              echo 'run=false' >> "$GITHUB_OUTPUT"
              echo 'shard=netshapeSmoke' >> "$GITHUB_OUTPUT"
            fi
          else
            echo 'run=true' >> "$GITHUB_OUTPUT"
            echo 'shard=netshape' >> "$GITHUB_OUTPUT"
          fi

  # ─── 4d. Weak-net Maestro job (device → Toxiproxy shaped link) ────────────
  # The device→proxy wiring is now GENUINE (no false-green): the APK consumed here
  # comes from `prebuild-netshape`, baked at the Toxiproxy shaped listener
  # (EXPO_PUBLIC_API_BASE_URL=http://10.0.2.2:3100), so every request the emulator
  # makes goes 10.0.2.2:3100 → toxiproxy → host backend :3000 and is shaped. The
  # seed step FAILS HARD if the proxy or its toxics cannot be installed (it no
  # longer swallows curl errors), and asserts both an upstream + a downstream toxic
  # are live before the emulator boots. This job boots backend + Toxiproxy, seeds
  # the toxics from the W3 mapper, runs the netshape flows, and records the upload
  # wall-clock for the compression metric. The unit gate still proves the mapper /
  # sentinel / compose contract; this job proves the end-to-end shaped link.
  maestro-netshape-nightly:
    needs: [prebuild-netshape, netshape-matrix]
    if: ${{ needs.netshape-matrix.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 70
    defaults:
      run:
        working-directory: museum-frontend
    env:
      MAESTRO_VERSION: '2.5.1'
      NETSHAPE_SHARD: ${{ needs.netshape-matrix.outputs.shard }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: museum_dev
          POSTGRES_PASSWORD: museum_dev_password
          POSTGRES_DB: museum_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U museum_dev -d museum_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # Toxiproxy shaped link (Layer 3). 8474 = admin API (seed toxics here),
      # 3100 = shaped listener forwarding to the host backend on :3000. Mirrors
      # docker-compose.dev.yml profiles:[weaknet]. NEVER in a prod artifact
      # (sentinel:toxiproxy-no-prod).
      toxiproxy:
        image: ghcr.io/shopify/toxiproxy:2.9.0
        ports:
          - 8474:8474
          - 3100:3100
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Download weak-net APK artifact
        # The weak-net APK (from prebuild-netshape) bakes the API base URL at the
        # Toxiproxy SHAPED listener (10.0.2.2:3100), NOT the unshaped :3000 backend,
        # so every request the device makes is genuinely shaped. Reusing the plain
        # `maestro-apk` (:3000) here would bypass Toxiproxy → silent no-op false-green.
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: maestro-apk-netshape
          path: museum-frontend/android/app/build/outputs/apk/release/
      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Verify Maestro version
        run: maestro --version

      - name: Boot backend (PG/Redis services + migrations + API + e2e seed)
        working-directory: museum-frontend
        env:
          SKIP_DOCKER_COMPOSE: '1'
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: museum_dev
          DB_PASSWORD: museum_dev_password
          PGDATABASE: museum_dev
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
          EXTRACTION_WORKER_ENABLED: 'false'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ./scripts/maestro-runner-setup.sh
          cd ../museum-backend
          E2E_SEED_ALLOW=1 DB_HOST=localhost DB_PORT=5432 DB_USER=museum_dev \
            DB_PASSWORD=museum_dev_password PGDATABASE=museum_dev \
            pnpm seed:e2e-maestro-account

      # Seed the Toxiproxy proxy + the per-profile toxics from the W1 mapper.
      # `profile-to-toxics.mjs <profile>` emits the admin-API JSON (NO inline
      # kbps→KB/s — DRY single site in toToxics) covering BOTH streams (one upstream
      # bandwidth toxic + one downstream). The shaped listener forwards 3100 → host
      # backend :3000; the weak-net APK is baked at 10.0.2.2:3100, so the device's
      # requests traverse this shaped link.
      #
      # This step FAILS HARD (no `|| echo ::warning::` swallowing): if the proxy or
      # any toxic cannot be created, the shaped link is not actually in place and the
      # netshape run would be a false-green no-op — exactly the bug this fix closes.
      # We verify the proxy + its toxics are live before booting the emulator.
      - name: Seed Toxiproxy shaped link (edge profile, both streams)
        working-directory: museum-frontend
        run: |
          set -euo pipefail
          # On GHA the backend runs on the runner host; from the toxiproxy
          # service container the host is reachable at host.docker.internal.
          curl -fsS -X POST http://localhost:8474/proxies \
            -d '{"name":"backend","listen":"0.0.0.0:3100","upstream":"host.docker.internal:3000","enabled":true}'
          TOXICS=$(node ../scripts/net-shaping/profile-to-toxics.mjs edge)
          echo "edge toxics (from toToxics, both streams): $TOXICS"
          echo "$TOXICS" | jq -c '.[]' | while read -r toxic; do
            curl -fsS -X POST http://localhost:8474/proxies/backend/toxics \
              -d "$toxic"
          done
          # Assert the proxy exists and at least one upstream + one downstream toxic
          # were installed — proves the link is genuinely shaped before the device run.
          SEEDED=$(curl -fsS http://localhost:8474/proxies/backend/toxics)
          echo "installed toxics: $SEEDED"
          echo "$SEEDED" | jq -e 'map(.stream) | (index("upstream") != null) and (index("downstream") != null)' \
            || { echo "::error::Toxiproxy is missing an upstream and/or downstream toxic — shaped link not in place"; exit 1; }

      - name: Enable KVM (hardware-accelerated emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Compression wall-clock metric: time the netshape shard end-to-end so the
      # summary can report how long the shaped (compressed) run took. A bare
      # number, not a pass/fail gate.
      - name: Run weak-net Maestro shard (shaped link, wall-clock timed)
        id: netshape_run
        uses: reactivecircus/android-emulator-runner@1dcd0090116d15e7c562f8db72807de5e036a4ed  # v2
        env:
          NETSHAPE_SHARD: ${{ needs.netshape-matrix.outputs.shard }}
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-boot-timeout: 300
          ram-size: 4096M
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            START=$(date +%s)
            bash museum-frontend/scripts/maestro-emulator-script.sh "$NETSHAPE_SHARD"
            STATUS=$?
            END=$(date +%s)
            echo "netshape_wall_clock_seconds=$((END - START))" >> "$GITHUB_OUTPUT"
            echo "::notice::weak-net shard '$NETSHAPE_SHARD' wall-clock: $((END - START))s (compression metric)"
            exit $STATUS

      - name: Upload weak-net shard logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: maestro-netshape-logs
          path: museum-frontend/.maestro/logs/
          retention-days: 7

      - name: Weak-net summary (wall-clock compression note)
        if: always()
        run: |
          WC="${{ steps.netshape_run.outputs.netshape_wall_clock_seconds }}"
          {
            echo "## Weak-net (Toxiproxy) Maestro — shard \`$NETSHAPE_SHARD\`"
            echo ""
            echo "- shaped-link wall-clock: **${WC:-n/a}s** (compression metric, device→Toxiproxy edge profile)"
            echo "- shaped link: APK baked at 10.0.2.2:3100 → Toxiproxy → backend :3000 (genuine, both streams; seed fails hard)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── 5. iOS nightly Maestro suite (cron-only) ───────────────────────────
  maestro-ios-nightly:
    if: ${{ github.event_name == 'schedule' }}
    needs: quality
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: museum-frontend
    env:
      MAESTRO_VERSION: '2.5.1'
      # Test-only audio-fixture injection seam (useAudioRecorder.ts) — bakes the
      # bundled clip so the iOS audio-recording-flow STT→TTS round-trip is
      # deterministic (Maestro cannot drive a real microphone). Inlined into the
      # JS bundle at the Debug build step; the sim-only Debug app is never
      # shipped, so the seam never reaches production. See .maestro/fixtures/audio.md.
      EXPO_PUBLIC_MAESTRO_AUDIO_FIXTURE: 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
      - name: Install npm deps
        run: npm install --no-audit --no-fund
      - name: Expo prebuild iOS
        run: npx expo prebuild --platform ios --clean
      - name: Build iOS Debug app for Simulator
        run: |
          cd ios
          xcodebuild -workspace Musaium.xcworkspace \
            -scheme Musaium \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Boot backend (docker-compose + migrations + API)
        run: ./scripts/maestro-runner-setup.sh
      - name: Seed e2e Maestro login accounts (iOS nightly runs the `all` union)
        # The iOS nightly suite runs every flow (maestro-run-shard.sh all),
        # including auth-login-happy and modal-paywall-quota-upsell. Seed the same
        # fixed accounts the Android shards seed so those flows can log in. The
        # paywall account is seeded with its quota PRE-EXHAUSTED (E2E_EXHAUST_QUOTA=1)
        # so modal-paywall-quota-upsell drives the real 402 → QuotaUpsellModal path
        # (the iOS nightly is a Debug build, but the flow no longer relies on the
        # removed (dev) preview route — it uses the production 402 trigger).
        run: |
          cd museum-backend
          E2E_SEED_ALLOW=1 DB_HOST=localhost DB_PORT=5433 DB_USER=museum_dev \
            DB_PASSWORD=museum_dev_password PGDATABASE=museum_dev \
            pnpm seed:e2e-maestro-account
          E2E_SEED_ALLOW=1 DB_HOST=localhost DB_PORT=5433 DB_USER=museum_dev \
            DB_PASSWORD=museum_dev_password PGDATABASE=museum_dev \
            E2E_LOGIN_EMAIL=apple.test@apple.com E2E_LOGIN_PASSWORD='Apple1234!' \
            pnpm seed:e2e-maestro-account
          E2E_SEED_ALLOW=1 E2E_EXHAUST_QUOTA=1 DB_HOST=localhost DB_PORT=5433 DB_USER=museum_dev \
            DB_PASSWORD=museum_dev_password PGDATABASE=museum_dev \
            E2E_LOGIN_EMAIL=e2e-paywall@test.musaium.dev E2E_LOGIN_PASSWORD='TestPassword123!' \
            pnpm seed:e2e-maestro-account
      - name: Boot iOS Simulator
        run: |
          xcrun simctl create maestro-sim "iPhone 15" "iOS17.5" || true
          xcrun simctl boot "maestro-sim" || true
      - name: Install app on simulator
        run: |
          APP_PATH=$(find ios/build/Build/Products/Debug-iphonesimulator -name "*.app" -type d | head -1)
          xcrun simctl install booted "$APP_PATH"
      - name: Seed Maestro fixtures into simulator photo library
        # T9.x — Inject the chat-compare fixture into the booted simulator
        # so the PHPicker surfaces it as the most-recent asset. Skipped if
        # the fixture file is missing (fail-open).
        run: |
          if [ -f .maestro/fixtures/test-artwork.jpg ]; then
            xcrun simctl addmedia booted .maestro/fixtures/test-artwork.jpg
          fi
      - name: Run all Maestro flows (sequential)
        run: ./scripts/maestro-run-shard.sh all
      - name: Upload iOS Maestro logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: maestro-ios-nightly-logs
          path: museum-frontend/.maestro/logs/
          retention-days: 7

