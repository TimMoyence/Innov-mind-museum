name: mobile

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile to run
        required: true
        default: internal
        type: choice
        options:
          - preview
          - internal
          - production
      platform:
        description: Platform target
        required: true
        default: android
        type: choice
        options:
          - ios
          - android
          - all
      submit:
        description: Submit to stores (production only)
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'
  pull_request:
    paths:
      - 'museum-frontend/**'
      - 'museum-backend/openapi/**'
      - '.github/workflows/ci-cd-mobile.yml'
  push:
    branches: ['main']
    tags: ['v*']
    paths:
      - 'museum-frontend/**'
      - 'museum-backend/openapi/**'
      - '.github/workflows/ci-cd-mobile.yml'

concurrency:
  group: ci-cd-mobile-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Top-level least-privilege default. EAS build/submit jobs do not need write
# scopes (they delegate to Expo) so contents:read is sufficient for all jobs.
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: museum-frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Expo Doctor
        run: npx expo-doctor
        continue-on-error: true

      - name: Check OpenAPI Typegen Sync
        run: npm run check:openapi-types

      - name: Validate Backend OpenAPI Spec
        working-directory: museum-backend
        run: |
          corepack enable && pnpm install --frozen-lockfile
          pnpm run openapi:validate

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Check i18n completeness
        run: npm run check:i18n

      - name: Check no unicode emoji in screens/copy (P4 emoji guard)
        # UX policy: mobile uses PNG (require) + Ionicons only. Per-line
        # allowlist at museum-frontend/shared/i18n/copy-emoji-allowlist.json
        # for legitimate symbols (©, OSM attribution).
        run: node ../scripts/check-no-unicode-emoji.cjs

      - name: Maestro shard-manifest sentinel
        run: node ../scripts/sentinels/maestro-shard-manifest.mjs

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --coverage

  # ─── 2. Maestro APK prebuild (cached on mobile-source content hash) ──────
  prebuild:
    needs: quality
    runs-on: macos-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: museum-frontend
    outputs:
      cache-hit: ${{ steps.cache-apk.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Restore APK cache
        id: cache-apk
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: museum-frontend/android/app/build/outputs/apk/debug/app-debug.apk
          key: maestro-apk-${{ runner.os }}-${{ hashFiles('museum-frontend/src/**', 'museum-frontend/features/**', 'museum-frontend/shared/**', 'museum-frontend/app/**', 'museum-frontend/assets/**', 'museum-frontend/app.config.ts', 'museum-frontend/package.json', 'museum-frontend/package-lock.json') }}
          restore-keys: |
            maestro-apk-${{ runner.os }}-

      - name: Setup Java (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa4c1abb7ff36cb7d8d  # v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm deps (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: npm install --no-audit --no-fund

      - name: Expo prebuild Android (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --clean

      - name: Gradle assembleDebug (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: preview-apk
          path: museum-frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  # ─── 3. Maestro shard matrix (Android, PR + push to main/staging) ─────────
  maestro-shard:
    if: ${{ github.event_name != 'schedule' }}
    needs: prebuild
    runs-on: macos-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [auth, chat, museum, settings]
    defaults:
      run:
        working-directory: museum-frontend
    env:
      MAESTRO_VERSION: '1.43.0'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
        with:
          version: 10
      - name: Setup Java
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa4c1abb7ff36cb7d8d  # v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download APK artifact
        uses: actions/download-artifact@d3f86a106a0bac45b6f6c19abdd8bcd76ed47d72  # v4
        with:
          name: preview-apk
          path: museum-frontend/android/app/build/outputs/apk/debug/

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Verify Maestro version
        run: maestro --version

      - name: Boot backend (docker-compose + migrations + API)
        working-directory: museum-frontend
        run: ./scripts/maestro-runner-setup.sh

      - name: Enable KVM (for hardware-accelerated emulator)
        if: runner.os == 'Linux'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro shard on Android emulator
        uses: reactivecircus/android-emulator-runner@1dcd0090116d15e7c562f8db72807de5e036a4ed  # v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            cd museum-frontend
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            ./scripts/maestro-run-shard.sh ${{ matrix.shard }}

      - name: Upload shard logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: maestro-shard-${{ matrix.shard }}-logs
          path: museum-frontend/.maestro/logs/
          retention-days: 7

  # ─── 4. Aggregate shard results into a PR comment ─────────────────────────
  maestro-summary:
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: maestro-shard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b6f6c19abdd8bcd76ed47d72  # v4
        with:
          path: shard-logs
      - name: Post summary as PR comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const root = 'shard-logs';
            const shards = fs.existsSync(root) ? fs.readdirSync(root) : [];
            const lines = ['## Maestro shard results', ''];
            for (const shard of shards) {
              const dir = path.join(root, shard);
              const logs = fs.readdirSync(dir).filter(f => f.endsWith('.log'));
              const fails = logs.filter(f => fs.readFileSync(path.join(dir, f), 'utf-8').includes('FAIL'));
              lines.push(`- **${shard}**: ${logs.length - fails.length}/${logs.length} flows passed${fails.length ? ` — failed: ${fails.map(f => f.replace('.log','')).join(', ')}` : ''}`);
            }
            const body = lines.join('\n');
            const { owner, repo } = context.repo;
            const issueNumber = context.payload.pull_request?.number;
            if (!issueNumber) return;
            await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body });

  # ─── 5. iOS nightly Maestro suite (cron-only) ───────────────────────────
  maestro-ios-nightly:
    if: ${{ github.event_name == 'schedule' }}
    needs: quality
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: museum-frontend
    env:
      MAESTRO_VERSION: '1.43.0'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
        with:
          version: 10
      - name: Install npm deps
        run: npm install --no-audit --no-fund
      - name: Expo prebuild iOS
        run: npx expo prebuild --platform ios --clean
      - name: Build iOS Debug app for Simulator
        run: |
          cd ios
          xcodebuild -workspace Musaium.xcworkspace \
            -scheme Musaium \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Boot backend (docker-compose + migrations + API)
        run: ./scripts/maestro-runner-setup.sh
      - name: Boot iOS Simulator
        run: |
          xcrun simctl create maestro-sim "iPhone 15" "iOS17.5" || true
          xcrun simctl boot "maestro-sim" || true
      - name: Install app on simulator
        run: |
          APP_PATH=$(find ios/build/Build/Products/Debug-iphonesimulator -name "*.app" -type d | head -1)
          xcrun simctl install booted "$APP_PATH"
      - name: Run all Maestro flows (sequential)
        run: ./scripts/maestro-run-shard.sh all
      - name: Upload iOS Maestro logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: maestro-ios-nightly-logs
          path: museum-frontend/.maestro/logs/
          retention-days: 7

  build-preview-ios:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'preview' && (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all') }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_STAGING: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_STAGING }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate preview iOS build env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_STAGING"
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@18.5.0

      - name: Verify EAS CLI
        run: eas --version

      - name: Build iOS preview
        run: eas build --platform ios --profile preview --non-interactive --no-wait

  build-preview-android:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'preview' && (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all') }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_STAGING: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_STAGING }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate preview Android build env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_STAGING"
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@18.5.0

      - name: Verify EAS CLI
        run: eas --version

      - name: Build Android preview
        run: eas build --platform android --profile preview --non-interactive --no-wait

  # Trigger: `workflow_dispatch` only with profile=internal + platform in
  # (android|all). The previous on-push trigger drained the EAS Free plan
  # Android quota on every merge to main; operators now run this job
  # manually from the Actions tab when an internal Android release is
  # actually wanted.
  build-internal-android:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'internal' && (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all') }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_STAGING: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_STAGING }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate internal Android build env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_STAGING"
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"
          test -n "$GOOGLE_SERVICE_ACCOUNT_JSON"

      - name: Prepare Google Play service account key
        run: |
          mkdir -p .secrets
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > .secrets/google-service-account.json

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@18.5.0

      - name: Verify EAS CLI
        run: eas --version

      - name: Build and auto-submit Android internal testing release
        run: eas build --platform android --profile internal --auto-submit-with-profile internal --non-interactive --no-wait

  build-production-ios:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'production' && (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all') }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_STAGING: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_STAGING }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate production iOS build env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_STAGING"
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@18.5.0

      - name: Verify EAS CLI
        run: eas --version

      - name: Build iOS production
        run: eas build --platform ios --profile production --non-interactive

  build-production-android:
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'production' && (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all')) || (startsWith(github.ref, 'refs/tags/v') && vars.AUTO_TAG_BUILD_ANDROID == 'true') }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_STAGING: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_STAGING }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate production Android build env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_STAGING"
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@18.5.0

      - name: Verify EAS CLI
        run: eas --version

      - name: Build Android production
        run: eas build --platform android --profile production --non-interactive

  submit-production-ios:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'production' && github.event.inputs.submit == 'yes' && (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all') }}
    needs: build-production-ios
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate iOS submit env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"
          test -n "$APPLE_ID"
          test -n "$ASC_APP_ID"
          test -n "$APPLE_TEAM_ID"

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@18.5.0

      - name: Verify EAS CLI
        run: eas --version

      - name: Submit iOS latest production build
        run: eas submit --platform ios --profile production --latest --non-interactive

  submit-production-android:
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'production' && github.event.inputs.submit == 'yes' && (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all')) || (startsWith(github.ref, 'refs/tags/v') && vars.AUTO_TAG_BUILD_ANDROID == 'true') }}
    needs: build-production-android
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate Android submit env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"
          test -n "$GOOGLE_SERVICE_ACCOUNT_JSON"

      - name: Prepare Google Play service account key
        run: |
          mkdir -p .secrets
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > .secrets/google-service-account.json

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@18.5.0

      - name: Verify EAS CLI
        run: eas --version

      - name: Submit Android latest production build
        run: eas submit --platform android --profile production --latest --non-interactive
