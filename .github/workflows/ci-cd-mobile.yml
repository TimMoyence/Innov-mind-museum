name: mobile

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile to run
        required: true
        default: internal
        type: choice
        options:
          - preview
          - internal
          - production
      platform:
        description: Platform target
        required: true
        default: android
        type: choice
        options:
          - ios
          - android
          - all
      submit:
        description: Submit to stores (production only)
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'
  pull_request:
    paths:
      - 'museum-frontend/**'
      - 'museum-backend/openapi/**'
      - '.github/workflows/ci-cd-mobile.yml'
  push:
    branches: ['main']
    tags: ['v*']
    paths:
      - 'museum-frontend/**'
      - 'museum-backend/openapi/**'
      - '.github/workflows/ci-cd-mobile.yml'
  schedule:
    # E39 — Nightly Maestro Android matrix at 03:17 UTC (matches the existing
    # iOS nightly slot). PR/push only run quality + prebuild for fast feedback;
    # the slow emulator path is gated to nightly + manual dispatch because
    # GitHub macos-latest hosted runners can't expose Hypervisor Framework
    # (HVF_UNSUPPORTED), so arm64 AVDs run software-only and time out at 600s.
    # Future: self-hosted Mac runner with HVF would enable per-PR maestro.
    - cron: '17 3 * * *'

concurrency:
  group: ci-cd-mobile-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Top-level least-privilege default. EAS build/submit jobs do not need write
# scopes (they delegate to Expo) so contents:read is sufficient for all jobs.
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: museum-frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate offline map style JSON (TD-3 drift guard)
        working-directory: ${{ github.workspace }}
        run: node -e "JSON.parse(require('fs').readFileSync('docs/maplibre/cartodb-raster-style.json','utf8'))"

      - name: Expo Doctor
        run: npx expo-doctor
        continue-on-error: true

      - name: Check OpenAPI Typegen Sync
        run: npm run check:openapi-types

      - name: Validate Backend OpenAPI Spec
        working-directory: museum-backend
        run: |
          corepack enable && pnpm install --frozen-lockfile
          pnpm run openapi:validate

      - name: Audit dependencies
        run: npm audit --audit-level=high

      # ── I-CMP6 / R11 (decision Q3 "Tout faire", design §D7) — CycloneDX SBOM
      # of the JS bundle dependency graph, uploaded as a CI artifact. There is
      # deliberately NO sigstore image attestation here: EAS `eas build
      # --no-wait` produces no local OCI image digest reachable from CI, so
      # there is nothing to bind a signed predicate to. The residual gap
      # (store-binary lacks a signed SBOM attestation) is tracked in
      # docs/TECH_DEBT.md against EU CRA Art.13/2027.
      # continue-on-error: the SBOM artifact must never block the quality gate.
      - name: Generate mobile SBOM (CycloneDX)
        continue-on-error: true
        run: npx @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-file sbom-mobile.json --spec-version 1.5 --output-reproducible

      - name: Upload mobile SBOM artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom-mobile
          path: museum-frontend/sbom-mobile.json
          retention-days: 90

      - name: Check i18n completeness
        run: npm run check:i18n

      - name: Check no unicode emoji in screens/copy (P4 emoji guard)
        # UX policy: mobile uses PNG (require) + Ionicons only. Per-line
        # allowlist at museum-frontend/shared/i18n/copy-emoji-allowlist.json
        # for legitimate symbols (©, OSM attribution).
        run: node ../scripts/check-no-unicode-emoji.cjs

      - name: Maestro shard-manifest sentinel
        run: node ../scripts/sentinels/maestro-shard-manifest.mjs

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage gate
        # Phase 8: dedicated `test:coverage` script invokes Jest with --coverage,
        # so the global coverage threshold in jest.config.js hard-fails the PR
        # if FE drops below the Phase 8 floor (Phase 9 will lift toward 85/70/74/85).
        run: npm run test:coverage

  # ─── 2. Maestro APK prebuild (cached on mobile-source content hash) ──────
  prebuild:
    needs: quality
    runs-on: macos-latest
    # E17: gradle/actions/setup-gradle caches ~/.gradle/caches + wrapper across
    # runs, so cold first run still ~30 min, warm runs ~3-5 min.
    # E34: bumped 25 → 35 after run 25508936326 hit the 25min cap on the cold
    # path with the new 6GB heap (heap fixed OOM but D8 :app:mergeExtDexDebug
    # still wants ~18-22 min wall on cold cache for 4 ABIs). Warm cache stays
    # well under 5 min, so this only widens the cold-path budget.
    timeout-minutes: 35
    defaults:
      run:
        working-directory: museum-frontend
    outputs:
      cache-hit: ${{ steps.cache-apk.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Restore APK cache
        id: cache-apk
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: museum-frontend/android/app/build/outputs/apk/debug/app-debug.apk
          key: maestro-apk-${{ runner.os }}-${{ hashFiles('museum-frontend/src/**', 'museum-frontend/features/**', 'museum-frontend/shared/**', 'museum-frontend/app/**', 'museum-frontend/assets/**', 'museum-frontend/app.config.ts', 'museum-frontend/package.json', 'museum-frontend/package-lock.json') }}
          restore-keys: |
            maestro-apk-${{ runner.os }}-

      - name: Setup Java (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install npm deps (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: npm install --no-audit --no-fund

      - name: Expo prebuild Android (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform android --clean

      - name: Setup Gradle (cache deps, cache miss only)
        # E17: caches ~/.gradle/caches/modules-2 (~1-2 GB) + ~/.gradle/wrapper
        # (~150 MB) keyed on **/*.gradle*, **/gradle-wrapper.properties.
        # First run still cold (writes cache); subsequent cold-source runs warm-
        # restore in ~30s, cutting Gradle assembleDebug from ~35min → ~5min.
        # GRADLE_ENCRYPTION_KEY secret would encrypt the cache; left out for
        # now (works unencrypted) — future hardening when secret is provisioned.
        if: steps.cache-apk.outputs.cache-hit != 'true'
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a  # v4.4.3
        with:
          cache-read-only: false
          build-root-directory: museum-frontend/android

      - name: Gradle assembleDebug (cache miss only)
        if: steps.cache-apk.outputs.cache-hit != 'true'
        # `--stacktrace --info` surfaces the actual D8 dex-merge conflict (which
        # class / dex archive). Without them the previous run died with an
        # empty `DexArchiveMergerException: Error while merging dex archives:`
        # message and we couldn't pinpoint the offending dependency. The flags
        # add a few seconds to the log; harmless for a 5-min cached path.
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace --info

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: preview-apk
          path: museum-frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

  # ─── 3. Maestro shard matrix (Android, nightly cron + manual dispatch) ───
  # E39 — gated off PR/push because hosted macos-latest runners can't run the
  # arm64 emulator (HVF unavailable). Re-enable per-PR when a self-hosted Mac
  # runner is provisioned.
  maestro-shard:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    needs: prebuild
    runs-on: macos-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [auth, chat, museum, settings]
    defaults:
      run:
        working-directory: museum-frontend
    env:
      MAESTRO_VERSION: '2.5.1'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
        with:
          version: 10
      - name: Setup Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download APK artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: preview-apk
          path: museum-frontend/android/app/build/outputs/apk/debug/

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Verify Maestro version
        run: maestro --version

      - name: Install + start native Postgres (E37bis — macos-latest has no Docker, Colima/VZ fails on hosted M1)
        # E37 (Colima) failed because the macos-latest hosted M1 runner can't
        # nest the VZ driver. Switching to native Homebrew Postgres avoids the
        # VM entirely and is faster (no boot, ~10s readiness).
        run: |
          brew install --quiet postgresql@16
          brew services start postgresql@16
          # Wait for pg_isready, then create the role + database the BE expects
          for i in $(seq 1 30); do
            if /opt/homebrew/opt/postgresql@16/bin/pg_isready -h localhost -p 5432 > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          /opt/homebrew/opt/postgresql@16/bin/createuser -s museum_dev || true
          /opt/homebrew/opt/postgresql@16/bin/psql -d postgres -c "ALTER USER museum_dev WITH PASSWORD 'museum_dev_password';"
          /opt/homebrew/opt/postgresql@16/bin/createdb -O museum_dev museum_dev || true

      - name: Boot backend (native PG + migrations + API)
        working-directory: museum-frontend
        env:
          SKIP_DOCKER_COMPOSE: '1'
          DB_PORT: '5432'
        run: ./scripts/maestro-runner-setup.sh

      - name: Enable KVM (for hardware-accelerated emulator)
        if: runner.os == 'Linux'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro shard on Android emulator
        uses: reactivecircus/android-emulator-runner@1dcd0090116d15e7c562f8db72807de5e036a4ed  # v2
        with:
          api-level: 33
          # E38 — macos-latest hosted runner is arm64 (M1); QEMU2 cannot
          # emulate x86_64 AVDs on an aarch64 host. Switch to arm64-v8a
          # system image (matching APK ABI built in prebuild).
          arch: arm64-v8a
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            cd museum-frontend
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            # T9.x — Push the chat-compare fixture into /sdcard/Download/ so
            # the picker surfaces it as the most-recent local asset. Harmless
            # on the other shards; pushing is cheap (≤25KB) and idempotent.
            if [ -f .maestro/fixtures/test-artwork.jpg ]; then
              adb push .maestro/fixtures/test-artwork.jpg /sdcard/Download/test-artwork.jpg
              # Tell MediaStore the new file exists so it appears in pickers.
              adb shell am broadcast -a android.intent.action.MEDIA_SCANNER_SCAN_FILE -d file:///sdcard/Download/test-artwork.jpg || true
            fi
            ./scripts/maestro-run-shard.sh ${{ matrix.shard }}

      - name: Upload shard logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: maestro-shard-${{ matrix.shard }}-logs
          path: museum-frontend/.maestro/logs/
          retention-days: 7

  # ─── 4. Aggregate shard results into a PR comment ─────────────────────────
  maestro-summary:
    # E39 — only PR runs ever produced shard logs to summarize, but PR no
    # longer runs maestro-shard. Keep gate consistent — runs only when the
    # shard matrix above runs (nightly cron + dispatch).
    if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    needs: maestro-shard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: shard-logs
      - name: Post summary as PR comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const root = 'shard-logs';
            const shards = fs.existsSync(root) ? fs.readdirSync(root) : [];
            const lines = ['## Maestro shard results', ''];
            for (const shard of shards) {
              const dir = path.join(root, shard);
              const logs = fs.readdirSync(dir).filter(f => f.endsWith('.log'));
              const fails = logs.filter(f => fs.readFileSync(path.join(dir, f), 'utf-8').includes('FAIL'));
              lines.push(`- **${shard}**: ${logs.length - fails.length}/${logs.length} flows passed${fails.length ? ` — failed: ${fails.map(f => f.replace('.log','')).join(', ')}` : ''}`);
            }
            const body = lines.join('\n');
            const { owner, repo } = context.repo;
            const issueNumber = context.payload.pull_request?.number;
            if (!issueNumber) return;
            await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body });

  # ─── 5. iOS nightly Maestro suite (cron-only) ───────────────────────────
  maestro-ios-nightly:
    if: ${{ github.event_name == 'schedule' }}
    needs: quality
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: museum-frontend
    env:
      MAESTRO_VERSION: '2.5.1'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
        with:
          version: 10
      - name: Install npm deps
        run: npm install --no-audit --no-fund
      - name: Expo prebuild iOS
        run: npx expo prebuild --platform ios --clean
      - name: Build iOS Debug app for Simulator
        run: |
          cd ios
          xcodebuild -workspace Musaium.xcworkspace \
            -scheme Musaium \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Boot backend (docker-compose + migrations + API)
        run: ./scripts/maestro-runner-setup.sh
      - name: Boot iOS Simulator
        run: |
          xcrun simctl create maestro-sim "iPhone 15" "iOS17.5" || true
          xcrun simctl boot "maestro-sim" || true
      - name: Install app on simulator
        run: |
          APP_PATH=$(find ios/build/Build/Products/Debug-iphonesimulator -name "*.app" -type d | head -1)
          xcrun simctl install booted "$APP_PATH"
      - name: Seed Maestro fixtures into simulator photo library
        # T9.x — Inject the chat-compare fixture into the booted simulator
        # so the PHPicker surfaces it as the most-recent asset. Skipped if
        # the fixture file is missing (fail-open).
        run: |
          if [ -f .maestro/fixtures/test-artwork.jpg ]; then
            xcrun simctl addmedia booted .maestro/fixtures/test-artwork.jpg
          fi
      - name: Run all Maestro flows (sequential)
        run: ./scripts/maestro-run-shard.sh all
      - name: Upload iOS Maestro logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: maestro-ios-nightly-logs
          path: museum-frontend/.maestro/logs/
          retention-days: 7

  build-preview-ios:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'preview' && (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all') }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_STAGING: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_STAGING }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate preview iOS build env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_STAGING"
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@18.5.0

      - name: Verify EAS CLI
        run: eas --version

      - name: Build iOS preview
        run: eas build --platform ios --profile preview --non-interactive --no-wait

  build-preview-android:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'preview' && (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all') }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_STAGING: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_STAGING }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate preview Android build env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_STAGING"
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@18.5.0

      - name: Verify EAS CLI
        run: eas --version

      - name: Build Android preview
        run: eas build --platform android --profile preview --non-interactive --no-wait

  # Trigger: `workflow_dispatch` only with profile=internal + platform in
  # (android|all). The previous on-push trigger drained the EAS Free plan
  # Android quota on every merge to main; operators now run this job
  # manually from the Actions tab when an internal Android release is
  # actually wanted.
  build-internal-android:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'internal' && (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all') }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_STAGING: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_STAGING }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: museum-frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate internal Android build env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_STAGING"
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"
          test -n "$GOOGLE_SERVICE_ACCOUNT_JSON"

      - name: Prepare Google Play service account key
        run: |
          mkdir -p .secrets
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > .secrets/google-service-account.json

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@18.5.0

      - name: Verify EAS CLI
        run: eas --version

      - name: Build and auto-submit Android internal testing release
        run: eas build --platform android --profile internal --auto-submit-with-profile internal --non-interactive --no-wait

  build-production-ios:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'production' && (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all') }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    defaults:
      run:
