name: promptfoo regression

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'museum-backend/src/modules/chat/**'
      - 'museum-backend/security/promptfoo/**'
      - '.github/workflows/ci-cd-promptfoo.yml'
  schedule:
    # Nightly full corpus run, even when chat code untouched. Catches model drift
    # if upstream provider tightens / loosens behavior.
    - cron: '23 3 * * *'

permissions:
  contents: read

concurrency:
  group: ci-cd-promptfoo-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  promptfoo:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: musaium
          POSTGRES_PASSWORD: musaium_ci
          POSTGRES_DB: musaium
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://musaium:musaium_ci@localhost:5433/musaium
      DB_SYNCHRONIZE: 'false'
      JWT_ACCESS_SECRET: ci-access-secret-for-promptfoo-only
      JWT_REFRESH_SECRET: ci-refresh-secret-for-promptfoo-only
      MEDIA_SIGNING_SECRET: ci-media-secret-for-promptfoo-only
      # Reuse the existing OPENAI_API_KEY secret (same one ci-cd-backend.yml uses).
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NODE_ENV: test
      PORT: '3000'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install backend deps
        working-directory: museum-backend
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        working-directory: museum-backend
        run: pnpm migration:run

      - name: Boot backend
        working-directory: museum-backend
        run: pnpm dev > /tmp/backend.log 2>&1 &

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/health 2>/dev/null; then
              echo "backend healthy after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "ERROR: backend never became healthy"
          cat /tmp/backend.log
          exit 1

      - name: Bootstrap test visitor + session
        id: bootstrap
        working-directory: museum-backend
        run: |
          # Register a throwaway visitor and grab a token.
          REG_BODY='{"email":"promptfoo+ci@musaium.test","password":"PromptfooCI2026!","firstName":"Pf","lastName":"Ci"}'
          curl -fsS -X POST http://localhost:3000/api/auth/register \
            -H 'Content-Type: application/json' -d "$REG_BODY" > /dev/null || true
          # Login
          LOGIN_BODY='{"email":"promptfoo+ci@musaium.test","password":"PromptfooCI2026!"}'
          TOKEN=$(curl -fsS -X POST http://localhost:3000/api/auth/login \
            -H 'Content-Type: application/json' -d "$LOGIN_BODY" | jq -r '.accessToken')
          # Create chat session
          SID=$(curl -fsS -X POST http://localhost:3000/api/chat/sessions \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' -d '{"locale":"en","museumMode":false}' | jq -r '.id')
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "session=$SID" >> "$GITHUB_OUTPUT"

      - name: Install promptfoo
        run: npm install -g promptfoo@latest

      - name: Run promptfoo eval
        working-directory: museum-backend
        env:
          PROMPTFOO_PROVIDER_URL: http://localhost:3000
          PROMPTFOO_VISITOR_TOKEN: ${{ steps.bootstrap.outputs.token }}
          PROMPTFOO_SESSION_ID: ${{ steps.bootstrap.outputs.session }}
          # Disable promptfoo telemetry in CI
          PROMPTFOO_DISABLE_TELEMETRY: '1'
        run: |
          mkdir -p reports
          promptfoo eval \
            --config security/promptfoo/promptfooconfig.yaml \
            --output reports/promptfoo-eval.json

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-eval-${{ github.run_id }}
          path: museum-backend/reports/promptfoo-eval.json
          retention-days: 30

      - name: Print backend log on failure
        if: failure()
        run: tail -200 /tmp/backend.log
