name: mobile-release

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile to run
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      platform:
        description: Platform target
        required: true
        default: ios
        type: choice
        options:
          - ios
          - android
          - all
      submit:
        description: Submit to stores (production only)
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'
  pull_request:
    paths:
      - 'museum-frontend/**'
      - '.github/workflows/mobile-release.yml'
  push:
    branches: ['main']
    tags: ['v*']
    paths:
      - 'museum-frontend/**'
      - '.github/workflows/mobile-release.yml'

jobs:
  quality-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: museum-frontend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Check OpenAPI Typegen Sync
        run: npm run check:openapi-types

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

  build-preview-ios:
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'preview' && (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all')) || (github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'android-only') && !contains(github.event.head_commit.message, 'android only')) }}
    needs: quality-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_STAGING: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_STAGING }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate preview iOS build env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_STAGING"
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Verify EAS CLI
        run: eas --version

      - name: Build iOS preview
        run: eas build --platform ios --profile preview --non-interactive --no-wait

  build-preview-android:
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'preview' && (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all')) || (github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'ios-only') && !contains(github.event.head_commit.message, 'ios only')) }}
    needs: quality-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_STAGING: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_STAGING }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate preview Android build env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_STAGING"
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Verify EAS CLI
        run: eas --version

      - name: Build Android preview
        run: eas build --platform android --profile preview --non-interactive --no-wait

  build-production-ios:
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'production' && (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all')) }}
    needs: quality-frontend
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_STAGING: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_STAGING }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate production iOS build env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_STAGING"
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Verify EAS CLI
        run: eas --version

      - name: Build iOS production
        run: eas build --platform ios --profile production --non-interactive --no-wait

  build-production-android:
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'production' && (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all')) || (startsWith(github.ref, 'refs/tags/v') && vars.AUTO_TAG_BUILD_ANDROID == 'true') }}
    needs: quality-frontend
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_STAGING: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_STAGING }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate production Android build env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_STAGING"
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Verify EAS CLI
        run: eas --version

      - name: Build Android production
        run: eas build --platform android --profile production --non-interactive --no-wait

  submit-production-ios:
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'production' && github.event.inputs.submit == 'yes' && (github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all')) }}
    needs: build-production-ios
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate iOS submit env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"
          test -n "$APPLE_ID"
          test -n "$ASC_APP_ID"
          test -n "$APPLE_TEAM_ID"

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Verify EAS CLI
        run: eas --version

      - name: Submit iOS latest production build
        run: eas submit --platform ios --profile production --latest --non-interactive

  submit-production-android:
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'production' && github.event.inputs.submit == 'yes' && (github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all')) || (startsWith(github.ref, 'refs/tags/v') && vars.AUTO_TAG_BUILD_ANDROID == 'true') }}
    needs: build-production-android
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: museum-frontend
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL_PROD: ${{ secrets.EXPO_PUBLIC_API_BASE_URL_PROD }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate Android submit env
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL_PROD"
          test -n "$GOOGLE_SERVICE_ACCOUNT_JSON"

      - name: Prepare Google Play service account key
        run: |
          mkdir -p .secrets
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > .secrets/google-service-account.json

      - name: Validate Expo auth
        run: test -n "$EXPO_TOKEN"

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Verify EAS CLI
        run: eas --version

      - name: Submit Android latest production build
        run: eas submit --platform android --profile production --latest --non-interactive
