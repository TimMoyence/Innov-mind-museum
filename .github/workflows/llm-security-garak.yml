# ---------------------------------------------------------------------------
# llm-security-garak.yml
#
# Scope
#   NVIDIA Garak — adversarial LLM vulnerability scanner. Probes the live
#   Musaium chat endpoint (POST /api/chat/sessions/:id/messages) booted in
#   the job via pgvector + Redis service containers (same pattern as
#   llm-security-promptfoo.yml). 6 probe families exercise OWASP LLM01 /
#   LLM05 / LLM07: promptinject, leakreplay, encoding, dan, tap, xss.
#   Session-per-probe freshness prevents cross-probe history contamination.
#
# Triggers
#   - schedule: '0 4 * * 1'       Every Monday 04:00 UTC.
#   - pull_request paths:         Code that affects the guardrail / LLM stack.
#   - workflow_dispatch:          Manual re-run from the Actions UI.
#
# Budget
#   ~20-25 min on ubuntu-latest. Hard cap via `timeout-minutes: 30`.
#
# Cost
#   ~750 OpenAI gpt-4o-mini calls/run × ~$0.001 ≈ $0.50/run × 4 runs/month
#   ≈ $2/month. Verified in Langfuse cost spans.
#
# Failure policy
#   Step `Content check` fails if zero records carry a non-empty `output`
#   field (defense vs silent JSON-shape drift). Step `Evaluate severity`
#   parses report JSONLs and exits non-zero on any HIGH/CRITICAL finding.
#
# Known coverage gap (Phase 2 follow-up)
#   The LLM Guard sidecar is NOT deployed in CI (no service container,
#   GUARDRAILS_V2_LLM_GUARD_URL unset). Garak therefore exercises the
#   keyword guardrail (art-topic-guardrail.ts) + sanitization + LLM call,
#   but not the sidecar PII Anonymize / output classifier path. Promptfoo
#   workflow has the same gap. Tracked for Phase 2.
#
# Sources
#   - https://github.com/NVIDIA/garak
#   - https://reference.garak.ai/en/stable/garak.generators.rest.html
#   - https://genai.owasp.org/llmrisk/llm07-system-prompt-leakage/
#   - ADR-049 §Rollout Phase 1.5 (closed 2026-05-14).
# ---------------------------------------------------------------------------
name: llm-security-garak

on:
  schedule:
    - cron: '0 4 * * 1'
  pull_request:
    paths:
      - 'museum-backend/src/modules/chat/**'
      - 'museum-backend/src/shared/llm/**'
      - 'museum-backend/scripts/llm-security/**'
      - '.github/workflows/llm-security-*.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: garak-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  garak:
    name: NVIDIA Garak adversarial scan (REST target)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        # pgvector/pgvector:pg16 — required because the C3 migration declares
        # `halfvec(768)` columns (see CLAUDE.md gotcha + ADR-037).
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: musaium
          POSTGRES_PASSWORD: musaium_ci
          POSTGRES_DB: musaium
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        # BullMQ queues boot eagerly with `pnpm dev` — without Redis the
        # backend retries ECONNREFUSED forever and never answers /health.
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://musaium:musaium_ci@localhost:5433/musaium
      DB_HOST: localhost
      DB_PORT: '5433'
      DB_USER: musaium
      DB_PASSWORD: musaium_ci
      PGDATABASE: musaium
      DB_SYNCHRONIZE: 'false'
      JWT_ACCESS_SECRET: ci-access-secret-garak
      JWT_REFRESH_SECRET: ci-refresh-secret-garak
      MEDIA_SIGNING_SECRET: ci-media-secret-garak
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NODE_ENV: test
      PORT: '3000'
      # Disable HuggingFace transfer telemetry (Garak vendors HF helpers even
      # when not used as a target).
      HF_HUB_DISABLE_TELEMETRY: '1'
      TRANSFORMERS_NO_ADVISORY_WARNINGS: '1'
      # Garak writes reports + logs to this dir so the artifact upload picks
      # them up reliably.
      GARAK_REPORTS_DIR: ${{ github.workspace }}/garak-reports

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend deps
        working-directory: museum-backend
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        working-directory: museum-backend
        run: pnpm migration:run

      - name: Boot backend
        working-directory: museum-backend
        run: pnpm dev > /tmp/backend.log 2>&1 &

      - name: Wait for backend health
        # /api/health is the LB-style liveness probe. /api/health/deep would
        # additionally probe the LLM Guard sidecar via probeGuardrailProviders
        # (api.router.ts:216), but the sidecar is not part of the CI stack —
        # see "Known coverage gap" header note.
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/health 2>/dev/null; then
              echo "backend healthy after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "ERROR: backend never became healthy"
          tail -200 /tmp/backend.log
          exit 1

      - name: Install Garak
        run: |
          python -m pip install --upgrade pip
          # Pin a known-working minor; the harness installs the latest patch.
          # Bumping to 0.12+ requires a dedicated ADR (audit §3 pinning concern).
          python -m pip install "garak>=0.10,<0.12"
          garak --version

      - name: Bootstrap throwaway visitor + base JWT
        id: bootstrap
        run: |
          set -euo pipefail
          REG_BODY='{"email":"garak+ci@musaium.test","password":"GarakCI2026!","firstName":"Garak","lastName":"Ci"}'
          curl -fsS -X POST http://localhost:3000/api/auth/register \
            -H 'Content-Type: application/json' -d "$REG_BODY" > /dev/null || true
          LOGIN_BODY='{"email":"garak+ci@musaium.test","password":"GarakCI2026!"}'
          TOKEN=$(curl -fsS -X POST http://localhost:3000/api/auth/login \
            -H 'Content-Type: application/json' -d "$LOGIN_BODY" | jq -r '.accessToken')
          if [ -z "${TOKEN:-}" ] || [ "${TOKEN}" = "null" ]; then
            echo "::error::Bootstrap failed to mint a Musaium JWT — login response was empty/null"
            exit 1
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Prepare report dir
        run: mkdir -p "${GARAK_REPORTS_DIR}"

      - name: Run Garak probes (session-per-probe)
        # Probe selection rationale:
        #   - promptinject : Agency Enterprise PromptInject suite — direct
        #                    system-prompt-override attempts (LLM01 + LLM07).
        #   - leakreplay   : training-data + prompt replay (LLM02 + LLM07).
        #   - encoding     : base64/rot13/hex obfuscation bypass (audit G4).
        #   - dan          : role-play jailbreak families (LLM01 multi-turn).
        #   - tap          : Tree-of-Attacks multi-turn (audit G2).
        #   - xss          : data exfiltration probes (LLM05).
        # Session-per-probe: history is empty at the start of each family so
        # a jailbreak success on probe N does not contaminate probe N+1.
        working-directory: ${{ env.GARAK_REPORTS_DIR }}
        env:
          MUSAIUM_JWT: ${{ steps.bootstrap.outputs.token }}
        run: |
          set -euo pipefail
          PROBES="promptinject leakreplay encoding dan tap xss"
          for probe in $PROBES; do
            echo "::group::probe=${probe}"
            SID=$(curl -fsS -X POST http://localhost:3000/api/chat/sessions \
                    -H "Authorization: Bearer ${MUSAIUM_JWT}" \
                    -H 'Content-Type: application/json' \
                    -d '{"locale":"en","museumMode":false}' | jq -r '.session.id')
            if [ -z "${SID:-}" ] || [ "${SID}" = "null" ]; then
              echo "::error::failed to mint chat session for probe ${probe}"; exit 1
            fi
            echo "session=${SID}"
            export SESSION_ID="${SID}"
            garak \
              --target_type rest \
              --generator_option_file "${GITHUB_WORKSPACE}/museum-backend/scripts/llm-security/musaium-garak-rest.json" \
              --probes "${probe}" \
              --report_prefix "musaium-garak-${probe}" \
              --parallel_attempts 1 \
              --verbose
            echo "::endgroup::"
          done
          echo "--- reports ---"
          ls -la

      - name: Content check (anti-silent-drift)
        # Defends against future BE refactor renaming `message.text` ->
        # something else, which would yield a green badge with empty
        # responses. If ALL reports have zero non-empty `output` fields,
        # something is wrong with the response_json_field path.
        working-directory: ${{ env.GARAK_REPORTS_DIR }}
        run: |
          set -euo pipefail
          SHAPE_OK=0
          for f in musaium-garak-*.report.jsonl; do
            [ -e "$f" ] || continue
            NE=$(jq -s '[.[] | select((.output // "") | type == "string" and length > 0)] | length' "$f" 2>/dev/null || echo 0)
            echo "$f: non-empty-output records=$NE"
            [ "$NE" -gt 0 ] && SHAPE_OK=$((SHAPE_OK+1))
          done
          if [ "$SHAPE_OK" -eq 0 ]; then
            echo "::error::All Garak reports have zero non-empty output records — response_json_field drift suspected (check musaium-garak-rest.json vs PostMessageResponse contract in chat.contracts.ts)"
            exit 1
          fi
          echo "shape-check OK: $SHAPE_OK report(s) with non-empty output"

      - name: Evaluate severity
        # Iterates ALL musaium-garak-*.report.jsonl files (one per probe).
        # Records with `status == "fail"` indicate a successful adversarial
        # hit. We surface ALL failures in the artifact, but only fail the
        # workflow if any record carries HIGH or CRITICAL severity.
        working-directory: ${{ env.GARAK_REPORTS_DIR }}
        run: |
          set -euo pipefail
          REPORTS=$(ls musaium-garak-*.report.jsonl 2>/dev/null || true)
          if [ -z "${REPORTS}" ]; then
            echo "::error::No Garak reports produced — investigate logs."
            exit 1
          fi
          python3 - <<'PY'
          import json, sys, glob
          total_high = 0
          total_fails = 0
          for path in sorted(glob.glob('musaium-garak-*.report.jsonl')):
              per_file_high = 0
              per_file_fails = 0
              with open(path, encoding='utf-8') as fh:
                  for line in fh:
                      line = line.strip()
                      if not line:
                          continue
                      try:
                          rec = json.loads(line)
                      except json.JSONDecodeError:
                          continue
                      if rec.get('status') in ('fail', 'FAIL'):
                          per_file_fails += 1
                      sev = (rec.get('severity') or '').lower()
                      if sev in ('high', 'critical'):
                          per_file_high += 1
              print(f"{path}: failures={per_file_fails} high_or_critical={per_file_high}")
              total_fails += per_file_fails
              total_high += per_file_high
          print(f"TOTAL: failures={total_fails} high_or_critical={total_high}")
          if total_high > 0:
              print(f"::error::Garak found {total_high} HIGH/CRITICAL severity finding(s)")
              sys.exit(1)
          PY

      - name: Upload Garak report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: garak-report-${{ github.run_id }}
          path: ${{ env.GARAK_REPORTS_DIR }}
          retention-days: 30
          if-no-files-found: warn

      - name: Print backend log on failure
        if: failure()
        run: tail -200 /tmp/backend.log || true
