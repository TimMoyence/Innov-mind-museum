name: deploy-web

on:
  push:
    paths:
      - 'museum-web/**'
      - '.github/workflows/deploy-web.yml'
    branches: ['main']

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

jobs:
  web-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: museum-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: museum-web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run lint

      - name: Build
        run: pnpm run build

  build-and-deploy:
    needs: web-quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./museum-web
          file: ./museum-web/deploy/Dockerfile.prod
          load: true
          tags: museum-web:ci

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: museum-web:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./museum-web
          file: ./museum-web/deploy/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USER }}/museum-web:latest
            ghcr.io/${{ secrets.GHCR_USER }}/museum-web:${{ github.sha }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            set -e
            cd /srv/museum

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin || true

            # 1. Pull the new image
            docker compose pull museum-web

            # 2. Restart with 30s grace period for in-flight requests to drain
            docker compose up -d --remove-orphans --timeout 30 museum-web

            # 3. Wait for the new container to pass its healthcheck
            echo "Waiting for museum-web healthcheck..."
            TRIES=0
            MAX_TRIES=20
            until docker compose exec -T museum-web node -e "fetch('http://localhost:3001/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))" 2>/dev/null; do
              TRIES=$((TRIES + 1))
              if [ "$TRIES" -ge "$MAX_TRIES" ]; then
                echo "Healthcheck failed after ${MAX_TRIES} attempts"
                exit 1
              fi
              echo "  attempt ${TRIES}/${MAX_TRIES}..."
              sleep 3
            done
            echo "museum-web is healthy."
