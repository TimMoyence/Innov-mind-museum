# ---------------------------------------------------------------------------
# llm-promptfoo-smoke.yml
#
# Scope
#   Defense-in-depth complement to `llm-security-promptfoo.yml`. Runs a small
#   set of non-adversarial reference prompts (e.g. "Tell me about the Mona
#   Lisa") and asserts that the LangChain orchestrator still returns coherent
#   art-domain answers. Catches regressions where the guardrail tightening
#   accidentally over-blocks legitimate questions.
#
# Triggers
#   - schedule: '30 3 * * *'      Nightly at 03:30 UTC.
#   - workflow_dispatch:          Manual trigger.
#
# Failure policy
#   pass-rate < 80 % fails the run.
#
# Notes
#   The reference corpus lives at
#     museum-backend/scripts/llm-security/promptfoo-daily-art-smoke.yaml
#   It uses a `contains-any` assertion family so any answer that mentions the
#   artwork title / artist counts as a pass.
# ---------------------------------------------------------------------------
name: llm-promptfoo-smoke

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: promptfoo-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: daily-art smoke (recall ≥80 %)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: musaium
          POSTGRES_PASSWORD: musaium_ci
          POSTGRES_DB: musaium
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://musaium:musaium_ci@localhost:5433/musaium
      DB_HOST: localhost
      DB_PORT: '5433'
      DB_USER: musaium
      DB_PASSWORD: musaium_ci
      PGDATABASE: musaium
      DB_SYNCHRONIZE: 'false'
      JWT_ACCESS_SECRET: ci-access-secret-smoke
      JWT_REFRESH_SECRET: ci-refresh-secret-smoke
      MEDIA_SIGNING_SECRET: ci-media-secret-smoke
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NODE_ENV: test
      PORT: '3000'
      PROMPTFOO_DISABLE_TELEMETRY: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4

      - name: Install backend deps
        working-directory: museum-backend
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        working-directory: museum-backend
        run: pnpm migration:run

      - name: Boot backend
        working-directory: museum-backend
        run: pnpm dev > /tmp/backend.log 2>&1 &

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/health 2>/dev/null; then
              echo "backend healthy after ${i}s"; exit 0
            fi
            sleep 1
          done
          cat /tmp/backend.log
          exit 1

      - name: Seed pre-verified smoke account
        id: seed_smoke
        # Use the existing seed-smoke-account.ts script (canonical for prod
        # post-deploy smoke), in its `create` subcommand. Creates a visitor with
        # email_verified=true, onboarding_completed=true, role=visitor — bypasses
        # the EMAIL_NOT_VERIFIED 403 gate that blocks fresh register→login flows
        # (auth-session.service.ts:142). Pérein 10y : one canonical seed pattern
        # for all CI smoke flows.
        #
        # `create` generates a per-run RANDOM password (env SMOKE_TEST_PASSWORD is
        # ignored) and prints it on a single `SMOKE_TEST_PASSWORD=<value>` stdout
        # line (ops logs go to stderr). We extract that line, `::add-mask::` it so
        # it never appears in clear, and expose it as a step output consumed only
        # by the bootstrap step below. The password is NEVER echoed in clear.
        working-directory: museum-backend
        env:
          SMOKE_TEST_EMAIL: smoke+ci-${{ github.run_id }}-${{ github.run_attempt }}@musaium.test
        run: |
          set -euo pipefail
          CREATE_STDOUT="$(pnpm --silent run seed:smoke-account create)"
          PWD_VALUE="$(printf '%s\n' "$CREATE_STDOUT" | sed -n 's/^SMOKE_TEST_PASSWORD=//p' | tail -n1)"
          if [ -z "$PWD_VALUE" ]; then
            echo "create step did not emit a SMOKE_TEST_PASSWORD line" >&2
            exit 1
          fi
          echo "::add-mask::$PWD_VALUE"
          echo "password=$PWD_VALUE" >> "$GITHUB_OUTPUT"

      - name: Bootstrap chat session
        id: bootstrap
        env:
          SMOKE_TEST_EMAIL: smoke+ci-${{ github.run_id }}-${{ github.run_attempt }}@musaium.test
          SMOKE_TEST_PASSWORD: ${{ steps.seed_smoke.outputs.password }}
        run: |
          set -euo pipefail
          LOGIN_BODY="{\"email\":\"${SMOKE_TEST_EMAIL}\",\"password\":\"${SMOKE_TEST_PASSWORD}\"}"
          TOKEN=$(curl --fail-with-body -sS -X POST http://localhost:3000/api/auth/login \
            -H 'Content-Type: application/json' -d "$LOGIN_BODY" | jq -r '.accessToken')
          SID=$(curl --fail-with-body -sS -X POST http://localhost:3000/api/chat/sessions \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' -d '{"locale":"en","museumMode":false}' | jq -r '.session.id')
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "session=$SID" >> "$GITHUB_OUTPUT"

      - name: Install promptfoo
        # Pinned (not @latest): a floating promptfoo bump is an unverifiable
        # nightly-only variable. Bump deliberately + re-verify.
        run: npm install -g promptfoo@0.121.17

      - name: Run smoke eval
        working-directory: museum-backend/scripts/llm-security
        env:
          MUSAIUM_API_BASE_URL: http://localhost:3000
          MUSAIUM_API_KEY: ${{ steps.bootstrap.outputs.token }}
          MUSAIUM_SESSION_ID: ${{ steps.bootstrap.outputs.session }}
        # promptfoo exit code = 100 if ANY single test fails (even at 99% pass).
        # On veut que ce soit le step "Enforce ≥80 % pass-rate" qui décide,
        # pas le exit code binaire. `|| true` swallow le 100 ; le report JSON
        # est écrit avant l'exit donc l'analyse Python aval lit la vérité.
        run: |
          mkdir -p reports
          promptfoo eval \
            --config promptfoo-daily-art-smoke.yaml \
            --max-concurrency 2 \
            --output reports/promptfoo-daily-art-smoke.json || true

      - name: Enforce ≥80 % pass-rate
        working-directory: museum-backend/scripts/llm-security
        # This smoke exists to catch RECALL regressions (guardrail over-blocking
        # legit art questions). A provider/circuit-breaker blip is AVAILABILITY,
        # not recall — the app's circuit breaker returning CIRCUIT_BREAKER_OPEN (or
        # an unreachable-OpenAI envelope) must not masquerade as a recall failure.
        # So we compute the ratio over VALID tests only (real LLM answers) and
        # exclude infra errors; if availability errors dominate the run is
        # inconclusive → visible warning, not a red nightly. Over-blocking still
        # reds the run: a guardrail refusal is answer text (a genuine assertion
        # failure), never a circuit-breaker marker, so it stays in the denominator.
        run: |
          python3 - <<'PY'
          import json, sys, pathlib
          report = pathlib.Path("reports/promptfoo-daily-art-smoke.json")
          data = json.loads(report.read_text(encoding="utf-8"))
          results = (data.get("results") or {}).get("results") or []

          def output_text(r):
              out = (r.get("response") or {}).get("output")
              return out if isinstance(out, str) else json.dumps(out or "")

          infra = succ = fail = 0
          for r in results:
              txt = output_text(r)
              if "CIRCUIT_BREAKER_OPEN" in txt or "openai_unreachable" in txt:
                  infra += 1
                  continue
              if r.get("success"):
                  succ += 1
              else:
                  fail += 1

          total = len(results)
          valid = succ + fail
          print(f"total={total} valid={valid} successes={succ} failures={fail} infra_excluded={infra}")

          if total == 0:
              print("::error::Zero tests executed")
              sys.exit(1)

          if valid == 0 or infra > total / 2:
              print(f"::warning::Smoke inconclusive — {infra}/{total} tests hit provider/circuit-breaker errors (availability, not recall). Pass-rate not enforced.")
              sys.exit(0)

          rate = succ / valid
          print(f"pass_rate={rate:.4f} (over {valid} valid tests; {infra} infra excluded)")
          if rate < 0.80:
              print(f"::error::Smoke recall pass-rate {rate:.2%} below 80 % threshold")
              sys.exit(1)
          PY

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-daily-art-smoke-${{ github.run_id }}
          path: museum-backend/scripts/llm-security/reports
          retention-days: 14

      - name: Cleanup smoke account
        # Backend CI is throwaway (destroyed with the job), so cleanup is not
        # strictly required — but running it keeps the create/cleanup contract
        # symmetric and exercises the `cleanup` verb in CI. Runs unconditionally
        # so no account survives even when an earlier step failed midway.
        if: ${{ always() }}
        working-directory: museum-backend
        env:
          SMOKE_TEST_EMAIL: smoke+ci-${{ github.run_id }}-${{ github.run_attempt }}@musaium.test
        run: pnpm run seed:smoke-account cleanup || true

      - name: Print backend log on failure
        if: failure()
        run: tail -200 /tmp/backend.log || true
