name: web

on:
  pull_request:
    paths:
      - 'museum-web/**'
      - '.github/workflows/ci-cd-web.yml'
  push:
    paths:
      - 'museum-web/**'
      - '.github/workflows/ci-cd-web.yml'
    branches: ['main']
  schedule:
    - cron: '23 3 * * *'   # 03:23 UTC nightly — multi-browser Playwright run

# Top-level least-privilege default. Deploy job overrides with packages: write.
permissions:
  contents: read

concurrency:
  group: ci-cd-web-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: museum-web
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: museum-web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        # pnpm audit uses retired npm endpoints (both /audits and /audits/quick return 410).
        # Trivy fs scan reads pnpm-lock.yaml directly — consistent with image scanning below.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          scan-type: fs
          scan-ref: museum-web
          scanners: vuln
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Verify OpenAPI types up to date
        run: pnpm run check:openapi-types

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      # R18 — Web cookies audit sentinel. Moved here from ci-cd-backend.yml
      # (reviewer feedback IMPORTANT 3 — R18 acceptance explicitly scopes the
      # gate to the web quality job). The audit script itself still lives in
      # the backend workspace (single source of truth — design D9 cross-app
      # sentinel acceptable) and is pure Node (no pnpm install needed). The
      # working-directory job default points at museum-web, so reach into
      # the sibling backend tree via a relative path.
      - name: Web cookies audit sentinel (R18)
        run: node ../museum-backend/scripts/sentinels/web-cookies-audit.mjs
      # web-domain-canonical — blocks the non-owned domain musaium.app from
      # leaking into user-facing web surfaces (notably the EAA accessibility
      # contact email). Same cross-app sentinel convention as R18: pure Node,
      # lives in the backend tree, invoked via relative path from museum-web.
      - name: Web canonical-domain sentinel (no musaium.app)
        run: node ../museum-backend/scripts/sentinels/web-domain-canonical.mjs
      # Coverage gate (vitest.config.ts thresholds) activates after Bloc C5 lands
      # 10 admin panel tests bringing museum-web above the 70 % floor — see ADR-007.

  # ─── Playwright e2e (Chromium on PR + push) ─────────────────────────────
  playwright-pr:
    needs: quality
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: museum-web
    services:
      postgres:
        # pgvector/pgvector:pg16 = postgres 16 + pgvector ≥ 0.7 preinstalled.
        # Required because BE migration AddArtworkEmbeddings1778406339944
        # runs `CREATE EXTENSION IF NOT EXISTS vector`, which fails on vanilla postgres:16.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: museum_dev
          POSTGRES_PASSWORD: museum_dev_password
          POSTGRES_DB: museum_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: |
            museum-web/pnpm-lock.yaml
            museum-backend/pnpm-lock.yaml

      # Backend: install + migrate + start
      - name: Install backend deps
        working-directory: museum-backend
        run: pnpm install --frozen-lockfile
      - name: Run backend migrations
        working-directory: museum-backend
        env:
          DB_HOST: localhost
          DB_PORT: '5433'
          DB_USER: museum_dev
          DB_PASSWORD: museum_dev_password
          PGDATABASE: museum_dev
        run: pnpm migration:run
      - name: Start backend
        working-directory: museum-backend
        env:
          DB_HOST: localhost
          DB_PORT: '5433'
          DB_USER: museum_dev
          DB_PASSWORD: museum_dev_password
          PGDATABASE: museum_dev
          PORT: '3000'
          JWT_ACCESS_SECRET: phase3-access
          JWT_REFRESH_SECRET: phase3-refresh
          CORS_ORIGINS: http://localhost:3001
        run: nohup pnpm dev > /tmp/be.log 2>&1 &
      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/health > /dev/null 2>&1; then exit 0; fi
            sleep 2
          done
          echo "Backend did not become healthy"; tail -50 /tmp/be.log; exit 1

      # Web: install + start dev server
      - name: Install web deps
        run: pnpm install --frozen-lockfile
      - name: Start Next.js dev server
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
        run: nohup pnpm dev > /tmp/web.log 2>&1 &
      - name: Wait for web ready
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3001/en > /dev/null 2>&1; then exit 0; fi
            sleep 2
          done
          echo "Web did not come up"; tail -50 /tmp/web.log; exit 1

      # Playwright
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright suite (Chromium)
        env:
          PW_BROWSERS: chromium
          DB_HOST: localhost
          DB_PORT: '5433'
          DB_USER: museum_dev
          DB_PASSWORD: museum_dev_password
          PGDATABASE: museum_dev
        run: pnpm test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: playwright-report-pr
          path: museum-web/playwright-report/
          retention-days: 7

  # ─── Playwright e2e (3-browser matrix nightly) ──────────────────────────
  playwright-nightly:
    needs: quality
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: museum-web
    services:
      postgres:
        # pgvector/pgvector:pg16 = postgres 16 + pgvector ≥ 0.7 preinstalled.
        # Required because BE migration AddArtworkEmbeddings1778406339944
        # runs `CREATE EXTENSION IF NOT EXISTS vector`, which fails on vanilla postgres:16.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: museum_dev
          POSTGRES_PASSWORD: museum_dev_password
          POSTGRES_DB: museum_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: |
            museum-web/pnpm-lock.yaml
            museum-backend/pnpm-lock.yaml
      - name: Install backend deps
        working-directory: museum-backend
        run: pnpm install --frozen-lockfile
      - name: Run backend migrations
        working-directory: museum-backend
        env:
          DB_HOST: localhost
          DB_PORT: '5433'
          DB_USER: museum_dev
          DB_PASSWORD: museum_dev_password
          PGDATABASE: museum_dev
        run: pnpm migration:run
      - name: Start backend
        working-directory: museum-backend
        env:
          DB_HOST: localhost
          DB_PORT: '5433'
          DB_USER: museum_dev
          DB_PASSWORD: museum_dev_password
          PGDATABASE: museum_dev
          PORT: '3000'
          JWT_ACCESS_SECRET: phase3-access
          JWT_REFRESH_SECRET: phase3-refresh
          CORS_ORIGINS: http://localhost:3001
        run: nohup pnpm dev > /tmp/be.log 2>&1 &
      - name: Wait for backend
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/health > /dev/null 2>&1; then exit 0; fi
            sleep 2
          done
          tail -50 /tmp/be.log; exit 1
      - name: Install web deps
        run: pnpm install --frozen-lockfile
      - name: Start web
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
        run: nohup pnpm dev > /tmp/web.log 2>&1 &
      - name: Wait for web
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3001/en > /dev/null 2>&1; then exit 0; fi
            sleep 2
          done
          tail -50 /tmp/web.log; exit 1
      - name: Install Playwright browsers (all)
        run: pnpm exec playwright install --with-deps chromium firefox webkit
      - name: Run Playwright suite (all browsers)
        env:
          PW_BROWSERS: chromium,firefox,webkit
          DB_HOST: localhost
          DB_PORT: '5433'
          DB_USER: museum_dev
          DB_PASSWORD: museum_dev_password
          PGDATABASE: museum_dev
        run: pnpm test:e2e
      - name: Upload Playwright nightly report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: playwright-report-nightly
          path: museum-web/playwright-report/
          retention-days: 14

  lighthouse:
    needs: quality
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: museum-web/pnpm-lock.yaml

      - name: Install & Build
        working-directory: museum-web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18  # v12
        with:
          configPath: museum-web/lighthouserc.json
          uploadArtifacts: true

  deploy:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      # I-CMP6 / R11 (design §D6) — keyless OIDC cosign + SBOM attestation.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: museum-web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: museum-web
        run: pnpm install --frozen-lockfile
      - name: Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      # COMP-01 — PGP/.well-known placeholder deploy gate. Blocks shipping a
      # placeholder pgp-key.txt (the RFC 9116 Encryption channel would publish
      # empty). Runs on prod deploy only; the placeholder is legitimate in
      # dev/PR until the real key is generated (docs/operations/PGP_KEY_GENERATION.md).
      - name: PGP placeholder deploy gate
        run: node scripts/sentinels/wellknown-placeholder-free.mjs

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          file: ./museum-web/deploy/Dockerfile.prod
          load: true
          tags: museum-web:ci

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          image-ref: museum-web:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Push image to GHCR
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          file: ./museum-web/deploy/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USER }}/museum-web:latest
            ghcr.io/${{ secrets.GHCR_USER }}/museum-web:${{ github.sha }}

      # ── I-CMP6 / R11 (decision Q3 "Tout faire", design §D6) — CycloneDX SBOM
      # attestation on the pushed web image digest, mirroring the BE pattern.
      # ADDITIVE + advisory (continue-on-error) so it never gates the deploy.
      - name: Generate SBOM (web)
        working-directory: museum-web
        continue-on-error: true
        run: npx @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-file sbom.json --spec-version 1.5 --output-reproducible

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.4.1'

      - name: Cosign attest SBOM (CycloneDX)
        continue-on-error: true
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign attest --yes --type cyclonedx \
            --predicate museum-web/sbom.json \
            "ghcr.io/${{ secrets.GHCR_USER }}/museum-web@${{ steps.push.outputs.digest }}"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          WEB_IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,WEB_IMAGE_TAG
          script: |
            set -e
            cd /srv/museum

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin || true

            # Export WEB_IMAGE_TAG so docker-compose.yml can interpolate ${WEB_IMAGE_TAG}.
            export WEB_IMAGE_TAG
            echo "[deploy] using WEB_IMAGE_TAG=${WEB_IMAGE_TAG}"

            # Persist WEB_IMAGE_TAG to /srv/museum/.env so out-of-band restarts
            # reuse the right tag instead of silently falling back to `:latest`.
            # Same root cause + fix as backend (see ci-cd-backend.yml deploy-prod
            # comment) — 2026-05-13 OTel crash-loop showed the local `:latest`
            # can lag prod by days when CI always pulls `:<sha>` only.
            # /srv/museum/.env is root-owned, sudo required.
            ENV_FILE=/srv/museum/.env
            BACKUP_DIR="${HOME}/.museum-env-backups"
            mkdir -p "${BACKUP_DIR}"
            sudo cp -p "${ENV_FILE}" "${BACKUP_DIR}/.env.bak.$(date -u +%Y%m%dT%H%M%SZ)"
            sudo grep -v '^WEB_IMAGE_TAG=' "${ENV_FILE}" | sudo tee "${ENV_FILE}.tmp" >/dev/null || true
            echo "WEB_IMAGE_TAG=${WEB_IMAGE_TAG}" | sudo tee -a "${ENV_FILE}.tmp" >/dev/null
            sudo mv "${ENV_FILE}.tmp" "${ENV_FILE}"
            echo "[deploy] persisted WEB_IMAGE_TAG=${WEB_IMAGE_TAG} to ${ENV_FILE}"

            # 1. Pull the new image
            docker compose pull museum-web

            # 2. Restart with 30s grace period for in-flight requests to drain.
            # `--no-deps` est CRITIQUE : sans lui compose voit que .env a changé
            # (WEB_IMAGE_TAG patch) et décide de recréer aussi museum-backend
            # par cascade dependencies → race condition "Container name
            # /museum-backend-1 is already in use" (vu run 25987976752 + 25987305512).
            # `--no-deps` isole le restart à museum-web seul, backend reste
            # intact. Pérein 10y : tout deploy service-spécifique DOIT utiliser
            # --no-deps si .env est partagé entre services.
            docker compose up -d --no-deps --remove-orphans --timeout 30 museum-web

            # 3. Wait for the new container to pass its healthcheck
            echo "Waiting for museum-web healthcheck..."
            TRIES=0
            MAX_TRIES=20
            until docker compose exec -T museum-web node -e "fetch('http://localhost:3001/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))" 2>/dev/null; do
              TRIES=$((TRIES + 1))
              if [ "$TRIES" -ge "$MAX_TRIES" ]; then
                echo "Healthcheck failed after ${MAX_TRIES} attempts"
                exit 1
              fi
              echo "  attempt ${TRIES}/${MAX_TRIES}..."
              sleep 3
            done
            echo "museum-web is healthy."

      - name: Smoke test (functional)
        run: |
          set -e
          BASE_URL="${{ secrets.PROD_WEB_BASE_URL }}"
          BASE_URL="${BASE_URL%/}"
          sleep 10

          # 1. Landing renders with locale middleware (lang attribute set, meta description present)
          echo "[smoke] checking landing page SSR..."
          LANDING="$(curl -sfL "${BASE_URL}/")"
          echo "$LANDING" | grep -q '<html lang="' || (echo "FAIL: locale middleware did not set lang attribute" && exit 1)
          echo "$LANDING" | grep -q '<meta name="description"' || (echo "FAIL: meta description missing — SEO broken" && exit 1)

          # 2. Sitemap reachable (Next.js routing alive)
          echo "[smoke] checking sitemap..."
          curl -sfL "${BASE_URL}/sitemap.xml" | grep -q '<urlset' || (echo "FAIL: sitemap.xml unreachable or malformed" && exit 1)

          # 3. Static asset bundle reachable (CSS/JS shipped)
          echo "[smoke] checking _next static assets..."
          ASSET_URL="$(echo "$LANDING" | grep -oE '/_next/static/[^" ]+\.(js|css)' | head -1 || true)"
          if [ -n "$ASSET_URL" ]; then
            curl -sfI "${BASE_URL}${ASSET_URL}" >/dev/null || (echo "FAIL: static asset ${ASSET_URL} unreachable" && exit 1)
          else
            echo "WARN: no /_next/static asset reference found in landing HTML"
          fi

          # 4. Backend API reachable through web proxy (/api/health round-trip)
          echo "[smoke] checking /api/health round-trip..."
          HEALTH_HTTP="$(curl -s -o /tmp/health.json -w '%{http_code}' "${BASE_URL}/api/health" || echo 000)"
          if [ "$HEALTH_HTTP" != "200" ]; then
            echo "FAIL: /api/health returned HTTP ${HEALTH_HTTP} (expected 200) — BE/FE integration broken"
            cat /tmp/health.json || true
            exit 1
          fi

          echo "[smoke] all functional checks passed"
