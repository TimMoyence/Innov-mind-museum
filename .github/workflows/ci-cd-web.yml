name: web

on:
  pull_request:
    paths:
      - 'museum-web/**'
      - '.github/workflows/ci-cd-web.yml'
  push:
    paths:
      - 'museum-web/**'
      - '.github/workflows/ci-cd-web.yml'
    branches: ['main']

# Top-level least-privilege default. Deploy job overrides with packages: write.
permissions:
  contents: read

concurrency:
  group: ci-cd-web-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: museum-web
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: museum-web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

  lighthouse:
    needs: quality
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: museum-web/pnpm-lock.yaml

      - name: Install & Build
        working-directory: museum-web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: museum-web/lighthouserc.json
          uploadArtifacts: true

  deploy:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ./museum-web
          file: ./museum-web/deploy/Dockerfile.prod
          load: true
          tags: museum-web:ci

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: museum-web:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Push image to GHCR
        uses: docker/build-push-action@v7
        with:
          context: ./museum-web
          file: ./museum-web/deploy/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USER }}/museum-web:latest
            ghcr.io/${{ secrets.GHCR_USER }}/museum-web:${{ github.sha }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            set -e
            cd /srv/museum

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin || true

            # 1. Pull the new image
            docker compose pull museum-web

            # 2. Restart with 30s grace period for in-flight requests to drain
            docker compose up -d --remove-orphans --timeout 30 museum-web

            # 3. Wait for the new container to pass its healthcheck
            echo "Waiting for museum-web healthcheck..."
            TRIES=0
            MAX_TRIES=20
            until docker compose exec -T museum-web node -e "fetch('http://localhost:3001/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))" 2>/dev/null; do
              TRIES=$((TRIES + 1))
              if [ "$TRIES" -ge "$MAX_TRIES" ]; then
                echo "Healthcheck failed after ${MAX_TRIES} attempts"
                exit 1
              fi
              echo "  attempt ${TRIES}/${MAX_TRIES}..."
              sleep 3
            done
            echo "museum-web is healthy."

      - name: Smoke test
        run: |
          sleep 10
          curl -sfL ${{ secrets.PROD_WEB_BASE_URL }} | grep -q '<html' || (echo "Smoke test failed" && exit 1)
          echo "Smoke test passed"
